<!DOCTYPE html>
<html lang="zh-CN">

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --bg-dark: #1a1a2e;
            --bg-card: #16213e;
            --accent-pink: #e94560;
            --accent-cyan: #0f3460;
            --text-light: #eaeaea;
            --text-dim: #a0a0a0;
        }
        
        body {
            font-family: 'Pixelify Sans', 'Noto Sans SC', sans-serif;
            background: var(--bg-dark);
            color: var(--text-light);
            min-height: 100vh;
            overflow: hidden;
        }
        
        .app-container { display: flex; height: 100vh; width: 100vw; }
        
        .sidebar {
            width: 340px;
            min-width: 340px;
            background: var(--bg-card);
            display: flex;
            flex-direction: column;
            border-right: 4px solid var(--accent-cyan);
        }
        
        .sidebar-header {
            padding: 18px;
            background: linear-gradient(135deg, var(--accent-cyan), var(--accent-pink));
            text-align: center;
        }
        
        .sidebar-header h1 { font-size: 28px; text-shadow: 3px 3px 0 #000; }
        
        .city-stats {
            display: flex;
            justify-content: space-around;
            padding: 14px;
            background: rgba(0,0,0,0.3);
            font-size: 16px;
        }
        
        .stat-item { text-align: center; padding: 4px 10px; }
        .stat-value { font-size: 24px; font-weight: bold; color: #ffd700; }
        
        .agent-list { flex: 1; overflow-y: auto; padding: 14px; }
        
        .agent-card {
            background: linear-gradient(135deg, #2a2a4a, #1a1a3a);
            border-radius: 12px;
            padding: 14px;
            margin-bottom: 12px;
            cursor: pointer;
            transition: all 0.3s;
            border: 2px solid transparent;
        }
        
        .agent-card:hover { border-color: var(--accent-pink); }
        .agent-card.selected { border-color: #ffd700; }
        
        .agent-header { display: flex; align-items: center; gap: 12px; }
        
        .agent-avatar {
            width: 44px;
            height: 44px;
            border-radius: 8px;
            image-rendering: pixelated;
        }
        
        .agent-name { font-weight: bold; font-size: 20px; }
        .agent-personality { font-size: 14px; color: var(--text-dim); }
        
        .agent-status { display: flex; gap: 8px; margin-top: 10px; flex-wrap: wrap; }
        
        .status-badge {
            font-size: 13px;
            padding: 4px 10px;
            border-radius: 8px;
            background: rgba(255,255,255,0.1);
        }
        
        .status-badge.high { background: #4ade80; color: #000; }
        .status-badge.medium { background: #fbbf24; color: #000; }
        .status-badge.low { background: #f87171; color: #000; }
        
        .control-panel { padding: 14px; background: rgba(0,0,0,0.4); border-top: 3px solid var(--accent-cyan); }
        
        .btn {
            width: 100%;
            padding: 14px;
            margin-bottom: 8px;
            border: none;
            border-radius: 10px;
            font-family: inherit;
            font-size: 18px;
            cursor: pointer;
            font-weight: 600;
        }
        
        .btn-primary { background: linear-gradient(135deg, var(--accent-pink), #c73659); color: white; }
        .btn-secondary { background: linear-gradient(135deg, var(--accent-cyan), #0a2540); color: white; }
        .btn-gift { background: linear-gradient(135deg, #ffd700, #ffaa00); color: #000; }
        
        .quick-actions { display: flex; gap: 6px; flex-wrap: wrap; }
        
        .quick-btn {
            flex: 1;
            min-width: 75px;
            padding: 10px;
            font-size: 13px;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 6px;
            color: var(--text-light);
            cursor: pointer;
        }
        
        .quick-btn:hover { background: var(--accent-pink); }
        
        .game-area { flex: 1; position: relative; display: flex; flex-direction: column; min-width: 0; }
        
        .game-header {
            padding: 12px 20px;
            background: rgba(0,0,0,0.6);
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 18px;
        }
        
        #gameCanvas { flex: 1; width: 100%; image-rendering: pixelated; image-rendering: crisp-edges; }
        
        .location-panel {
            position: absolute;
            bottom: 20px;
            left: 20px;
            background: rgba(22, 33, 62, 0.95);
            border-radius: 14px;
            padding: 16px 20px;
            border: 2px solid var(--accent-cyan);
            max-width: 280px;
        }
        
        .location-name { font-size: 20px; font-weight: bold; margin-bottom: 5px; color: var(--accent-pink); }
        .location-desc { font-size: 15px; color: var(--text-dim); }
        
        .activity-panel {
            position: absolute;
            bottom: 20px;
            right: 20px;
            background: rgba(22, 33, 62, 0.95);
            border-radius: 14px;
            padding: 16px 20px;
            border: 2px solid var(--accent-pink);
            min-width: 220px;
        }
        
        .activity-title { font-size: 14px; color: var(--text-dim); margin-bottom: 5px; }
        .activity-text { font-size: 18px; font-weight: bold; }
        
        .achievement-popup {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(22, 33, 62, 0.98);
            border-radius: 24px;
            padding: 36px;
            border: 5px solid #ffd700;
            text-align: center;
            z-index: 1000;
            display: none;
            min-width: 400px;
            max-width: 90vw;
        }
        
        .achievement-popup.show { display: block; animation: popIn 0.5s ease; }
        
        @keyframes popIn {
            from { transform: translate(-50%, -50%) scale(0.5); opacity: 0; }
            to { transform: translate(-50%, -50%) scale(1); opacity: 1; }
        }
        
        .achievement-emoji { font-size: 70px; margin-bottom: 20px; }
        .achievement-title { font-size: 28px; font-weight: bold; color: #ffd700; margin-bottom: 12px; }
        .achievement-desc { font-size: 16px; color: var(--text-dim); line-height: 1.7; white-space: pre-line; }
        
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
            z-index: 999;
            display: none;
        }
        
        .overlay.show { display: block; }

        ::-webkit-scrollbar-track { background: var(--bg-dark); }
        ::-webkit-scrollbar-thumb { background: var(--accent-cyan); border-radius: 5px; }
    </style>
</head>

var ROAD_GRID = [];

var GRID_ROWS = CONFIG.MAP_HEIGHT;

function initRoadGrid() {
    for (var y = 0; y < GRID_ROWS; y++) {
        ROAD_GRID[y] = [];
        for (var x = 0; x < GRID_COLS; x++) {
            ROAD_GRID[y][x] = 0;
        }
    }
    // 横向道路
    for (var x = 0; x < GRID_COLS; x++) {
        ROAD_GRID[6][x] = 1;
        ROAD_GRID[20][x] = 1;
    }
    // 纵向道路
    for (var y = 0; y < GRID_ROWS; y++) {
        ROAD_GRID[y][7] = 1;
        ROAD_GRID[y][21] = 1;
    }
}

function getNearestRoad(gx, gy) {
    var dirs = [[0,-1],[0,1],[-1,0],[1,0]];
    var queue = [{x: gx, y: gy, dist: 0}];
    var visited = {};
    
    while (queue.length > 0) {
        var curr = queue.shift();
        var key = curr.x + ',' + curr.y;
        if (visited[key]) continue;
        visited[key] = true;
        
        if (ROAD_GRID[curr.y] && ROAD_GRID[curr.y][curr.x] === 1) {
            return {x: curr.x, y: curr.y};
        }
        
        for (var i = 0; i < dirs.length; i++) {
            var dx = dirs[i][0];
            var dy = dirs[i][1];
            var nx = curr.x + dx;
            var ny = curr.y + dy;
            if (nx >= 0 && nx < GRID_COLS && ny >= 0 && ny < GRID_ROWS) {
                queue.push({x: nx, y: ny, dist: curr.dist + 1});
            }
        }
    }
    return null;
}

                    const img = new Image();

                    img.onerror = () => { console.warn(`Failed to load: ${filename}`); resolve(); };

                });
            });
            return Promise.all(promises);

            const prompt = `你是一个AI城市模拟游戏。两个Agent正在咖啡厅相遇并聊天。请生成一句简短的对话（不超过20字）。

Agent1: ${agent1.name}，${agent1.personalityData.name}型人格
Agent2: ${agent2.name}，${agent2.personalityData.name}型人格

请用中文回复，格式：
${agent1.name}: "xxx"
${agent2.name}: "xxx"

只回复对话内容，不要其他解释。`;
            
            try {
                const response = await fetch(`https://${DOUBAO_CONFIG.endpoint}/api/v3/responses`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${DOUBAO_CONFIG.api_key}`
                    },
                    body: JSON.stringify({
                        model: DOUBAO_CONFIG.model,
                        messages: [{ role: 'user', content: prompt }]
                    })
                });
                
                const data = await response.json();
                let dialogue = data.choices?.[0]?.message?.content || `${agent1.name}: 你好呀！\n${agent2.name}: 你好！`;
                
                // 缓存对话
                dialogCache.set(cacheKey, dialogue);
                if (dialogCache.size > 100) {
                    dialogCache.delete(dialogCache.keys().next().value);
                }
                
                return dialogue;
            } catch (e) {
                console.error('豆包API调用失败:', e);
                return `${agent1.name}: 今天天气真好！\n${agent2.name}: 是啊，一起去玩吧！`;
            }
        }
        
        // ==================== Agent类 ====================
        class Agent {
            constructor(id, name, personality) {
                this.id = id;
                this.name = name;
                this.personality = personality;
                this.personalityData = PERSONALITIES[personality];
                
                this.mood = 70 + Math.random() * 20;
                this.energy = 70 + Math.random() * 20;
                this.hunger = 60 + Math.random() * 20;
                this.health = 80 + Math.random() * 20;
                this.coins = 150 + Math.floor(Math.random() * 200);
                
                this.x = (LOCATIONS.home.x + 1) * CONFIG.TILE_SIZE;
                this.y = (LOCATIONS.home.y + 1) * CONFIG.TILE_SIZE;
                this.targetX = this.x;
                this.targetY = this.y;
                this.moving = false;
                this.direction = 'down';
                this.walkFrame = 0;
                
                this.friends = [];
                this.currentLocation = 'home';
                this.stayTime = 0;
                this.currentActivity = '休息';
                this.currentEmoji = '😊';
                this.actionBubble = '';
                this.bubbleStartTime = 0;
                this.achievements = [];
                this.dialogueWith = null; // 当前和谁对话
                this.dialogueBubble = ''; // 对话气泡
                this.dialogueStartTime = 0;
                
                this.setInitialLocation();
                
                const colors = ['#FFDDBB', '#CCAA88', '#8D5524', '#E6C2A3'];
                this.skinColor = colors[Math.floor(Math.random() * colors.length)];
                this.hairColor = ['#2C1810', '#4A3728', '#8B4513', '#DAA520'][Math.floor(Math.random() * 4)];
                this.clothesColor = ['#E94560', '#0F3460', '#4ADE80', '#FBBF24'][Math.floor(Math.random() * 4)];
            }
            
            setInitialLocation() {
                if (this.personality === 'gentle') this.currentLocation = 'park';
                else if (this.personality === 'energetic') this.currentLocation = 'gym';
                else if (this.personality === 'scholar') this.currentLocation = 'library';
                
                const loc = LOCATIONS[this.currentLocation];
                this.x = (loc.x + 1) * CONFIG.TILE_SIZE;
                this.y = (loc.y + 1) * CONFIG.TILE_SIZE;
            }
            
            update(deltaTime) {
                if (!this.moving) {
                    this.hunger -= 0.0008 * deltaTime;
                    this.energy -= 0.0004 * deltaTime;
                    this.mood -= 0.0002 * deltaTime;
                }
                
                this.mood = Math.max(0, Math.min(100, this.mood));
                this.energy = Math.max(0, Math.min(100, this.energy));
                this.hunger = Math.max(0, Math.min(100, this.hunger));
                this.health = Math.max(0, Math.min(100, this.health));
                
                if (this.moving) {
                    var dx = this.targetX - this.x;
                    var dy = this.targetY - this.y;
                    var dist = Math.sqrt(dx * dx + dy * dy);
                    
                    if (dist < CONFIG.AGENT_SPEED) {
                        this.x = this.targetX;
                        this.y = this.targetY;
                        
                        // 检查是否需要继续走向中间目标或最终目标
                        if (this.intermediateTarget) {
                            this.targetX = this.intermediateTarget.x;
                            this.targetY = this.intermediateTarget.y;
                            this.intermediateTarget = null;
                        } else if (this.finalTargetX !== undefined) {
                            this.targetX = this.finalTargetX;
                            this.targetY = this.finalTargetY;
                            this.finalTargetX = undefined;
                            this.finalTargetY = undefined;
                        } else {
                            this.moving = false;
                            this.stayTime = 0;
                            this.bubbleStartTime = 0;
                            this.arrive();
                        }
                    } else {
                        this.x += (dx / dist) * CONFIG.AGENT_SPEED;
                        this.y += (dy / dist) * CONFIG.AGENT_SPEED;
                        
                        if (Math.abs(dx) > Math.abs(dy)) this.direction = dx > 0 ? 'right' : 'left';
                        else this.direction = dy > 0 ? 'down' : 'up';
                        
                        this.walkFrame = (this.walkFrame + 0.1) % 4;
                        this.currentActivity = '🚶 行走中';
                        this.currentEmoji = '🚶';
                        this.actionBubble = '';
                        this.dialogueBubble = '';
                        this.dialogueWith = null;
                    }
                } else {
                    this.stayTime++;
                    this.performActivity();
                }
            }
            
            performActivity() {
                const loc = LOCATIONS[this.currentLocation];
                
                // 检查是否在对话
                if (this.dialogueWith && this.stayTime - this.dialogueStartTime > CONFIG.DIALOG_DURATION) {
                    this.dialogueBubble = '';
                    this.dialogueWith = null;
                }
                
                if (this.stayTime - this.bubbleStartTime > CONFIG.BUBBLE_DURATION && !this.dialogueWith) {
                    this.bubbleStartTime = this.stayTime;
                    this.updateActivityText();
                }
                
                if (this.currentLocation === 'home') {
                    if (this.energy < 50) { this.currentActivity = '💤 睡觉'; this.currentEmoji = '😴'; this.actionBubble = '睡觉恢复...'; this.energy += 0.015; }
                    else if (this.hunger < 40) { this.currentActivity = '🍽️ 吃饭'; this.currentEmoji = '🍚'; this.actionBubble = '在家吃饭...'; this.hunger += 0.01; }
                    else { this.currentActivity = '🏠 休息'; this.currentEmoji = '😊'; this.actionBubble = '在家放松...'; }
                }
                else if (this.currentLocation === 'park') { this.currentActivity = '🌸 赏樱'; this.currentEmoji = '🌸'; if (!this.actionBubble) this.actionBubble = '欣赏樱花...'; this.mood += 0.005; if (this.stayTime === 200) this.takePhoto(); }
                else if (this.currentLocation === 'cafe') { 
                    const d = loc.menu[Math.floor(Math.random()*loc.menu.length)]; 
                    this.currentActivity = `☕ ${d}`; this.currentEmoji = '☕'; 
                    if (!this.actionBubble) this.actionBubble = `品尝${d}...`; 
                    this.mood += 0.008; 
                    // 尝试与其他Agent对话
                    if (this.stayTime === 150 && !this.dialogueWith) this.tryDialogue();
                    if (this.stayTime === 200) this.socialize(); 
                }
                else if (this.currentLocation === 'library') { const b = loc.books[Math.floor(Math.random()*loc.books.length)]; this.currentActivity = '📖 阅读'; this.currentEmoji = '📚'; if (!this.actionBubble) this.actionBubble = `阅读《${b}》...`; if (this.stayTime === 250) this.readBook(b); }
                else if (this.currentLocation === 'arcade') { this.currentActivity = '🎮 游戏'; this.currentEmoji = '🎮'; if (!this.actionBubble) this.actionBubble = '玩游戏中...'; if (Math.random()<0.015){this.coins+=Math.floor(Math.random()*30)+10;this.mood+=5;} }
                else if (this.currentLocation === 'beach') { this.currentActivity = '🏖️ 海滩'; this.currentEmoji = Math.random()>0.5?'🎣':'🏖️'; if(!this.actionBubble) this.actionBubble='海边休闲...'; if(Math.random()<0.008){const f=loc.fish[Math.floor(Math.random()*loc.fish.length)];const v=loc.fish.indexOf(f)*20+20;this.coins+=v;showAchievement('🎣','钓鱼成功!',`${this.name}钓到${f}，+${v}金币!`);} this.mood+=0.003; }
                else if (this.currentLocation === 'university') { this.currentActivity = '🏛️ 学习'; this.currentEmoji = '📖'; if(!this.actionBubble) this.actionBubble = '大学上课...'; this.mood+=0.004; }
                else if (this.currentLocation === 'hospital') { this.currentActivity = '🏥 体检'; this.currentEmoji = '🏥'; if(!this.actionBubble) this.actionBubble = '做体检...'; this.health+=0.02; }
                else if (this.currentLocation === 'cinema') { this.currentActivity = '🎬 观影'; this.currentEmoji = '🎬'; if(!this.actionBubble) this.actionBubble = '看电影...'; this.mood+=0.01; this.coins-=20; }
                else if (this.currentLocation === 'gym') { this.currentActivity = '💪 锻炼'; this.currentEmoji = '💪'; if(!this.actionBubble) this.actionBubble = '健身中...'; this.energy-=0.005; this.mood+=0.006; }
                else if (this.currentLocation === 'restaurant') { const f=loc.menu[Math.floor(Math.random()*loc.menu.length)]; this.currentActivity = `🍜 ${f}`; this.currentEmoji = '🍜'; if(!this.actionBubble) this.actionBubble = `吃${f}...`; this.hunger+=0.02; this.mood+=0.008; this.coins-=30; }
                else if (this.currentLocation === 'hotel') { this.currentActivity = '♨️ 温泉'; this.currentEmoji = '♨️'; if(!this.actionBubble) this.actionBubble = '泡温泉中...'; this.energy+=0.015; this.mood+=0.01; this.health+=0.005; }
                else if (this.currentLocation === 'school') { this.currentActivity = '🏫 上课'; this.currentEmoji = '🏫'; if(!this.actionBubble) this.actionBubble = '小学上课...'; this.mood+=0.003; }
                else if (this.currentLocation === 'shop') { this.currentActivity = '🛒 购物'; this.currentEmoji = '🛒'; if(!this.actionBubble) this.actionBubble = '逛街中...'; }
                
                if (this.stayTime > CONFIG.MIN_STAY_TIME && Math.random() < 0.002 && !this.dialogueWith) this.think();
            }
            
            async tryDialogue() {
                const others = agents.filter(a => a.id !== this.id && a.currentLocation === this.currentLocation && !a.dialogueWith);
                if (others.length > 0 && Math.random() > 0.4) {
                    const other = others[0];
                    this.dialogueWith = other;
                    other.dialogueWith = this;
                    this.dialogueStartTime = this.stayTime;
                    other.dialogueStartTime = this.stayTime;
                    
                    const dialogue = await generateDialogue(this, other);
                    this.dialogueBubble = dialogue;
                    other.dialogueBubble = dialogue;
                    
                    showAchievement('💬', '偶遇对话!', dialogue.replace(/\n/g, '\n'));
                }
            }
            
            updateActivityText() {
                const acts = {
                    home: ['在家休息...', '看电视...', '听音乐...'],
                    park: ['欣赏樱花...', '拍照打卡...', '野餐...'],

                    beach: ['钓鱼...', '晒太阳...', '捡贝壳...'],

            takePhoto() {
                const scenes = ['樱花树下', '湖边', '喷泉旁', '长椅上'];
                const scene = scenes[Math.floor(Math.random()*scenes.length)];
                showAchievement('📸','拍照成功!',`📸 ${scene}\nAgent: ${this.name}\n😊 心情: ${Math.floor(this.mood)}`);
                if(!this.achievements.includes('first_photo')) this.achievements.push('first_photo');
            }
            
            socialize() {
                const other = agents.filter(a=>a.id!==this.id&&a.currentLocation==='cafe'&&!this.friends.includes(a.id));
                if(other.length>0&&Math.random()>0.3){const f=other[0];this.friends.push(f.id);f.friends.push(this.id);this.mood+=20;this.coins+=10;showAchievement('💬','认识新朋友!',`${this.name}和${f.name}成为朋友! 👋\n+10金币`);}
            }
            
            readBook(book) {
                const insights=['这本书很有启发...','学到了新知识...','值得一读...'];
                const insight=insights[Math.floor(Math.random()*insights.length)];
                const rating=Math.floor(Math.random()*3)+7;
                showAchievement('📖','读书心得!',`📚 ${book}\n💡 ${insight}\n⭐ ${rating}/10`);
            }
            
            think() {
                const hour = Math.floor(gameTime / 60);
                const prefs = this.personalityData;
                
                if (this.hunger < 15 || this.energy < 10 || this.health < 30) { this.goToLocation(this.health<30?'hospital':this.hunger<15?'restaurant':'home'); return; }
                if (this.mood < 15) { this.goToLocation('cinema'); return; }
                
                if (hour >= 22 || hour < 6) this.goToLocation('home');
                else if (hour >= 6 && hour < 9) this.goToLocation(prefs.morning);
                else if (hour >= 9 && hour < 12) this.goToLocation(this.personality==='energetic'?'shop':'university');
                else if (hour >= 12 && hour < 14) this.goToLocation('restaurant');
                else if (hour >= 14 && hour < 18) this.goToLocation(prefs.preferred[Math.floor(Math.random()*prefs.preferred.length)]);
                else if (hour >= 18 && hour < 20) this.goToLocation(Math.random()>0.5?'shop':'cinema');
                else this.goToLocation(prefs.preferred[Math.floor(Math.random()*prefs.preferred.length)]);
            }
            
            goToLocation(locationId) {
                var loc = LOCATIONS[locationId];
                if (!loc || this.currentLocation === locationId) return;
                this.dialogueWith = null;
                this.dialogueBubble = '';
                
                // 计算网格坐标
                var currentGridX = Math.floor(this.x / CONFIG.TILE_SIZE);
                var currentGridY = Math.floor(this.y / CONFIG.TILE_SIZE);
                var targetGridX = Math.floor((loc.x + loc.w / 2) / CONFIG.TILE_SIZE);
                var targetGridY = Math.floor((loc.y + loc.h / 2) / CONFIG.TILE_SIZE);
                
                // 找到最近的道路点
                var currentRoad = getNearestRoad(currentGridX, currentGridY);
                var targetRoad = getNearestRoad(targetGridX, targetGridY);
                
                if (currentRoad && targetRoad) {
                    this.targetX = currentRoad.x * CONFIG.TILE_SIZE + CONFIG.TILE_SIZE / 2;
                    this.targetY = currentRoad.y * CONFIG.TILE_SIZE + CONFIG.TILE_SIZE / 2;
                    this.intermediateTarget = {
                        x: targetRoad.x * CONFIG.TILE_SIZE + CONFIG.TILE_SIZE / 2,
                        y: targetRoad.y * CONFIG.TILE_SIZE + CONFIG.TILE_SIZE / 2
                    };
                } else {
                    this.targetX = (loc.x + 0.5 + Math.random() * (loc.w - 1)) * CONFIG.TILE_SIZE;
                    this.targetY = (loc.y + 0.5 + Math.random() * (loc.h - 1)) * CONFIG.TILE_SIZE;
                    this.intermediateTarget = null;
                }
                
                this.finalTargetX = (loc.x + 0.5 + Math.random() * (loc.w - 1)) * CONFIG.TILE_SIZE;
                this.finalTargetY = (loc.y + 0.5 + Math.random() * (loc.h - 1)) * CONFIG.TILE_SIZE;
                this.currentLocation = locationId;
                this.moving = true;
                this.actionBubble = '';
            }
            
            arrive() { this.stayTime = 0; this.bubbleStartTime = 0; }
            
            draw(ctx) {
                const px = this.x, py = this.y, size = CONFIG.TILE_SIZE;
                
                // 阴影
                ctx.fillStyle='rgba(0,0,0,0.25)';
                ctx.beginPath();ctx.ellipse(px+size/2,py+size-5,size/3,6,0,0,Math.PI*2);ctx.fill();
                
                // 身体
                ctx.fillStyle=this.clothesColor;
                ctx.fillRect(px+16,py+26,20,22);
                
                // 腿部
                ctx.fillStyle='#333';
                const lo=this.moving?Math.sin(this.walkFrame*Math.PI/2)*3:0;
                ctx.fillRect(px+16,py+44,6,8+lo);ctx.fillRect(px+30,py+44,6,8-lo);
                
                // 头
                ctx.fillStyle=this.skinColor;
                ctx.fillRect(px+16,py+8,20,18);
                
                // 头发
                ctx.fillStyle=this.hairColor;
                ctx.fillRect(px+14,py+4,24,10);ctx.fillRect(px+16,py+14,4,6);ctx.fillRect(px+34,py+14,4,6);
                
                // 眼睛
                ctx.fillStyle='#222';
                if(this.direction==='left')ctx.fillRect(px+18,py+16,3,3);
                else if(this.direction==='right')ctx.fillRect(px+33,py+16,3,3);
                else{ctx.fillRect(px+19,py+16,3,3);ctx.fillRect(px+30,py+16,3,3);}
                
                // 嘴巴
                ctx.fillStyle='#c44';ctx.fillRect(px+24,py+22,4,2);
                
                // 优先显示对话气泡
                if(!this.moving && this.dialogueBubble) {
                    ctx.font='bold 12px "Pixelify Sans",sans-serif';
                    const lines = this.dialogueBubble.split('\n');
                    let maxWidth = 0;
                    lines.forEach(line => { maxWidth = Math.max(maxWidth, ctx.measureText(line).width); });
                    
                    const bubbleH = lines.length * 16 + 12;
                    const bubbleW = maxWidth + 16;
                    
                    ctx.fillStyle='white';
                    ctx.beginPath();
                    ctx.roundRect(px+size/2-bubbleW/2-4, py-30-bubbleH, bubbleW+8, bubbleH+8, 6);
                    ctx.fill();
                    
                    ctx.fillStyle='#333';
                    lines.forEach((line, i) => {
                        ctx.fillText(line, px+size/2-maxWidth/2, py-24-bubbleH + i*16);
                    });
                }
                // 普通气泡
                else if (!this.moving && this.actionBubble) {
                    ctx.font='bold 12px "Pixelify Sans",sans-serif';
                    const text = this.currentEmoji + ' ' + this.actionBubble;
                    const textWidth = ctx.measureText(text).width;
                    
                    ctx.fillStyle='white';
                    ctx.beginPath();
                    ctx.roundRect(px+size/2-textWidth/2-6, py-28, textWidth+12, 20, 4);
                    ctx.fill();
                    
                    ctx.fillStyle='#333';
                    ctx.fillText(text, px+size/2-textWidth/2, py-13);
                }
                
                // 选中标记
                if(selectedAgent===this){ctx.fillStyle='#FFD700';ctx.font='bold 14px sans-serif';ctx.fillText('★',px+20,py-40);}
            }
        }
        
        // ==================== 渲染函数 ====================
        // 城市地图背景

        function drawMap() {
            const w = CONFIG.MAP_WIDTH*CONFIG.TILE_SIZE;
            const h = CONFIG.MAP_HEIGHT*CONFIG.TILE_SIZE;
            
            // 尝试使用城市地图背景
            if (CITY_MAP_IMAGE) {

                const sw = CITY_MAP_IMAGE.width * CITY_MAP_SCALE;
                const sh = CITY_MAP_IMAGE.height * CITY_MAP_SCALE;
                ctx.drawImage(CITY_MAP_IMAGE, 0, 0, CITY_MAP_IMAGE.width, CITY_MAP_IMAGE.height, 0, 0, sw, sh);
            } else {
                // 草地背景
                const grad=ctx.createLinearGradient(0,0,0,h);
                grad.addColorStop(0,'#5a8f3e');grad.addColorStop(1,'#4a7c3f');
                ctx.fillStyle=grad;ctx.fillRect(0,0,w,h);
                
                // 草地纹理
                for(let i=0;i<CONFIG.MAP_WIDTH;i++){
                    for(let j=0;j<CONFIG.MAP_HEIGHT;j++){
                        const idx=i+j*CONFIG.MAP_WIDTH;
                        if(idx<grassPattern.length){
                            ctx.fillStyle=grassPattern[idx];
                            ctx.fillRect(i*CONFIG.TILE_SIZE+12,j*CONFIG.TILE_SIZE+12,6,8);
                        }
                    }
                }
                
                // 道路
                ctx.fillStyle='#6a6a6a';
                ctx.fillRect(7*CONFIG.TILE_SIZE, 0, 2*CONFIG.TILE_SIZE, h);
                ctx.fillRect(0, 6*CONFIG.TILE_SIZE, w, 2*CONFIG.TILE_SIZE);
                ctx.fillRect(21*CONFIG.TILE_SIZE, 0, 2*CONFIG.TILE_SIZE, h);
                ctx.fillRect(0, 20*CONFIG.TILE_SIZE, w, 2*CONFIG.TILE_SIZE);
                
                // 道路线
                ctx.fillStyle='#888';
                for(let i=0;i<w;i+=CONFIG.TILE_SIZE*2){ctx.fillRect(i+24,6*CONFIG.TILE_SIZE+8,8,4);}
            }
            
            Object.entries(LOCATIONS).forEach(([id,loc])=>drawLocation(id,loc));
        }
        
        function drawLocation(id,loc){
            const x=loc.x*CONFIG.TILE_SIZE,y=loc.y*CONFIG.TILE_SIZE,w=loc.w*CONFIG.TILE_SIZE,h=loc.h*CONFIG.TILE_SIZE;
            
            // 只显示地点名称标签（城市地图已有完整图像）
            ctx.fillStyle='#fff';ctx.font='bold 14px "Pixelify Sans",sans-serif';
            // ctx.strokeStyle='#000';ctx.lineWidth=4;ctx.strokeText(loc.name,x+8,y+18);ctx.fillText(loc.name,x+8,y+18);
        }
        function drawSchool(x,y,w,h){ctx.fillStyle='#87ceeb';ctx.fillRect(x+20,y+28,w-32,h-42);ctx.fillStyle='#4682b4';ctx.fillRect(x+14,y+18,w-20,20);ctx.fillStyle='#deb887';ctx.fillRect(x+24,y+h-18,w-40,14);for(let i=0;i<3;i++){ctx.fillStyle='#87ceeb';ctx.fillRect(x+30+i*30,y+40,22,20);}}
        function drawShop(x,y,w,h){['👕','🪑','🍳'].forEach((e,i)=>{ctx.fillStyle='#2a8a8a';ctx.fillRect(x+14+i*45,y+20,40,55);ctx.font='22px';ctx.fillText(e,x+22+i*45,y+48);});}
        
        // ==================== UI函数 ====================
        function renderAgentList(){
            const list=document.getElementById('agentList');
            list.innerHTML='';
            agents.forEach(agent=>{
                const card=document.createElement('div');
                card.className=`agent-card ${selectedAgent===agent?'selected':''}`;
                card.onclick=()=>selectAgent(agent);
                const p=agent.personalityData;
                card.innerHTML=`<div class="agent-header"><canvas class="agent-avatar" id="avatar-${agent.id}" width="44" height="44"></canvas><div><div class="agent-name">${agent.name}</div><div class="agent-personality">${p.emoji} ${p.name}</div></div></div><div class="agent-status"><span class="status-badge ${agent.mood>50?'high':agent.mood>25?'medium':'low'}">😊${Math.floor(agent.mood)}</span><span class="status-badge ${agent.energy>50?'high':agent.energy>25?'medium':'low'}">⚡${Math.floor(agent.energy)}</span><span class="status-badge">💰${agent.coins}</span></div>`;
                list.appendChild(card);
                const ac=document.getElementById(`avatar-${agent.id}`).getContext('2d');
                drawAvatar(ac,agent);
            });
        }
        function drawAvatar(ctx,a){ctx.fillStyle='#333';ctx.fillRect(16,24,12,16);ctx.fillStyle=a.skinColor;ctx.fillRect(12,10,20,16);ctx.fillStyle=a.hairColor;ctx.fillRect(10,6,24,8);ctx.fillStyle='#000';ctx.fillRect(14,16,3,3);ctx.fillRect(22,16,3,3);ctx.fillStyle=a.clothesColor;ctx.fillRect(12,28,20,12);}
        function selectAgent(a){selectedAgent=a;renderAgentList();updateLocationPanel(a.currentLocation);}
        function updateLocationPanel(id){const loc=LOCATIONS[id];if(loc){document.getElementById('locationName').textContent=loc.name;document.getElementById('locationDesc').textContent=loc.desc;}}
        function updateStats(){
            const h=Math.floor(gameTime/60),m=Math.floor(gameTime%60);
            document.getElementById('timeDisplay').textContent=`${h.toString().padStart(2,'0')}:${m.toString().padStart(2,'0')}`;
            document.getElementById('dayDisplay').textContent=`第${gameDay}天`;
            const avg=Math.floor(agents.reduce((s,a)=>s+(a.mood+a.energy+a.health)/3,0)/agents.length);
            document.getElementById('happiness').textContent=avg+'%';
            document.getElementById('coinsDisplay').textContent='💰 '+agents.reduce((s,a)=>s+a.coins,0);
            document.getElementById('weatherDisplay').textContent=WEATHER[weather];
            if(selectedAgent){document.getElementById('activityText').textContent=selectedAgent.currentActivity;updateLocationPanel(selectedAgent.currentLocation);}
        }
        function showAchievement(e,t,d){document.getElementById('AchievementEmoji').textContent=e;document.getElementById('AchievementTitle').textContent=t;document.getElementById('AchievementDesc').textContent=d;document.getElementById('achievementPopup').classList.add('show');document.getElementById('overlay').classList.add('show');setTimeout(()=>closeAchievement(),6000);}
        function closeAchievement(){document.getElementById('achievementPopup').classList.remove('show');document.getElementById('overlay').classList.remove('show');}
        
        function claimAgent(){if(!selectedAgent){alert('请先选择一个Agent');return;}showAchievement('❤️','认领成功!',`你认领了 ${selectedAgent.name}！`);}
        function setGoal(){if(!selectedAgent){alert('请先选择一个Agent');return;}document.getElementById('goalInput').value='';document.getElementById('goalPopup').style.display='block';document.getElementById('overlay').style.display='block';document.getElementById('goalInput').focus();}
        function closeGoalInput(){document.getElementById('goalPopup').style.display='none';document.getElementById('overlay').style.display='none';}
        function submitGoal(){const input=document.getElementById('goalInput').value.trim();if(!input){alert('请输入目标');return;}const locId=parseNaturalLanguageGoal(input);if(locId){selectedAgent.goToLocation(locId);showAchievement('🎯','目标设定!',`${selectedAgent.name} 将前往 ${LOCATIONS[locId].name}`);closeGoalInput();}else{alert('无法理解这个目标，请尝试更简单的表达如：去公园、买咖啡、看病等');}}
        function parseNaturalLanguageGoal(text){text=text.toLowerCase();for(const[key,locId]of Object.entries(GOAL_MAPPING)){if(text.includes(key))return locId;}return null;}
        function sendGift(){if(!selectedAgent){alert('请先选择一个Agent');return;}const gifts=[['🍎',10,0],['🎁',15,0],['📚',12,0],['💰',5,100]];const g=gifts[Math.floor(Math.random()*gifts.length)];selectedAgent.coins+=g[2];selectedAgent.mood+=g[1];showAchievement('🎁','收到礼物!',`你送给了 ${selectedAgent.name} ${g[0]}!`);}
        function quickAction(loc){if(!selectedAgent){alert('请先选择一个Agent');return;}selectedAgent.goToLocation(loc);showAchievement('➡️','出发!',`${selectedAgent.name} 前往${LOCATIONS[loc].name}`);}
        
        function gameLoop(){
            const now=Date.now(),dt=(now-lastTime)/1000;lastTime=now;
            gameTime+=dt*CONFIG.TIME_SCALE;
            if(gameTime>=CONFIG.DAY_DURATION){gameTime=0;gameDay++;showAchievement('🌅','新的一天!',`欢迎第${gameDay}天!`);}
            if(Math.random()<0.00005)weather=Math.floor(Math.random()*WEATHER.length);
            
            ctx.clearRect(0,0,canvas.width,canvas.height);
            drawMap();
            agents.forEach(a=>{a.update(dt*60);a.draw(ctx);});
            updateStats();
            requestAnimationFrame(gameLoop);
        }
        
        function init(){
            canvas=document.getElementById('gameCanvas');ctx=canvas.getContext('2d');
            canvas.width=canvas.parentElement.clientWidth;canvas.height=canvas.parentElement.clientHeight;
            initGrassPattern();
            preloadTiles().then(() => {
                console.log('✅ 像素素材加载完成');
            });
            agents.push(new Agent('a0','小明','gentle'));
            agents.push(new Agent('a1','小红','energetic'));
            agents.push(new Agent('a2','小刚','scholar'));
            renderAgentList();
            window.addEventListener('resize',()=>{canvas.width=canvas.parentElement.clientWidth;canvas.height=canvas.parentElement.clientHeight;});
            canvas.addEventListener('click',e=>{const r=canvas.getBoundingClientRect(),x=e.clientX-r.left,y=e.clientY-r.top;agents.forEach(a=>{if(Math.sqrt((a.x-x)**2+(a.y-y)**2<45))selectAgent(a);});});
            document.getElementById('goalInput').addEventListener('keypress',e=>{if(e.key==='Enter')submitGoal();});
            gameLoop();
        }
        window.onload=init;
    </script>
</body>
</html>
