<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🏙️ AgentCity - 像素都市</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --bg-dark: #1a1a2e;
            --bg-card: #16213e;
            --accent-pink: #e94560;
            --accent-cyan: #0f3460;
            --text-light: #eaeaea;
            --text-dim: #a0a0a0;
        }
        
        body {
            font-family: 'Pixelify Sans', 'Noto Sans SC', sans-serif;
            background: var(--bg-dark);
            color: var(--text-light);
            min-height: 100vh;
            overflow: hidden;
        }
        
        .app-container { 
            display: flex; 
            height: 100vh; 
            width: 100vw;
        }
        
        .sidebar {
            width: 260px;
            min-width: 260px;
            background: var(--bg-card);
            display: flex;
            flex-direction: column;
            border-right: 3px solid var(--accent-cyan);
        }
        
        .sidebar-header {
            padding: 10px;
            background: linear-gradient(135deg, var(--accent-cyan), var(--accent-pink));
            text-align: center;
        }
        
        .sidebar-header h1 { font-size: 18px; text-shadow: 2px 2px 0 #000; }
        
        .city-stats {
            display: flex;
            justify-content: space-around;
            padding: 6px;
            background: rgba(0,0,0,0.3);
            font-size: 11px;
            flex-wrap: wrap;
        }
        
        .stat-item { text-align: center; padding: 2px 4px; }
        .stat-value { font-size: 14px; font-weight: bold; color: #ffd700; }
        
        .agent-list {
            flex: 1;
            overflow-y: auto;
            padding: 6px;
        }
        
        .agent-card {
            background: linear-gradient(135deg, #2a2a4a, #1a1a3a);
            border-radius: 6px;
            padding: 6px;
            margin-bottom: 5px;
            cursor: pointer;
            transition: all 0.3s;
            border: 2px solid transparent;
        }
        
        .agent-card:hover { border-color: var(--accent-pink); }
        .agent-card.selected { border-color: #ffd700; }
        
        .agent-header { display: flex; align-items: center; gap: 5px; }
        
        .agent-avatar {
            width: 28px;
            height: 28px;
            border-radius: 3px;
            image-rendering: pixelated;
        }
        
        .agent-name { font-weight: bold; font-size: 12px; }
        .agent-personality { font-size: 9px; color: var(--text-dim); }
        
        .agent-status { display: flex; gap: 3px; margin-top: 3px; flex-wrap: wrap; }
        
        .status-badge {
            font-size: 8px;
            padding: 1px 4px;
            border-radius: 4px;
            background: rgba(255,255,255,0.1);
        }
        
        .status-badge.high { background: #4ade80; color: #000; }
        .status-badge.medium { background: #fbbf24; color: #000; }
        .status-badge.low { background: #f87171; color: #000; }
        
        .control-panel { padding: 6px; background: rgba(0,0,0,0.4); border-top: 2px solid var(--accent-cyan); }
        
        .btn {
            width: 100%;
            padding: 6px;
            margin-bottom: 3px;
            border: none;
            border-radius: 4px;
            font-family: inherit;
            font-size: 11px;
            cursor: pointer;
            font-weight: 600;
        }
        
        .btn-primary { background: linear-gradient(135deg, var(--accent-pink), #c73659); color: white; }
        .btn-secondary { background: linear-gradient(135deg, var(--accent-cyan), #0a2540); color: white; }
        .btn-gift { background: linear-gradient(135deg, #ffd700, #ffaa00); color: #000; }
        
        .quick-actions { display: flex; gap: 2px; flex-wrap: wrap; }
        
        .quick-btn {
            flex: 1;
            min-width: 55px;
            padding: 4px;
            font-size: 8px;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 3px;
            color: var(--text-light);
            cursor: pointer;
        }
        
        .quick-btn:hover { background: var(--accent-pink); }
        
        .game-area { 
            flex: 1; 
            position: relative; 
            display: flex; 
            flex-direction: column;
            min-width: 0;
        }
        
        .game-header {
            padding: 5px 10px;
            background: rgba(0,0,0,0.6);
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 11px;
        }
        
        #gameCanvas {
            flex: 1;
            width: 100%;
            image-rendering: pixelated;
            image-rendering: crisp-edges;
        }
        
        .location-panel {
            position: absolute;
            bottom: 10px;
            left: 10px;
            background: rgba(22, 33, 62, 0.95);
            border-radius: 8px;
            padding: 8px 10px;
            border: 2px solid var(--accent-cyan);
            max-width: 180px;
        }
        
        .location-name { font-size: 12px; font-weight: bold; margin-bottom: 2px; color: var(--accent-pink); }
        .location-desc { font-size: 10px; color: var(--text-dim); }
        
        .activity-panel {
            position: absolute;
            bottom: 10px;
            right: 10px;
            background: rgba(22, 33, 62, 0.95);
            border-radius: 8px;
            padding: 8px 10px;
            border: 2px solid var(--accent-pink);
            min-width: 130px;
        }
        
        .activity-title { font-size: 9px; color: var(--text-dim); margin-bottom: 2px; }
        .activity-text { font-size: 11px; font-weight: bold; }
        
        .achievement-popup {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(22, 33, 62, 0.98);
            border-radius: 14px;
            padding: 20px;
            border: 3px solid #ffd700;
            text-align: center;
            z-index: 1000;
            display: none;
            min-width: 250px;
            max-width: 90vw;
        }
        
        .achievement-popup.show { display: block; animation: popIn 0.5s ease; }
        
        @keyframes popIn {
            from { transform: translate(-50%, -50%) scale(0.5); opacity: 0; }
            to { transform: translate(-50%, -50%) scale(1); opacity: 1; }
        }
        
        .achievement-emoji { font-size: 40px; margin-bottom: 10px; }
        .achievement-title { font-size: 16px; font-weight: bold; color: #ffd700; margin-bottom: 6px; }
        .achievement-desc { font-size: 11px; color: var(--text-dim); line-height: 1.5; white-space: pre-line; }
        
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
            z-index: 999;
            display: none;
        }
        
        .overlay.show { display: block; }
        
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: var(--bg-dark); }
        ::-webkit-scrollbar-thumb { background: var(--accent-cyan); border-radius: 2px; }
    </style>
</head>
<body>
    <div class="app-container">
        <div class="sidebar">
            <div class="sidebar-header">
                <h1>🏙️ AgentCity</h1>
                <div style="font-size: 10px; opacity: 0.9;">像素乌托邦</div>
            </div>
            
            <div class="city-stats">
                <div class="stat-item">
                    <div class="stat-value" id="dayDisplay">第1天</div>
                    <div>天数</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value" id="timeDisplay">08:00</div>
                    <div>时间</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value" id="happiness">75%</div>
                    <div>幸福</div>
                </div>
            </div>
            
            <div class="agent-list" id="agentList"></div>
            
            <div class="control-panel">
                <button class="btn btn-primary" onclick="claimAgent()">认领</button>
                <button class="btn btn-secondary" onclick="setGoal()">目标</button>
                <button class="btn btn-gift" onclick="sendGift()">礼物</button>
                <div class="quick-actions">
                    <button class="quick-btn" onclick="quickAction('park')">🌸公园</button>
                    <button class="quick-btn" onclick="quickAction('cafe')">☕咖啡</button>
                    <button class="quick-btn" onclick="quickAction('hospital')">🏥医院</button>
                    <button class="quick-btn" onclick="quickAction('cinema')">🎬影院</button>
                </div>
            </div>
        </div>
        
        <div class="game-area">
            <div class="game-header">
                <div class="weather-display" id="weatherDisplay">☀️ 晴天</div>
                <div class="coins-display" id="coinsDisplay">💰 450</div>
            </div>
            <canvas id="gameCanvas"></canvas>
            
            <div class="location-panel" id="locationPanel">
                <div class="location-name" id="locationName">🏠 住宅区</div>
                <div class="location-desc" id="locationDesc">睡觉吃饭休息</div>
            </div>
            
            <div class="activity-panel">
                <div class="activity-title">当前活动</div>
                <div class="activity-text" id="activityText">休息中...</div>
            </div>
        </div>
    </div>
    
    <div class="overlay" id="overlay" onclick="closeAchievement()"></div>
    <div class="achievement-popup" id="achievementPopup">
        <div class="achievement-emoji" id="AchievementEmoji">📸</div>
        <div class="achievement-title" id="AchievementTitle">拍照成功!</div>
        <div class="achievement-desc" id="AchievementDesc">内容</div>
    </div>

    <script>
        // ==================== 配置 ====================
        const CONFIG = {
            TILE_SIZE: 40,
            MAP_WIDTH: 35,
            MAP_HEIGHT: 22,
            AGENT_SPEED: 0.9,
            TIME_SCALE: 1,
            DAY_DURATION: 24 * 60,
            MIN_STAY_TIME: 600,
            BUBBLE_DURATION: 180,
        };
        
        // 地点定义 - 扩展到14个地点
        const LOCATIONS = {
            // 左侧区域
            home: { x: 1, y: 1, w: 4, h: 3, name: '🏠 住宅区', desc: '睡觉吃饭休息', color: '#8B4513', emoji: '🏠',
                activities: ['睡觉', '吃饭', '休息', '看电视剧'] },
            cafe: { x: 1, y: 6, w: 4, h: 4, name: '☕ 咖啡厅', desc: '社交聊天交友', color: '#D2691E', emoji: '☕',
                activities: ['喝咖啡', '聊天', '看书', '约会'], menu: ['卡布奇诺', '抹茶拿铁', '水果茶', '隐藏菜单'],
                special: 'socialize' },
            shop: { x: 1, y: 12, w: 5, h: 3, name: '🛒 便利店', desc: '购物消费', color: '#20B2AA', emoji: '🛒',
                activities: ['买东西', '闲逛'] },
            restaurant: { x: 1, y: 17, w: 4, h: 3, name: '🍜 拉面馆', desc: '品尝美食', color: '#CD5C5C', emoji: '🍜',
                activities: ['吃拉面', '吃饭', '约会'], menu: ['豚骨拉面', '味噌拉面', '酱油拉面', '煎饺'],
                special: 'eat' },
            
            // 中上区域
            library: { x: 7, y: 1, w: 4, h: 4, name: '📚 图书馆', desc: '阅读学习知识', color: '#4169E1', emoji: '📚',
                activities: ['阅读小说', '学习技术', '看传记', '做笔记'],
                books: ['《Python入门》', '《JS高级》', '《算法导论》', '《乔布斯传》'],
                special: 'read' },
            hospital: { x: 7, y: 7, w: 4, h: 3, name: '🏥 医院', desc: '治病疗养', color: '#F0F0F0', emoji: '🏥',
                activities: ['体检', '看病', '打针', '心理咨询'],
                special: 'heal' },
            school: { x: 7, y: 12, w: 5, h: 3, name: '🏫 小学', desc: '童年时光', color: '#87CEEB', emoji: '🏫',
                activities: ['上课', '体育课', '课间玩耍', '考试'],
                special: 'school' },
            
            // 中下区域
            arcade: { x: 7, y: 17, w: 4, h: 4, name: '🎮 游戏机厅', desc: '娱乐竞技', color: '#9400D3', emoji: '🎮',
                activities: ['街机赛车', '投篮大赛', '抓娃娃', '21点'],
                special: 'play' },
            
            // 右上区域
            park: { x: 20, y: 1, w: 7, h: 5, name: '🌸 樱花公园', desc: '休闲放松偶遇', color: '#FFB7C5', emoji: '🌸',
                activities: ['欣赏樱花', '野餐', '喂鸽子', '放风筝', '拍照打卡'], 
                special: 'takePhoto' },
            university: { x: 20, y: 8, w: 4, h: 3, name: '🏛️ 奇迹大学', desc: '学习深造', color: '#708090', emoji: '🏛️',
                activities: ['上课', '做实验', '图书馆学习', '社团活动'],
                special: 'study' },
            cinema: { x: 26, y: 8, w: 4, h: 3, name: '🎬 电影院', desc: '看电影', color: '#2F2F2F', emoji: '🎬',
                activities: ['看动作片', '看爱情片', '看喜剧', '买爆米花'],
                special: 'movie' },
            
            // 右下区域 - 新增
            beach: { x: 20, y: 13, w: 7, h: 5, name: '🏖️ 海滩', desc: '钓鱼休闲阳光', color: '#F4A460', emoji: '🏖️',
                activities: ['钓鱼', '捡贝壳', '挖蛤蜊', '堆沙堡'],
                fish: ['小黄鱼', '鲈鱼', '金枪鱼', '龙虾', '帝王蟹'],
                special: 'fish' },
            gym: { x: 20, y: 20, w: 4, h: 2, name: '💪 健身房', desc: '锻炼身体', color: '#FF6347', emoji: '💪',
                activities: ['跑步', '举铁', '瑜伽', '游泳'],
                special: 'exercise' },
            hotel: { x: 26, y: 20, w: 4, h: 2, name: '🏨 温泉旅馆', desc: '泡温泉放松', color: '#DDA0DD', emoji: '🏨',
                activities: ['泡温泉', '按摩', 'spa', '住宿'],
                special: 'relax' },
        };
        
        // 性格系统
        const PERSONALITIES = {
            gentle: { name: '温柔', emoji: '🌸', color: '#FFB7C5', preferred: ['park', 'cafe', 'cinema'], morning: 'park', afternoon: 'cafe', evening: 'home', work: 'university' },
            energetic: { name: '活力', emoji: '⚡', color: '#FFD700', preferred: ['arcade', 'gym', 'beach'], morning: 'gym', afternoon: 'arcade', evening: 'beach', work: 'shop' },
            scholar: { name: '学者', emoji: '📚', color: '#4169E1', preferred: ['library', 'university', 'school'], morning: 'university', afternoon: 'library', evening: 'home', work: 'university' },
        };
        
        const WEATHER = ['☀️ 晴天', '🌧️ 小雨', '❄️ 小雪', '🌤️ 多云', '🌈 彩虹'];
        
        // ==================== 游戏状态 ====================
        let canvas, ctx;
        let agents = [];
        let selectedAgent = null;
        let gameTime = 8 * 60;
        let gameDay = 1;
        let weather = 0;
        let lastTime = Date.now();
        let grassPattern = [];
        
        function initGrassPattern() {
            grassPattern = [];
            for (let i = 0; i < CONFIG.MAP_WIDTH * CONFIG.MAP_HEIGHT; i++) {
                grassPattern.push(Math.random() > 0.5 ? '#4a7c3f' : '#5a8f3e');
            }
        }
        
        // ==================== Agent类 ====================
        class Agent {
            constructor(id, name, personality) {
                this.id = id;
                this.name = name;
                this.personality = personality;
                this.personalityData = PERSONALITIES[personality];
                
                this.mood = 70 + Math.random() * 20;
                this.energy = 70 + Math.random() * 20;
                this.hunger = 60 + Math.random() * 20;
                this.health = 80 + Math.random() * 20;
                this.coins = 150 + Math.floor(Math.random() * 200);
                
                this.x = (LOCATIONS.home.x + 1) * CONFIG.TILE_SIZE;
                this.y = (LOCATIONS.home.y + 1) * CONFIG.TILE_SIZE;
                this.targetX = this.x;
                this.targetY = this.y;
                this.moving = false;
                this.direction = 'down';
                this.walkFrame = 0;
                
                this.friends = [];
                this.currentLocation = 'home';
                this.stayTime = 0;
                this.currentActivity = '休息';
                this.currentEmoji = '😊';
                this.actionBubble = '';
                this.bubbleStartTime = 0;
                this.achievements = [];
                
                this.setInitialLocation();
                
                const colors = ['#FFDDBB', '#CCAA88', '#8D5524', '#E6C2A3'];
                this.skinColor = colors[Math.floor(Math.random() * colors.length)];
                this.hairColor = ['#2C1810', '#4A3728', '#8B4513', '#DAA520'][Math.floor(Math.random() * 4)];
                this.clothesColor = ['#E94560', '#0F3460', '#4ADE80', '#FBBF24'][Math.floor(Math.random() * 4)];
            }
            
            setInitialLocation() {
                if (this.personality === 'gentle') this.currentLocation = 'park';
                else if (this.personality === 'energetic') this.currentLocation = 'gym';
                else if (this.personality === 'scholar') this.currentLocation = 'library';
                
                const loc = LOCATIONS[this.currentLocation];
                this.x = (loc.x + 1) * CONFIG.TILE_SIZE;
                this.y = (loc.y + 1) * CONFIG.TILE_SIZE;
            }
            
            update(deltaTime) {
                if (!this.moving) {
                    this.hunger -= 0.0008 * deltaTime;
                    this.energy -= 0.0004 * deltaTime;
                    this.mood -= 0.0002 * deltaTime;
                }
                
                this.mood = Math.max(0, Math.min(100, this.mood));
                this.energy = Math.max(0, Math.min(100, this.energy));
                this.hunger = Math.max(0, Math.min(100, this.hunger));
                this.health = Math.max(0, Math.min(100, this.health));
                
                if (this.moving) {
                    const dx = this.targetX - this.x;
                    const dy = this.targetY - this.y;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    
                    if (dist < CONFIG.AGENT_SPEED) {
                        this.x = this.targetX;
                        this.y = this.targetY;
                        this.moving = false;
                        this.stayTime = 0;
                        this.bubbleStartTime = 0;
                        this.arrive();
                    } else {
                        this.x += (dx / dist) * CONFIG.AGENT_SPEED;
                        this.y += (dy / dist) * CONFIG.AGENT_SPEED;
                        
                        if (Math.abs(dx) > Math.abs(dy)) this.direction = dx > 0 ? 'right' : 'left';
                        else this.direction = dy > 0 ? 'down' : 'up';
                        
                        this.walkFrame = (this.walkFrame + 0.1) % 4;
                        this.currentActivity = '🚶 行走中';
                        this.currentEmoji = '🚶';
                        this.actionBubble = '';
                    }
                } else {
                    this.stayTime++;
                    this.performActivity();
                }
            }
            
            performActivity() {
                const loc = LOCATIONS[this.currentLocation];
                
                if (this.stayTime - this.bubbleStartTime > CONFIG.BUBBLE_DURATION) {
                    this.bubbleStartTime = this.stayTime;
                    this.updateActivityText();
                }
                
                // 根据地点执行活动
                if (this.currentLocation === 'home') {
                    if (this.energy < 50) { this.currentActivity = '💤 睡觉'; this.currentEmoji = '😴'; this.actionBubble = '睡觉恢复...'; this.energy += 0.015; }
                    else if (this.hunger < 40) { this.currentActivity = '🍽️ 吃饭'; this.currentEmoji = '🍚'; this.actionBubble = '在家吃饭...'; this.hunger += 0.01; }
                    else { this.currentActivity = '🏠 休息'; this.currentEmoji = '😊'; this.actionBubble = '在家放松...'; }
                }
                else if (this.currentLocation === 'park') { this.currentActivity = '🌸 赏樱'; this.currentEmoji = '🌸'; if (!this.actionBubble) this.actionBubble = '欣赏樱花...'; this.mood += 0.005; if (this.stayTime === 200) this.takePhoto(); }
                else if (this.currentLocation === 'cafe') { const d = loc.menu[Math.floor(Math.random()*loc.menu.length)]; this.currentActivity = `☕ ${d}`; this.currentEmoji = '☕'; if (!this.actionBubble) this.actionBubble = `品尝${d}...`; this.mood += 0.008; if (this.stayTime === 200) this.socialize(); }
                else if (this.currentLocation === 'library') { const b = loc.books[Math.floor(Math.random()*loc.books.length)]; this.currentActivity = '📖 阅读'; this.currentEmoji = '📚'; if (!this.actionBubble) this.actionBubble = `阅读《${b}》...`; if (this.stayTime === 250) this.readBook(b); }
                else if (this.currentLocation === 'arcade') { this.currentActivity = '🎮 游戏'; this.currentEmoji = '🎮'; if (!this.actionBubble) this.actionBubble = '玩游戏中...'; if (Math.random()<0.015){this.coins+=Math.floor(Math.random()*30)+10;this.mood+=5;} }
                else if (this.currentLocation === 'beach') { this.currentActivity = '🏖️ 海滩'; this.currentEmoji = Math.random()>0.5?'🎣':'🏖️'; if(!this.actionBubble) this.actionBubble='海边休闲...'; if(Math.random()<0.008){const f=loc.fish[Math.floor(Math.random()*loc.fish.length)];const v=loc.fish.indexOf(f)*20+20;this.coins+=v;showAchievement('🎣','钓鱼成功!',`${this.name}钓到${f}，+${v}金币!`);} this.mood+=0.003; }
                else if (this.currentLocation === 'university') { this.currentActivity = '🏛️ 学习'; this.currentEmoji = '📖'; if(!this.actionBubble) this.actionBubble = '大学上课...'; this.mood+=0.004; }
                else if (this.currentLocation === 'hospital') { this.currentActivity = '🏥 体检'; this.currentEmoji = '🏥'; if(!this.actionBubble) this.actionBubble = '做体检...'; this.health+=0.02; this.mood-=0.001; }
                else if (this.currentLocation === 'cinema') { this.currentActivity = '🎬 观影'; this.currentEmoji = '🎬'; if(!this.actionBubble) this.actionBubble = '看电影...'; this.mood+=0.01; this.coins-=20; }
                else if (this.currentLocation === 'gym') { this.currentActivity = '💪 锻炼'; this.currentEmoji = '💪'; if(!this.actionBubble) this.actionBubble = '健身中...'; this.energy-=0.005; this.mood+=0.006; }
                else if (this.currentLocation === 'restaurant') { const f=loc.menu[Math.floor(Math.random()*loc.menu.length)]; this.currentActivity = `🍜 ${f}`; this.currentEmoji = '🍜'; if(!this.actionBubble) this.actionBubble = `吃${f}...`; this.hunger+=0.02; this.mood+=0.008; this.coins-=30; }
                else if (this.currentLocation === 'hotel') { this.currentActivity = '♨️ 温泉'; this.currentEmoji = '♨️'; if(!this.actionBubble) this.actionBubble = '泡温泉中...'; this.energy+=0.015; this.mood+=0.01; this.health+=0.005; }
                else if (this.currentLocation === 'school') { this.currentActivity = '🏫 上课'; this.currentEmoji = '🏫'; if(!this.actionBubble) this.actionBubble = '小学上课...'; this.mood+=0.003; }
                else if (this.currentLocation === 'shop') { this.currentActivity = '🛒 购物'; this.currentEmoji = '🛒'; if(!this.actionBubble) this.actionBubble = '逛街中...'; }
                
                if (this.stayTime > CONFIG.MIN_STAY_TIME && Math.random() < 0.002) this.think();
            }
            
            updateActivityText() {
                const acts = {
                    home: ['在家休息...', '看电视...', '听音乐...'],
                    park: ['欣赏樱花...', '拍照打卡...', '野餐...'],
                    cafe: ['品尝咖啡...', '聊天...', '看窗外...'],
                    library: ['认真阅读...', '做笔记...', '查资料...'],
                    arcade: ['玩游戏...', '挑战高分...', '抓娃娃...'],
                    beach: ['钓鱼...', '晒太阳...', '捡贝壳...'],
                    university: ['上课...', '做实验...', '图书馆...'],
                    hospital: ['体检...', '看病...', '咨询...'],
                    cinema: ['看电影...', '买爆米花...', '等开场...'],
                    gym: ['跑步...', '举铁...', '瑜伽...'],
                    restaurant: ['吃拉面...', '吃饭...', '约会...'],
                    hotel: ['泡温泉...', '按摩...', 'spa...'],
                    school: ['上课...', '体育课...', '玩耍...'],
                    shop: ['逛街...', '看商品...'],
                };
                const list = acts[this.currentLocation] || ['活动中...'];
                this.actionBubble = list[Math.floor(Math.random() * list.length)];
            }
            
            takePhoto() {
                const scenes = ['樱花树下', '湖边', '喷泉旁', '长椅上'];
                const scene = scenes[Math.floor(Math.random()*scenes.length)];
                showAchievement('📸','拍照成功!',`📸 ${scene}\nAgent: ${this.name}\n😊 心情: ${Math.floor(this.mood)}`);
                if(!this.achievements.includes('first_photo')) this.achievements.push('first_photo');
            }
            
            socialize() {
                const other = agents.filter(a=>a.id!==this.id&&a.currentLocation==='cafe'&&!this.friends.includes(a.id));
                if(other.length>0&&Math.random()>0.3){const f=other[0];this.friends.push(f.id);f.friends.push(this.id);this.mood+=20;this.coins+=10;showAchievement('💬','认识新朋友!',`${this.name}和${f.name}成为朋友! 👋\n+10金币`);}
            }
            
            readBook(book) {
                const insights=['这本书很有启发...','学到了新知识...','值得一读...'];
                const insight=insights[Math.floor(Math.random()*insights.length)];
                const rating=Math.floor(Math.random()*3)+7;
                showAchievement('📖','读书心得!',`📚 ${book}\n💡 ${insight}\n⭐ ${rating}/10`);
            }
            
            think() {
                const hour = Math.floor(gameTime / 60);
                const prefs = this.personalityData;
                
                if (this.hunger < 15 || this.energy < 10 || this.health < 30) { this.goToLocation(this.health<30?'hospital':this.hunger<15?'restaurant':'home'); return; }
                if (this.mood < 15) { this.goToLocation('cinema'); return; }
                
                if (hour >= 22 || hour < 6) this.goToLocation('home');
                else if (hour >= 6 && hour < 9) this.goToLocation(prefs.morning);
                else if (hour >= 9 && hour < 12) this.goToLocation(this.personality==='energetic'?'shop':'university');
                else if (hour >= 12 && hour < 14) this.goToLocation('restaurant');
                else if (hour >= 14 && hour < 18) this.goToLocation(prefs.preferred[Math.floor(Math.random()*prefs.preferred.length)]);
                else if (hour >= 18 && hour < 20) this.goToLocation(Math.random()>0.5?'shop':'cinema');
                else this.goToLocation(prefs.preferred[Math.floor(Math.random()*prefs.preferred.length)]);
            }
            
            goToLocation(locationId) {
                const loc = LOCATIONS[locationId];
                if (!loc || this.currentLocation === locationId) return;
                this.targetX = (loc.x + 0.5 + Math.random()*(loc.w-1))*CONFIG.TILE_SIZE;
                this.targetY = (loc.y + 0.5 + Math.random()*(loc.h-1))*CONFIG.TILE_SIZE;
                this.currentLocation = locationId;
                this.moving = true;
                this.actionBubble = '';
            }
            
            arrive() { this.stayTime = 0; this.bubbleStartTime = 0; }
            
            draw(ctx) {
                const px = this.x, py = this.y, size = CONFIG.TILE_SIZE;
                
                ctx.fillStyle='rgba(0,0,0,0.25)';
                ctx.beginPath();ctx.ellipse(px+size/2,py+size-4,size/3,5,0,0,Math.PI*2);ctx.fill();
                
                ctx.fillStyle=this.clothesColor;
                ctx.fillRect(px+12,py+20,16,18);
                
                ctx.fillStyle='#333';
                const lo=this.moving?Math.sin(this.walkFrame*Math.PI/2)*2:0;
                ctx.fillRect(px+12,py+35,5,6+lo);ctx.fillRect(px+23,py+35,5,6-lo);
                
                ctx.fillStyle=this.skinColor;
                ctx.fillRect(px+12,py+6,16,15);
                
                ctx.fillStyle=this.hairColor;
                ctx.fillRect(px+10,py+3,20,8);ctx.fillRect(px+12,py+11,3,5);ctx.fillRect(px+25,py+11,3,5);
                
                ctx.fillStyle='#222';
                if(this.direction==='left')ctx.fillRect(px+13,py+13,2,2);
                else if(this.direction==='right')ctx.fillRect(px+25,py+13,2,2);
                else{ctx.fillRect(px+14,py+13,2,2);ctx.fillRect(px+24,py+13,2,2);}
                
                ctx.fillStyle='#c44';ctx.fillRect(px+18,py+18,4,2);
                
                if(!this.moving&&this.actionBubble){
                    ctx.font='bold 10px "Pixelify Sans",sans-serif';
                    const text=this.currentEmoji+' '+this.actionBubble;
                    const tw=ctx.measureText(text).width;
                    ctx.fillStyle='white';ctx.beginPath();ctx.roundRect(px+size/2-tw/2-5,py-22,tw+10,16,3);ctx.fill();
                    ctx.fillStyle='#333';ctx.fillText(text,px+size/2-tw/2,py-10);
                }
                
                if(selectedAgent===this){ctx.fillStyle='#FFD700';ctx.font='bold 10px sans-serif';ctx.fillText('★',px+16,py-28);}
            }
        }
        
        // ==================== 渲染函数 ====================
        function drawMap() {
            const w = CONFIG.MAP_WIDTH*CONFIG.TILE_SIZE;
            const h = CONFIG.MAP_HEIGHT*CONFIG.TILE_SIZE;
            
            const grad=ctx.createLinearGradient(0,0,0,h);
            grad.addColorStop(0,'#5a8f3e');grad.addColorStop(1,'#4a7c3f');
            ctx.fillStyle=grad;ctx.fillRect(0,0,w,h);
            
            for(let i=0;i<CONFIG.MAP_WIDTH;i++){
                for(let j=0;j<CONFIG.MAP_HEIGHT;j++){
                    const idx=i+j*CONFIG.MAP_WIDTH;
                    if(idx<grassPattern.length){
                        ctx.fillStyle=grassPattern[idx];
                        ctx.fillRect(i*CONFIG.TILE_SIZE+8,j*CONFIG.TILE_SIZE+8,5,7);
                    }
                }
            }
            
            ctx.fillStyle='#6a6a6a';
            ctx.fillRect(0,6*CONFIG.TILE_SIZE,w,2*CONFIG.TILE_SIZE);
            ctx.fillRect(6*CONFIG.TILE_SIZE,0,2*CONFIG.TILE_SIZE,h);
            ctx.fillRect(19*CONFIG.TILE_SIZE,0,2*CONFIG.TILE_SIZE,h);
            
            ctx.fillStyle='#888';
            for(let i=0;i<w;i+=CONFIG.TILE_SIZE){ctx.fillRect(i+16,6*CONFIG.TILE_SIZE+6,6,3);}
            
            Object.entries(LOCATIONS).forEach(([id,loc])=>drawLocation(id,loc));
        }
        
        function drawLocation(id,loc){
            const x=loc.x*CONFIG.TILE_SIZE,y=loc.y*CONFIG.TILE_SIZE,w=loc.w*CONFIG.TILE_SIZE,h=loc.h*CONFIG.TILE_SIZE;
            
            ctx.fillStyle=loc.color;ctx.globalAlpha=0.6;ctx.fillRect(x,y,w,h);ctx.globalAlpha=1;
            ctx.strokeStyle='#fff';ctx.lineWidth=1;ctx.strokeRect(x+2,y+2,w-4,h-4);
            
            // 各地点绘制
            if(id==='park')drawPark(x,y,w,h);
            else if(id==='home')drawHomes(x,y,w,h);
            else if(id==='cafe')drawCafe(x,y,w,h);
            else if(id==='library')drawLibrary(x,y,w,h);
            else if(id==='arcade')drawArcade(x,y,w,h);
            else if(id==='beach')drawBeach(x,y,w,h);
            else if(id==='university')drawUniversity(x,y,w,h);
            else if(id==='hospital')drawHospital(x,y,w,h);
            else if(id==='cinema')drawCinema(x,y,w,h);
            else if(id==='gym')drawGym(x,y,w,h);
            else if(id==='restaurant')drawRestaurant(x,y,w,h);
            else if(id==='hotel')drawHotel(x,y,w,h);
            else if(id==='school')drawSchool(x,y,w,h);
            else drawShop(x,y,w,h);
            
            ctx.fillStyle='#fff';ctx.font='bold 9px "Pixelify Sans",sans-serif';
            ctx.strokeStyle='#000';ctx.lineWidth=2;ctx.strokeText(loc.name,x+6,y+12);ctx.fillText(loc.name,x+6,y+12);
        }
        
        function drawPark(x,y,w,h){
            [[0.5,0.5],[2,0.5],[4,0.5],[1,2],[3,2],[5,2],[0.5,3.5],[4.5,3.5]].forEach(([tx,ty])=>drawTree(x+tx*CONFIG.TILE_SIZE,y+ty*CONFIG.TILE_SIZE,'#f2a2b8'));
            ctx.fillStyle='#5dabeb';ctx.fillRect(x+w*0.5,y+h*0.4,w*0.4,h*0.4);
        }
        function drawTree(x,y,color){
            ctx.fillStyle='#6b4423';ctx.fillRect(x+14,y+18,10,20);
            ctx.fillStyle=color;ctx.beginPath();ctx.arc(x+19,y+14,14,0,Math.PI*2);ctx.fill();
        }
        function drawHomes(x,y,w,h){['#a0522d','#cd853f','#deb887'].forEach((c,i)=>{ctx.fillStyle=c;ctx.fillRect(x+10+i*35,y+20,30,28);ctx.fillStyle='#4a4a4a';ctx.beginPath();ctx.moveTo(x+5+i*35,y+20);ctx.lineTo(x+25+i*35,y+5);ctx.lineTo(x+45+i*35,y+20);ctx.fill();});}
        function drawCafe(x,y,w,h){ctx.fillStyle='#8b5a2b';ctx.fillRect(x+30,y+30,w-50,h-50);ctx.fillStyle='#5c3d2e';ctx.beginPath();ctx.moveTo(x+20,y+30);ctx.lineTo(x+w/2,y+5);ctx.lineTo(x+w-20,y+30);ctx.fill();ctx.fillStyle='#ffe4b5';ctx.fillRect(x+40,y+45,20,25);ctx.fillRect(x+75,y+45,20,25);ctx.font='16px sans-serif';ctx.fillText('☕',x+65,y+28);}
        function drawLibrary(x,y,w,h){ctx.fillStyle='#2c4a6e';ctx.fillRect(x+20,y+25,w-35,h-40);ctx.fillStyle='#1a2d4a';ctx.beginPath();ctx.moveTo(x+12,y+25);ctx.lineTo(x+w/2,y+3);ctx.lineTo(x+w-12,y+25);ctx.fill();ctx.fillStyle='#5c3d2e';ctx.fillRect(x+45,y+55,40,50);ctx.font='16px sans-serif';ctx.fillText('📚',x+55,y+22);}
        function drawArcade(x,y,w,h){ctx.fillStyle='#4a1a6b';ctx.fillRect(x+20,y+28,w-35,h-45);ctx.fillStyle='#ff69b4';ctx.fillRect(x+25,y+32,w-45,12);ctx.fillStyle='#fff';ctx.font='bold 10px';ctx.fillText('GAME',x+35,y+42);for(let i=0;i<3;i++){ctx.fillStyle='#2a0a4a';ctx.fillRect(x+28+i*28,y+55,22,28);}}
        function drawBeach(x,y,w,h){ctx.fillStyle='#e6c288';ctx.fillRect(x,y,w,h);ctx.fillStyle='#4a90b5';ctx.fillRect(x,y+h-40,w,40);drawTree(x+30,y+35,'#228b22');drawTree(x+120,y+50,'#228b22');}
        function drawUniversity(x,y,w,h){ctx.fillStyle='#5a6a7a';ctx.fillRect(x+15,y+25,w-25,h-40);ctx.fillStyle='#3a4a5a';ctx.fillRect(x+10,y+15,w-15,18);ctx.fillStyle='#87ceeb';ctx.fillRect(x+15,y+18,15,15);ctx.fillStyle='#4a4a4a';ctx.fillRect(x+8,y+h-15,w-12,12);ctx.font='18px sans-serif';ctx.fillText('🏛️',x+30,y+50);}
        function drawHospital(x,y,w,h){ctx.fillStyle='#f5f5f5';ctx.fillRect(x+15,y+20,w-25,h-35);ctx.fillStyle='#e8e8e8';ctx.fillRect(x+10,y+12,w-15,15);ctx.fillStyle='#e94560';ctx.fillRect(x+30,y+16,15,10);ctx.font='16px sans-serif';ctx.fillText('🏥',x+50,y+45);}
        function drawCinema(x,y,w,h){ctx.fillStyle='#2f2f2f';ctx.fillRect(x+15,y+20,w-25,h-35);ctx.fillStyle='#ffd700';ctx.fillRect(x+20,y+25,w-35,25);ctx.fillStyle='#fff';ctx.font='bold 9px';ctx.fillText('CINEMA',x+28,y+40);ctx.fillStyle='#4a4a4a';ctx.fillRect(x+10,y+h-12,w-15,10);}
        function drawGym(x,y,w,h){ctx.fillStyle='#ff6347';ctx.fillRect(x+10,y+15,w-18,h-25);ctx.fillStyle='#8b0000';ctx.fillRect(x+15,y+20,w-28,20);ctx.fillStyle='#fff';ctx.fillRect(x+20,y+25,8,12);ctx.fillRect(x+40,y+25,8,12);ctx.font='14px sans-serif';ctx.fillText('💪',x+35,y+h-8);}
        function drawRestaurant(x,y,w,h){ctx.fillStyle='#cd5c5c';ctx.fillRect(x+20,y+25,w-35,h-40);ctx.fillStyle='#8b0000';ctx.beginPath();ctx.moveTo(x+12,y+25);ctx.lineTo(x+w/2,y+3);ctx.lineTo(x+w-12,y+25);ctx.fill();ctx.font='16px sans-serif';ctx.fillText('🍜',x+55,y+55);}
        function drawHotel(x,y,w,h){ctx.fillStyle='#dda0dd';ctx.fillRect(x+15,y+15,w-25,h-25);ctx.fillStyle='#ba55d3';ctx.fillRect(x+10,y+8,w-15,15);ctx.fillStyle='#4a4a4a';ctx.fillRect(x+20,y+25,12,25);ctx.fillRect(x+45,y+25,12,25);ctx.fillStyle='#ffe4b5';ctx.fillRect(x+23,y+28,6,8);ctx.fillRect(x+48,y+28,6,8);ctx.font='14px sans-serif';ctx.fillText('♨️',x+50,y+h-6);}
        function drawSchool(x,y,w,h){ctx.fillStyle='#87ceeb';ctx.fillRect(x+15,y+20,w-25,h-35);ctx.fillStyle='#4682b4';ctx.fillRect(x+10,y+10,w-15,18);ctx.fillStyle='#deb887';ctx.fillRect(x+20,y+h-12,w-35,10);for(let i=0;i<3;i++){ctx.fillStyle='#87ceeb';ctx.fillRect(x+25+i*25,y+30,18,15);}}
        function drawShop(x,y,w,h){['👕','🪑','🍳'].forEach((e,i)=>{ctx.fillStyle='#2a8a8a';ctx.fillRect(x+10+i*38,y+15,35,45);ctx.font='16px';ctx.fillText(e,x+18+i*38,y+40);});}
        
        // ==================== UI函数 ====================
        function renderAgentList(){
            const list=document.getElementById('agentList');
            list.innerHTML='';
            agents.forEach(agent=>{
                const card=document.createElement('div');
                card.className=`agent-card ${selectedAgent===agent?'selected':''}`;
                card.onclick=()=>selectAgent(agent);
                const p=agent.personalityData;
                card.innerHTML=`<div class="agent-header"><canvas class="agent-avatar" id="avatar-${agent.id}" width="28" height="28"></canvas><div><div class="agent-name">${agent.name}</div><div class="agent-personality">${p.emoji} ${p.name}</div></div></div><div class="agent-status"><span class="status-badge ${agent.mood>50?'high':agent.mood>25?'medium':'low'}">😊${Math.floor(agent.mood)}</span><span class="status-badge ${agent.energy>50?'high':agent.energy>25?'medium':'low'}">⚡${Math.floor(agent.energy)}</span><span class="status-badge">💰${agent.coins}</span></div>`;
                list.appendChild(card);
                const ac=document.getElementById(`avatar-${agent.id}`).getContext('2d');
                drawAvatar(ac,agent);
            });
        }
        function drawAvatar(ctx,a){ctx.fillStyle='#333';ctx.fillRect(10,16,8,8);ctx.fillStyle=a.skinColor;ctx.fillRect(8,7,12,10);ctx.fillStyle=a.hairColor;ctx.fillRect(7,4,14,5);ctx.fillStyle='#000';ctx.fillRect(9,10,2,2);ctx.fillRect(13,10,2,2);ctx.fillStyle=a.clothesColor;ctx.fillRect(8,18,12,7);}
        function selectAgent(a){selectedAgent=a;renderAgentList();updateLocationPanel(a.currentLocation);}
        function updateLocationPanel(id){const loc=LOCATIONS[id];if(loc){document.getElementById('locationName').textContent=loc.name;document.getElementById('locationDesc').textContent=loc.desc;}}
        function updateStats(){
            const h=Math.floor(gameTime/60),m=Math.floor(gameTime%60);
            document.getElementById('timeDisplay').textContent=`${h.toString().padStart(2,'0')}:${m.toString().padStart(2,'0')}`;
            document.getElementById('dayDisplay').textContent=`第${gameDay}天`;
            const avg=Math.floor(agents.reduce((s,a)=>s+(a.mood+a.energy+a.health)/3,0)/agents.length);
            document.getElementById('happiness').textContent=avg+'%';
            document.getElementById('coinsDisplay').textContent='💰 '+agents.reduce((s,a)=>s+a.coins,0);
            document.getElementById('weatherDisplay').textContent=WEATHER[weather];
            if(selectedAgent){document.getElementById('activityText').textContent=selectedAgent.currentActivity;updateLocationPanel(selectedAgent.currentLocation);}
        }
        function showAchievement(e,t,d){document.getElementById('AchievementEmoji').textContent=e;document.getElementById('AchievementTitle').textContent=t;document.getElementById('AchievementDesc').textContent=d;document.getElementById('achievementPopup').classList.add('show');document.getElementById('overlay').classList.add('show');setTimeout(()=>closeAchievement(),5000);}
        function closeAchievement(){document.getElementById('achievementPopup').classList.remove('show');document.getElementById('overlay').classList.remove('show');}
        
        function claimAgent(){if(!selectedAgent){alert('请先选择一个Agent');return;}showAchievement('❤️','认领成功!',`你认领了 ${selectedAgent.name}！`);}
        function setGoal(){if(!selectedAgent){alert('请先选择一个Agent');return;}const goals=[{loc:'park',t:'公园'},{loc:'cafe',t:'咖啡厅'},{loc:'cinema',t:'电影院'},{loc:'gym',t:'健身房'},{loc:'university',t:'大学'},{loc:'beach',t:'海滩'},{loc:'home',t:'回家'}];const g=goals[Math.floor(Math.random()*goals.length)];selectedAgent.goToLocation(g.loc);showAchievement('🎯','设立目标!',`${selectedAgent.name} 去${g.t}`);}
        function sendGift(){if(!selectedAgent){alert('请先选择一个Agent');return;}const gifts=[['🍎',10,0],['🎁',15,0],['📚',12,0],['💰',5,100]];const g=gifts[Math.floor(Math.random()*gifts.length)];selectedAgent.coins+=g[2];selectedAgent.mood+=g[1];showAchievement('🎁','收到礼物!',`你送给了 ${selectedAgent.name} ${g[0]}!`);}
        function quickAction(loc){if(!selectedAgent){alert('请先选择一个Agent');return;}selectedAgent.goToLocation(loc);showAchievement('➡️','出发!',`${selectedAgent.name} 前往${LOCATIONS[loc].name}`);}
        
        function gameLoop(){
            const now=Date.now(),dt=(now-lastTime)/1000;lastTime=now;
            gameTime+=dt*CONFIG.TIME_SCALE;
            if(gameTime>=CONFIG.DAY_DURATION){gameTime=0;gameDay++;showAchievement('🌅','新的一天!',`欢迎第${gameDay}天!`);}
            if(Math.random()<0.00005)weather=Math.floor(Math.random()*WEATHER.length);
            
            ctx.clearRect(0,0,canvas.width,canvas.height);
            drawMap();
            agents.forEach(a=>{a.update(dt*60);a.draw(ctx);});
            updateStats();
            requestAnimationFrame(gameLoop);
        }
        
        function init(){
            canvas=document.getElementById('gameCanvas');ctx=canvas.getContext('2d');
            canvas.width=canvas.parentElement.clientWidth;canvas.height=canvas.parentElement.clientHeight;
            initGrassPattern();
            agents.push(new Agent('a0','小明','gentle'));
            agents.push(new Agent('a1','小红','energetic'));
            agents.push(new Agent('a2','小刚','scholar'));
            renderAgentList();
            window.addEventListener('resize',()=>{canvas.width=canvas.parentElement.clientWidth;canvas.height=canvas.parentElement.clientHeight;});
            canvas.addEventListener('click',e=>{const r=canvas.getBoundingClientRect(),x=e.clientX-r.left,y=e.clientY-r.top;agents.forEach(a=>{if(Math.sqrt((a.x-x)**2+(a.y-y)**2<35))selectAgent(a);});});
            gameLoop();
        }
        window.onload=init;
    </script>
</body>
</html>
