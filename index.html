<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🏙️ AgentCity - 智能体之城</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Pixelify+Sans:wght@400;600;700&display=swap');
    
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    :root {
      --sky-blue: #87CEEB;
      --grass-green: #90EE90;
      --wall-cream: #FFF8DC;
      --roof-red: #CD5C5C;
      --sakura-pink: #FFB7C5;
      --night-purple: #4B0082;
      --light-yellow: #FFE4B5;
      --text-dark: #2c3e50;
      --text-light: #ecf0f1;
    }
    
    body {
      font-family: 'Pixelify Sans', 'Microsoft YaHei', sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      min-height: 100vh;
      color: var(--text-light);
    }
    
    /* Header */
    .header {
      background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
      padding: 1rem 2rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      box-shadow: 0 4px 20px rgba(0,0,0,0.3);
    }
    
    .logo {
      font-size: 1.8rem;
      text-shadow: 2px 2px 0 rgba(0,0,0,0.3);
    }
    
    .logo span {
      color: var(--sakura-pink);
    }
    
    .stats-bar {
      display: flex;
      gap: 1.5rem;
      font-size: 0.9rem;
    }
    
    .stat-item {
      display: flex;
      align-items: center;
      gap: 0.3rem;
      background: rgba(255,255,255,0.15);
      padding: 0.4rem 0.8rem;
      border-radius: 20px;
    }
    
    /* Main Layout */
    .main-container {
      display: grid;
      grid-template-columns: 280px 1fr 320px;
      gap: 1rem;
      padding: 1rem;
      height: calc(100vh - 70px);
    }
    
    /* Panels */
    .panel {
      background: rgba(255,255,255,0.08);
      border-radius: 16px;
      padding: 1rem;
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.1);
      overflow-y: auto;
    }
    
    .panel-title {
      font-size: 1.1rem;
      margin-bottom: 1rem;
      padding-bottom: 0.5rem;
      border-bottom: 2px solid var(--sakura-pink);
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    
    /* Agent List */
    .agent-list {
      display: flex;
      flex-direction: column;
      gap: 0.8rem;
    }
    
    .agent-card {
      background: linear-gradient(135deg, rgba(255,255,255,0.1) 0%, rgba(255,255,255,0.05) 100%);
      border-radius: 12px;
      padding: 0.8rem;
      cursor: pointer;
      transition: all 0.3s ease;
      border: 2px solid transparent;
    }
    
    .agent-card:hover {
      transform: translateY(-2px);
      border-color: var(--sakura-pink);
    }
    
    .agent-card.selected {
      border-color: #f39c12;
      box-shadow: 0 0 20px rgba(243, 156, 18, 0.3);
    }
    
    .agent-card-header {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      margin-bottom: 0.5rem;
    }
    
    .agent-avatar {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--sakura-pink), #ff6b9d);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.2rem;
    }
    
    .agent-name {
      font-weight: 600;
    }
    
    .agent-personality {
      font-size: 0.75rem;
      color: #aaa;
    }
    
    .agent-status {
      display: flex;
      gap: 0.5rem;
      font-size: 0.75rem;
      flex-wrap: wrap;
    }
    
    .status-tag {
      padding: 0.2rem 0.5rem;
      border-radius: 10px;
      background: rgba(255,255,255,0.1);
    }
    
    .status-tag.good { background: rgba(46, 204, 113, 0.3); }
    .status-tag.warning { background: rgba(241, 196, 15, 0.3); }
    .status-tag.bad { background: rgba(231, 76, 60, 0.3); }
    
    /* City View */
    .city-view {
      position: relative;
      background: linear-gradient(180deg, #87CEEB 0%, #90EE90 100%);
      border-radius: 16px;
      overflow: hidden;
      min-height: 500px;
    }
    
    .city-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      grid-template-rows: repeat(3, 1fr);
      gap: 8px;
      padding: 12px;
      height: 100%;
    }
    
    .location-tile {
      background: rgba(255,255,255,0.25);
      border-radius: 12px;
      padding: 0.8rem;
      position: relative;
      transition: all 0.3s ease;
      cursor: pointer;
      min-height: 100px;
    }
    
    .location-tile:hover {
      background: rgba(255,255,255,0.4);
      transform: scale(1.02);
    }
    
    .location-tile .location-name {
      font-size: 0.85rem;
      font-weight: 600;
      color: #2c3e50;
      margin-bottom: 0.3rem;
    }
    
    .location-tile .location-desc {
      font-size: 0.7rem;
      color: #555;
    }
    
    .location-tile .agent-count {
      position: absolute;
      top: 8px;
      right: 8px;
      background: rgba(0,0,0,0.2);
      padding: 0.2rem 0.5rem;
      border-radius: 10px;
      font-size: 0.7rem;
    }
    
    /* Agent Sprites in City */
    .agent-sprite {
      position: absolute;
      width: 32px;
      height: 32px;
      background: var(--sakura-pink);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1rem;
      box-shadow: 0 2px 8px rgba(0,0,0,0.2);
      transition: all 0.5s ease;
      cursor: pointer;
      z-index: 10;
    }
    
    .agent-sprite:hover {
      transform: scale(1.2);
      z-index: 20;
    }
    
    /* Detail Panel */
    .detail-agent {
      display: none;
    }
    
    .detail-agent.active {
      display: block;
    }
    
    .detail-header {
      text-align: center;
      margin-bottom: 1rem;
    }
    
    .detail-avatar {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--sakura-pink), #ff6b9d);
      margin: 0 auto 0.5rem;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2rem;
    }
    
    .detail-name {
      font-size: 1.3rem;
    }
    
    .detail-bio {
      font-size: 0.8rem;
      color: #aaa;
      margin-top: 0.3rem;
    }
    
    .stats-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.8rem;
      margin-bottom: 1rem;
    }
    
    .stat-bar {
      background: rgba(0,0,0,0.3);
      border-radius: 8px;
      padding: 0.6rem;
    }
    
    .stat-bar-label {
      display: flex;
      justify-content: space-between;
      font-size: 0.75rem;
      margin-bottom: 0.3rem;
    }
    
    .stat-bar-track {
      height: 8px;
      background: rgba(255,255,255,0.1);
      border-radius: 4px;
      overflow: hidden;
    }
    
    .stat-bar-fill {
      height: 100%;
      border-radius: 4px;
      transition: width 0.5s ease;
    }
    
    .stat-bar-fill.mood { background: linear-gradient(90deg, #ff6b9d, #f39c12); }
    .stat-bar-fill.energy { background: linear-gradient(90deg, #3498db, #2ecc71); }
    .stat-bar-fill.hunger { background: linear-gradient(90deg, #e74c3c, #f39c12); }
    .stat-bar-fill.social { background: linear-gradient(90deg, #9b59b6, #3498db); }
    
    /* Mood Log */
    .mood-log {
      background: rgba(0,0,0,0.2);
      border-radius: 10px;
      padding: 0.8rem;
      max-height: 200px;
      overflow-y: auto;
    }
    
    .mood-entry {
      font-size: 0.75rem;
      padding: 0.4rem;
      border-bottom: 1px solid rgba(255,255,255,0.1);
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    
    .mood-entry:last-child {
      border-bottom: none;
    }
    
    /* Action Buttons */
    .action-buttons {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.5rem;
      margin-top: 1rem;
    }
    
    .action-btn {
      padding: 0.6rem;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-family: inherit;
      font-size: 0.85rem;
      transition: all 0.2s ease;
    }
    
    .action-btn:hover {
      transform: translateY(-2px);
    }
    
    .action-btn.claim {
      background: linear-gradient(135deg, #f39c12, #e67e22);
      color: white;
      grid-column: span 2;
    }
    
    .action-btn.goal {
      background: linear-gradient(135deg, #3498db, #2980b9);
      color: white;
    }
    
    .action-btn.observe {
      background: linear-gradient(135deg, #9b59b6, #8e44ad);
      color: white;
    }
    
    /* Claim Panel */
    .claim-panel {
      display: none;
      margin-top: 1rem;
      padding: 1rem;
      background: rgba(243, 156, 18, 0.2);
      border-radius: 10px;
    }
    
    .claim-panel.active {
      display: block;
    }
    
    .goal-input {
      width: 100%;
      padding: 0.6rem;
      border: none;
      border-radius: 8px;
      background: rgba(255,255,255,0.9);
      font-family: inherit;
      margin-bottom: 0.5rem;
    }
    
    .btn {
      padding: 0.6rem 1.2rem;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-family: inherit;
      font-weight: 600;
      transition: all 0.2s;
    }
    
    .btn-primary {
      background: linear-gradient(135deg, #2ecc71, #27ae60);
      color: white;
    }
    
    /* Activity Log */
    .activity-log {
      margin-top: 1rem;
      padding: 0.8rem;
      background: rgba(0,0,0,0.2);
      border-radius: 10px;
      max-height: 150px;
      overflow-y: auto;
    }
    
    .activity-entry {
      font-size: 0.75rem;
      padding: 0.3rem 0;
      border-bottom: 1px solid rgba(255,255,255,0.05);
    }
    
    .activity-entry .time {
      color: #888;
      margin-right: 0.5rem;
    }
    
    /* Time Display */
    .time-display {
      position: absolute;
      top: 10px;
      left: 10px;
      background: rgba(0,0,0,0.5);
      padding: 0.4rem 0.8rem;
      border-radius: 20px;
      font-size: 0.85rem;
      z-index: 100;
    }
    
    /* Responsive */
    @media (max-width: 1200px) {
      .main-container {
        grid-template-columns: 1fr;
      }
      .city-view {
        min-height: 400px;
      }
    }
    
    /* Scrollbar */
    ::-webkit-scrollbar {
      width: 6px;
    }
    ::-webkit-scrollbar-track {
      background: rgba(0,0,0,0.2);
    }
    ::-webkit-scrollbar-thumb {
      background: rgba(255,255,255,0.3);
      border-radius: 3px;
    }
  </style>
</head>
<body>
  <header class="header">
    <div class="logo">🏙️ Agent<span>City</span></div>
    <div class="stats-bar">
      <div class="stat-item">
        <span>🤖</span>
        <span id="total-agents">8</span> Agent
      </div>
      <div class="stat-item">
        <span>👥</span>
        <span id="claimed-agents">0</span> 已认领
      </div>
      <div class="stat-item">
        <span>💖</span>
        <span id="avg-happiness">50</span>% 幸福度
      </div>
      <div class="stat-item">
        <span>🤝</span>
        <span id="total-friends">0</span> 友谊
      </div>
    </div>
  </header>

  <main class="main-container">
    <!-- Agent List Panel -->
    <aside class="panel">
      <h2 class="panel-title">🏘️ 居民列表</h2>
      <div class="agent-list" id="agent-list"></div>
    </aside>

    <!-- City View -->
    <section class="city-view" id="city-view">
      <div class="time-display">⏰ 第 <span id="day-count">1</span> 天 <span id="time-of-day">白天</span></div>
      <div class="city-grid" id="city-grid"></div>
    </section>

    <!-- Agent Detail Panel -->
    <aside class="panel">
      <h2 class="panel-title">👤 居民详情</h2>
      <div class="detail-agent" id="detail-agent">
        <div class="detail-header">
          <div class="detail-avatar" id="detail-avatar">🌸</div>
          <div class="detail-name" id="detail-name">小悠</div>
          <div class="detail-bio" id="detail-bio">温柔的女孩</div>
        </div>
        
        <div class="stats-grid">
          <div class="stat-bar">
            <div class="stat-bar-label">
              <span>💖 心情</span>
              <span id="stat-mood">70</span>
            </div>
            <div class="stat-bar-track">
              <div class="stat-bar-fill mood" id="bar-mood" style="width: 70%"></div>
            </div>
          </div>
          <div class="stat-bar">
            <div class="stat-bar-label">
              <span>⚡ 精力</span>
              <span id="stat-energy">80</span>
            </div>
            <div class="stat-bar-track">
              <div class="stat-bar-fill energy" id="bar-energy" style="width: 80%"></div>
            </div>
          </div>
          <div class="stat-bar">
            <div class="stat-bar-label">
              <span>🍜 饥饿</span>
              <span id="stat-hunger">70</span>
            </div>
            <div class="stat-bar-track">
              <div class="stat-bar-fill hunger" id="bar-hunger" style="width: 70%"></div>
            </div>
          </div>
          <div class="stat-bar">
            <div class="stat-bar-label">
              <span>💬 社交</span>
              <span id="stat-social">50</span>
            </div>
            <div class="stat-bar-track">
              <div class="stat-bar-fill social" id="bar-social" style="width: 50%"></div>
            </div>
          </div>
        </div>
        
        <div class="mood-log" id="mood-log">
          <div style="color: #888; font-size: 0.75rem; text-align: center;">暂无心情记录</div>
        </div>
        
        <div class="action-buttons">
          <button class="action-btn claim" id="btn-claim">🎯 认领此Agent</button>
          <button class="action-btn goal" id="btn-set-goal">📋 设立目标</button>
          <button class="action-btn observe" id="btn-observe">👀 观察活动</button>
        </div>
        
        <div class="claim-panel" id="claim-panel">
          <input type="text" class="goal-input" id="goal-input" placeholder="输入目标，如：去交一个新朋友">
          <button class="btn btn-primary" id="btn-send-goal">发送目标</button>
        </div>
        
        <div class="activity-log" id="activity-log">
          <div style="color: #888; font-size: 0.75rem; text-align: center;">活动日志</div>
        </div>
      </div>
      
      <div class="detail-agent" id="no-selection" style="display: block;">
        <div style="text-align: center; padding: 2rem; color: #888;">
          <p style="font-size: 3rem; margin-bottom: 1rem;">👈</p>
          <p>点击左侧居民查看详情</p>
        </div>
      </div>
    </aside>
  </main>

  <script type="module">
    // 导入引擎
    import { AgentCity, createDemoCity, ACTION_CONFIG, LOCATIONS } from './src/engine.ts';
    
    // 初始化城市
    const city = createDemoCity();
    let selectedAgentId = null;
    let tickInterval = null;
    
    // UI更新函数
    function updateUI() {
      // 更新统计
      const stats = city.getCityStats();
      document.getElementById('total-agents').textContent = stats.totalAgents;
      document.getElementById('claimed-agents').textContent = stats.claimedAgents;
      document.getElementById('avg-happiness').textContent = stats.averageHappiness;
      document.getElementById('total-friends').textContent = stats.totalFriendships;
      
      // 更新居民列表
      updateAgentList();
      
      // 更新城市视图
      updateCityView();
      
      // 更新详情面板
      if (selectedAgentId) {
        updateDetailPanel(selectedAgentId);
      }
    }
    
    function updateAgentList() {
      const listEl = document.getElementById('agent-list');
      listEl.innerHTML = '';
      
      for (const agent of city.getAllAgents()) {
        const card = document.createElement('div');
        card.className = `agent-card ${selectedAgentId === agent.state.id ? 'selected' : ''}`;
        card.onclick = () => selectAgent(agent.state.id);
        
        const personalityEmoji = {
          gentle: '🌸', energetic: '⚡', scholar: '📚',
          artistic: '🎨', cool: '😎', shy: '🐱',
          mischief: '🦊', leader: '🌟'
        }[agent.state.personality];
        
        card.innerHTML = `
          <div class="agent-card-header">
            <div class="agent-avatar">${personalityEmoji}</div>
            <div>
              <div class="agent-name">${agent.state.name}</div>
              <div class="agent-personality">${agent.state.personality}</div>
            </div>
          </div>
          <div class="agent-status">
            <span class="status-tag ${agent.state.mood > 50 ? 'good' : agent.state.mood > 30 ? 'warning' : 'bad'}">💖${agent.state.mood}</span>
            <span class="status-tag ${agent.state.energy > 50 ? 'good' : agent.state.energy > 30 ? 'warning' : 'bad'}">⚡${agent.state.energy}</span>
            <span class="status-tag ${agent.state.hunger > 50 ? 'good' : agent.state.hunger > 30 ? 'warning' : 'bad'}">🍜${agent.state.hunger}</span>
            <span class="status-tag ${agent.state.owner ? 'good' : ''}">${agent.state.owner ? '👤已认领' : '🆓可认领'}</span>
          </div>
        `;
        
        listEl.appendChild(card);
      }
    }
    
    function updateCityView() {
      const gridEl = document.getElementById('city-grid');
      
      // 显示位置分布
      const locations = LOCATIONS.slice(0, 12);
      gridEl.innerHTML = '';
      
      for (const loc of locations) {
        const agentsAtLoc = city.getAgentsAtLocation(loc.id);
        const tile = document.createElement('div');
        tile.className = 'location-tile';
        tile.innerHTML = `
          <div class="location-name">${loc.name}</div>
          <div class="location-desc">${loc.description}</div>
          <div class="agent-count">👥 ${agentsAtLoc.length}</div>
        `;
        
        // 添加Agent sprite
        agentsAtLoc.forEach((agent, idx) => {
          const sprite = document.createElement('div');
          sprite.className = 'agent-sprite';
          sprite.textContent = ['🌸', '⚡', '📚', '🎨', '😎', '🐱', '🦊', '🌟'][agent.state.personality === 'gentle' ? 0 : 
            agent.state.personality === 'energetic' ? 1 :
            agent.state.personality === 'scholar' ? 2 :
            agent.state.personality === 'artistic' ? 3 :
            agent.state.personality === 'cool' ? 4 :
            agent.state.personality === 'shy' ? 5 :
            agent.state.personality === 'mischief' ? 6 : 7];
          sprite.style.left = `${10 + (idx % 4) * 22 + Math.random() * 10}px`;
          sprite.style.top = `${40 + Math.floor(idx / 4) * 25 + Math.random() * 10}px`;
          sprite.title = agent.state.name;
          sprite.onclick = (e) => {
            e.stopPropagation();
            selectAgent(agent.state.id);
          };
          tile.appendChild(sprite);
        });
        
        gridEl.appendChild(tile);
      }
    }
    
    function updateDetailPanel(agentId) {
      const agent = city.agents.get(agentId);
      if (!agent) return;
      
      document.getElementById('no-selection').style.display = 'none';
      document.getElementById('detail-agent').classList.add('active');
      
      const personalityEmoji = {
        gentle: '🌸', energetic: '⚡', scholar: '📚',
        artistic: '🎨', cool: '😎', shy: '🐱',
        mischief: '🦊', leader: '🌟'
      }[agent.state.personality];
      
      document.getElementById('detail-avatar').textContent = personalityEmoji;
      document.getElementById('detail-name').textContent = agent.state.name;
      document.getElementById('detail-bio').textContent = agent.state.bio;
      
      document.getElementById('stat-mood').textContent = agent.state.mood;
      document.getElementById('bar-mood').style.width = `${agent.state.mood}%`;
      document.getElementById('stat-energy').textContent = agent.state.energy;
      document.getElementById('bar-energy').style.width = `${agent.state.energy}%`;
      document.getElementById('stat-hunger').textContent = agent.state.hunger;
      document.getElementById('bar-hunger').style.width = `${agent.state.hunger}%`;
      document.getElementById('stat-social').textContent = agent.state.social;
      document.getElementById('bar-social').style.width = `${agent.state.social}%`;
      
      // 更新心情日志
      const moodLogEl = document.getElementById('mood-log');
      const recentMood = agent.state.moodLog.slice(-5).reverse();
      if (recentMood.length > 0) {
        moodLogEl.innerHTML = recentMood.map(entry => `
          <div class="mood-entry">
            <span>${ACTION_CONFIG[entry.activity]?.emoji || '💭'}</span>
            <span>${entry.note}</span>
          </div>
        `).join('');
      }
      
      // 更新认领按钮
      const claimBtn = document.getElementById('btn-claim');
      if (agent.state.owner) {
        claimBtn.textContent = '✓ 已认领';
        claimBtn.disabled = true;
      } else {
        claimBtn.textContent = '🎯 认领此Agent';
        claimBtn.disabled = false;
      }
    }
    
    function selectAgent(agentId) {
      selectedAgentId = agentId;
      updateUI();
    }
    
    // 运行城市tick
    async function runTick() {
      await city.tick();
      
      // 更新天数
      const ticks = parseInt(document.getElementById('day-count').textContent) || 1;
      const timeEl = document.getElementById('time-of-day');
      
      if (ticks % 24 === 0) {
        document.getElementById('day-count').textContent = ticks + 1;
        timeEl.textContent = '白天';
      } else if (ticks % 24 === 12) {
        timeEl.textContent = '夜晚';
      }
      
      updateUI();
    }
    
    // 事件监听
    document.getElementById('btn-claim').addEventListener('click', () => {
      if (!selectedAgentId) return;
      const agent = city.agents.get(selectedAgentId);
      if (agent && !agent.state.owner) {
        agent.beClaimed('user');
        alert(`🎉 成功认领 ${agent.state.name}！\n现在你可以给它设立目标了~`);
        updateUI();
      }
    });
    
    document.getElementById('btn-set-goal').addEventListener('click', () => {
      const panel = document.getElementById('claim-panel');
      panel.classList.toggle('active');
    });
    
    document.getElementById('btn-send-goal').addEventListener('click', async () => {
      if (!selectedAgentId) return;
      const goal = document.getElementById('goal-input').value;
      if (!goal) return;
      
      const agent = city.agents.get(selectedAgentId);
      if (agent) {
        const result = await agent.executeGoal(goal);
        
        // 添加到活动日志
        const logEl = document.getElementById('activity-log');
        const entry = document.createElement('div');
        entry.className = 'activity-entry';
        entry.innerHTML = `<span class="time">刚刚</span> ${result.message}`;
        logEl.insertBefore(entry, logEl.firstChild);
        
        document.getElementById('goal-input').value = '';
        document.getElementById('claim-panel').classList.remove('active');
        
        updateUI();
      }
    });
    
    document.getElementById('btn-observe').addEventListener('click', () => {
      if (!selectedAgentId) return;
      const agent = city.agents.get(selectedAgentId);
      if (agent) {
        const status = agent.getStatus();
        alert(`📊 ${agent.state.name} 的实时状态：\n\n${status}\n\n当前位置：${agent.state.currentLocation}\n当前行为：${agent.state.currentAction}\n金币：${agent.state.coins}\n朋友数：${agent.state.friends.length}`);
      }
    });
    
    // 启动
    updateUI();
    
    // 每3秒运行一次tick
    tickInterval = setInterval(runTick, 3000);
  </script>
</body>
</html>
