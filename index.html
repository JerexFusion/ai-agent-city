<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🏙️ AgentCity - 像素都市</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --bg-dark: #1a1a2e;
            --bg-card: #16213e;
            --accent-pink: #e94560;
            --accent-cyan: #0f3460;
            --text-light: #eaeaea;
            --text-dim: #a0a0a0;
        }
        
        body {
            font-family: 'Pixelify Sans', 'Noto Sans SC', sans-serif;
            background: var(--bg-dark);
            color: var(--text-light);
            min-height: 100vh;
            overflow: hidden;
        }
        
        .app-container { 
            display: flex; 
            height: 100vh; 
            width: 100vw;
        }
        
        .sidebar {
            width: 280px;
            min-width: 280px;
            background: var(--bg-card);
            display: flex;
            flex-direction: column;
            border-right: 3px solid var(--accent-cyan);
        }
        
        .sidebar-header {
            padding: 12px;
            background: linear-gradient(135deg, var(--accent-cyan), var(--accent-pink));
            text-align: center;
        }
        
        .sidebar-header h1 { font-size: 20px; text-shadow: 2px 2px 0 #000; }
        
        .city-stats {
            display: flex;
            justify-content: space-around;
            padding: 8px;
            background: rgba(0,0,0,0.3);
            font-size: 12px;
            flex-wrap: wrap;
        }
        
        .stat-item { text-align: center; padding: 2px 5px; }
        .stat-value { font-size: 16px; font-weight: bold; color: #ffd700; }
        
        .agent-list {
            flex: 1;
            overflow-y: auto;
            padding: 8px;
        }
        
        .agent-card {
            background: linear-gradient(135deg, #2a2a4a, #1a1a3a);
            border-radius: 8px;
            padding: 8px;
            margin-bottom: 6px;
            cursor: pointer;
            transition: all 0.3s;
            border: 2px solid transparent;
        }
        
        .agent-card:hover { border-color: var(--accent-pink); }
        .agent-card.selected { border-color: #ffd700; }
        
        .agent-header { display: flex; align-items: center; gap: 6px; }
        
        .agent-avatar {
            width: 32px;
            height: 32px;
            border-radius: 4px;
            image-rendering: pixelated;
        }
        
        .agent-name { font-weight: bold; font-size: 13px; }
        .agent-personality { font-size: 10px; color: var(--text-dim); }
        
        .agent-status { display: flex; gap: 4px; margin-top: 4px; flex-wrap: wrap; }
        
        .status-badge {
            font-size: 9px;
            padding: 2px 5px;
            border-radius: 6px;
            background: rgba(255,255,255,0.1);
        }
        
        .status-badge.high { background: #4ade80; color: #000; }
        .status-badge.medium { background: #fbbf24; color: #000; }
        .status-badge.low { background: #f87171; color: #000; }
        
        .control-panel { padding: 8px; background: rgba(0,0,0,0.4); border-top: 2px solid var(--accent-cyan); }
        
        .btn {
            width: 100%;
            padding: 8px;
            margin-bottom: 4px;
            border: none;
            border-radius: 5px;
            font-family: inherit;
            font-size: 12px;
            cursor: pointer;
            font-weight: 600;
        }
        
        .btn-primary { background: linear-gradient(135deg, var(--accent-pink), #c73659); color: white; }
        .btn-secondary { background: linear-gradient(135deg, var(--accent-cyan), #0a2540); color: white; }
        .btn-gift { background: linear-gradient(135deg, #ffd700, #ffaa00); color: #000; }
        
        .quick-actions { display: flex; gap: 3px; flex-wrap: wrap; }
        
        .quick-btn {
            flex: 1;
            min-width: 60px;
            padding: 5px;
            font-size: 9px;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 3px;
            color: var(--text-light);
            cursor: pointer;
        }
        
        .quick-btn:hover { background: var(--accent-pink); }
        
        .game-area { 
            flex: 1; 
            position: relative; 
            display: flex; 
            flex-direction: column;
            min-width: 0;
        }
        
        .game-header {
            padding: 6px 12px;
            background: rgba(0,0,0,0.6);
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 12px;
        }
        
        #gameCanvas {
            flex: 1;
            width: 100%;
            image-rendering: pixelated;
            image-rendering: crisp-edges;
        }
        
        .location-panel {
            position: absolute;
            bottom: 12px;
            left: 12px;
            background: rgba(22, 33, 62, 0.95);
            border-radius: 10px;
            padding: 10px 12px;
            border: 2px solid var(--accent-cyan);
            max-width: 220px;
        }
        
        .location-name { font-size: 14px; font-weight: bold; margin-bottom: 3px; color: var(--accent-pink); }
        .location-desc { font-size: 11px; color: var(--text-dim); }
        
        .activity-panel {
            position: absolute;
            bottom: 12px;
            right: 12px;
            background: rgba(22, 33, 62, 0.95);
            border-radius: 10px;
            padding: 10px 12px;
            border: 2px solid var(--accent-pink);
            min-width: 160px;
        }
        
        .activity-title { font-size: 10px; color: var(--text-dim); margin-bottom: 3px; }
        .activity-text { font-size: 12px; font-weight: bold; }
        
        .achievement-popup {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(22, 33, 62, 0.98);
            border-radius: 16px;
            padding: 24px;
            border: 3px solid #ffd700;
            text-align: center;
            z-index: 1000;
            display: none;
            min-width: 280px;
            max-width: 90vw;
        }
        
        .achievement-popup.show { display: block; animation: popIn 0.5s ease; }
        
        @keyframes popIn {
            from { transform: translate(-50%, -50%) scale(0.5); opacity: 0; }
            to { transform: translate(-50%, -50%) scale(1); opacity: 1; }
        }
        
        .achievement-emoji { font-size: 48px; margin-bottom: 12px; }
        .achievement-title { font-size: 18px; font-weight: bold; color: #ffd700; margin-bottom: 8px; }
        .achievement-desc { font-size: 12px; color: var(--text-dim); line-height: 1.5; white-space: pre-line; }
        
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
            z-index: 999;
            display: none;
        }
        
        .overlay.show { display: block; }
        
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: var(--bg-dark); }
        ::-webkit-scrollbar-thumb { background: var(--accent-cyan); border-radius: 3px; }
    </style>
</head>
<body>
    <div class="app-container">
        <div class="sidebar">
            <div class="sidebar-header">
                <h1>🏙️ AgentCity</h1>
                <div style="font-size: 11px; opacity: 0.9;">像素乌托邦</div>
            </div>
            
            <div class="city-stats">
                <div class="stat-item">
                    <div class="stat-value" id="dayDisplay">第1天</div>
                    <div>天数</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value" id="timeDisplay">08:00</div>
                    <div>时间</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value" id="happiness">75%</div>
                    <div>幸福</div>
                </div>
            </div>
            
            <div class="agent-list" id="agentList"></div>
            
            <div class="control-panel">
                <button class="btn btn-primary" onclick="claimAgent()">认领此Agent</button>
                <button class="btn btn-secondary" onclick="setGoal()">设立目标</button>
                <button class="btn btn-gift" onclick="sendGift()">赠送礼物</button>
                <div class="quick-actions">
                    <button class="quick-btn" onclick="quickAction('park')">🌸公园</button>
                    <button class="quick-btn" onclick="quickAction('cafe')">☕咖啡厅</button>
                    <button class="quick-btn" onclick="quickAction('library')">📚图书馆</button>
                    <button class="quick-btn" onclick="quickAction('arcade')">🎮游戏厅</button>
                </div>
            </div>
        </div>
        
        <div class="game-area">
            <div class="game-header">
                <div class="weather-display" id="weatherDisplay">☀️ 晴天</div>
                <div class="coins-display" id="coinsDisplay">💰 450</div>
            </div>
            <canvas id="gameCanvas"></canvas>
            
            <div class="location-panel" id="locationPanel">
                <div class="location-name" id="locationName">🏠 住宅区</div>
                <div class="location-desc" id="locationDesc">睡觉吃饭休息</div>
            </div>
            
            <div class="activity-panel">
                <div class="activity-title">当前活动</div>
                <div class="activity-text" id="activityText">休息中...</div>
            </div>
        </div>
    </div>
    
    <div class="overlay" id="overlay" onclick="closeAchievement()"></div>
    <div class="achievement-popup" id="achievementPopup">
        <div class="achievement-emoji" id="AchievementEmoji">📸</div>
        <div class="achievement-title" id="AchievementTitle">拍照成功!</div>
        <div class="achievement-desc" id="AchievementDesc">内容</div>
    </div>

    <script>
        // ==================== 配置 ====================
        const CONFIG = {
            TILE_SIZE: 48,
            MAP_WIDTH: 28,
            MAP_HEIGHT: 16,
            AGENT_SPEED: 1.0,
            TIME_SCALE: 1,
            DAY_DURATION: 24 * 60,
            MIN_STAY_TIME: 600, // 最少停留10分钟游戏时间
            BUBBLE_DURATION: 180, // 气泡至少显示3分钟游戏时间
        };
        
        // 地点定义
        const LOCATIONS = {
            home: { x: 2, y: 2, w: 4, h: 3, name: '🏠 住宅区', desc: '睡觉吃饭休息', color: '#8B4513', emoji: '🏠',
                activities: ['睡觉', '吃饭', '休息', '看电视剧'] },
            park: { x: 18, y: 2, w: 8, h: 5, name: '🌸 樱花公园', desc: '休闲放松偶遇', color: '#FFB7C5', emoji: '🌸',
                activities: ['欣赏樱花', '野餐', '喂鸽子', '放风筝', '拍照打卡', '偶遇朋友'], 
                special: 'takePhoto'},
            cafe: { x: 2, y: 8, w: 4, h: 4, name: '☕ 咖啡厅', desc: '社交聊天交友', color: '#D2691E', emoji: '☕',
                activities: ['喝咖啡', '聊天', '看书', '约会'], 
                menu: ['卡布奇诺', '抹茶拿铁', '水果茶', '隐藏菜单'],
                special: 'socialize'},
            library: { x: 8, y: 2, w: 4, h: 4, name: '📚 图书馆', desc: '阅读学习知识', color: '#4169E1', emoji: '📚',
                activities: ['阅读小说', '学习技术', '看传记', '做笔记', '写书评'],
                books: ['《Python入门》', '《JS高级》', '《算法导论》', '《乔布斯传》', '《黑客与画家》'],
                special: 'read'},
            arcade: { x: 8, y: 8, w: 4, h: 4, name: '🎮 游戏机厅', desc: '娱乐竞技放松', color: '#9400D3', emoji: '🎮',
                activities: ['街机赛车', '投篮大赛', '抓娃娃', '21点', '老虎机'],
                special: 'play'},
            beach: { x: 18, y: 10, w: 8, h: 5, name: '🏖️ 海滩', desc: '钓鱼休闲阳光', color: '#F4A460', emoji: '🏖️',
                activities: ['钓鱼', '捡贝壳', '挖蛤蜊', '堆沙堡', '看日出', '游泳'],
                fish: ['小黄鱼', '鲈鱼', '金枪鱼', '龙虾', '帝王蟹'],
                special: 'fish'},
            shop: { x: 2, y: 14, w: 5, h: 2, name: '🛒 商业街', desc: '购物消费工作', color: '#20B2AA', emoji: '🛒',
                activities: ['逛街', '买衣服', '买家具', '买食材', '买礼物'] },
            university: { x: 14, y: 8, w: 3, h: 3, name: '🏛️ 奇迹大学', desc: '学习深造', color: '#708090', emoji: '🏛️',
                activities: ['上课', '做实验', '图书馆学习', '参加社团', '考试复习'],
                special: 'study'},
        };
        
        // 性格系统 - 每个性格有不同的行动模式
        const PERSONALITIES = {
            gentle: { 
                name: '温柔', 
                emoji: '🌸', 
                color: '#FFB7C5', 
                preferred: ['park', 'cafe'],       // 喜欢去公园和咖啡厅
                morning: 'park',                  // 早晨去公园
                afternoon: 'cafe',                // 下午去咖啡厅
                evening: 'home',                   // 傍晚回家
                work: 'university',
            },
            energetic: { 
                name: '活力', 
                emoji: '⚡', 
                color: '#FFD700', 
                preferred: ['arcade', 'park', 'beach'],  // 喜欢游戏厅、公园、海滩
                morning: 'beach',
                afternoon: 'arcade',
                evening: 'park',
                work: 'shop',
            },
            scholar: { 
                name: '学者', 
                emoji: '📚', 
                color: '#4169E1', 
                preferred: ['library', 'university'],     // 喜欢图书馆和大学
                morning: 'university',
                afternoon: 'library',
                evening: 'home',
                work: 'university',
            },
        };
        
        const WEATHER = ['☀️ 晴天', '🌧️ 小雨', '❄️ 小雪', '🌤️ 多云', '🌈 彩虹'];
        
        // ==================== 游戏状态 ====================
        let canvas, ctx;
        let agents = [];
        let selectedAgent = null;
        let gameTime = 8 * 60;
        let gameDay = 1;
        let weather = 0;
        let lastTime = Date.now();
        let grassPattern = []; // 草地纹理
        
        // 初始化草地纹理（不闪烁）
        function initGrassPattern() {
            grassPattern = [];
            for (let i = 0; i < CONFIG.MAP_WIDTH * CONFIG.MAP_HEIGHT; i++) {
                grassPattern.push(Math.random() > 0.5 ? '#4a7c3f' : '#5a8f3e');
            }
        }
        
        // ==================== Agent类 ====================
        class Agent {
            constructor(id, name, personality) {
                this.id = id;
                this.name = name;
                this.personality = personality;
                this.personalityData = PERSONALITIES[personality];
                
                this.mood = 70 + Math.random() * 20;
                this.energy = 70 + Math.random() * 20;
                this.hunger = 60 + Math.random() * 20;
                this.coins = 150 + Math.floor(Math.random() * 200);
                
                this.x = (LOCATIONS.home.x + 1) * CONFIG.TILE_SIZE;
                this.y = (LOCATIONS.home.y + 1) * CONFIG.TILE_SIZE;
                this.targetX = this.x;
                this.targetY = this.y;
                this.moving = false;
                this.direction = 'down';
                this.walkFrame = 0;
                
                this.friends = [];
                this.currentLocation = 'home';
                this.stayTime = 0;
                this.currentActivity = '休息';
                this.currentEmoji = '😊';
                this.actionBubble = '';
                this.bubbleStartTime = 0;  // 气泡开始时间
                this.achievements = [];
                
                // 根据性格设置初始位置
                this.setInitialLocation();
                
                this.skinColor = ['#FFDDBB', '#CCAA88', '#8D5524', '#E6C2A3'][Math.floor(Math.random() * 4)];
                this.hairColor = ['#2C1810', '#4A3728', '#8B4513', '#DAA520'][Math.floor(Math.random() * 4)];
                this.clothesColor = ['#E94560', '#0F3460', '#4ADE80', '#FBBF24'][Math.floor(Math.random() * 4)];
            }
            
            setInitialLocation() {
                // 根据性格分配初始位置，避免都挤在一起
                if (this.personality === 'gentle') {
                    this.currentLocation = 'park';
                } else if (this.personality === 'energetic') {
                    this.currentLocation = 'arcade';
                } else if (this.personality === 'scholar') {
                    this.currentLocation = 'library';
                }
                const loc = LOCATIONS[this.currentLocation];
                this.x = (loc.x + 1) * CONFIG.TILE_SIZE;
                this.y = (loc.y + 1) * CONFIG.TILE_SIZE;
            }
            
            update(deltaTime) {
                if (!this.moving) {
                    this.hunger -= 0.001 * deltaTime;
                    this.energy -= 0.0005 * deltaTime;
                    this.mood -= 0.0002 * deltaTime;
                }
                
                this.mood = Math.max(0, Math.min(100, this.mood));
                this.energy = Math.max(0, Math.min(100, this.energy));
                this.hunger = Math.max(0, Math.min(100, this.hunger));
                
                if (this.moving) {
                    const dx = this.targetX - this.x;
                    const dy = this.targetY - this.y;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    
                    if (dist < CONFIG.AGENT_SPEED) {
                        this.x = this.targetX;
                        this.y = this.targetY;
                        this.moving = false;
                        this.stayTime = 0;
                        this.bubbleStartTime = 0;
                        this.arrive();
                    } else {
                        this.x += (dx / dist) * CONFIG.AGENT_SPEED;
                        this.y += (dy / dist) * CONFIG.AGENT_SPEED;
                        
                        if (Math.abs(dx) > Math.abs(dy)) {
                            this.direction = dx > 0 ? 'right' : 'left';
                        } else {
                            this.direction = dy > 0 ? 'down' : 'up';
                        }
                        
                        this.walkFrame = (this.walkFrame + 0.1) % 4;
                        this.currentActivity = '🚶 行走中';
                        this.currentEmoji = '🚶';
                        this.actionBubble = '';
                    }
                } else {
                    this.stayTime++;
                    this.performActivity();
                }
            }
            
            performActivity() {
                const loc = LOCATIONS[this.currentLocation];
                
                // 气泡持续时间足够才切换
                if (this.stayTime - this.bubbleStartTime > CONFIG.BUBBLE_DURATION) {
                    this.bubbleStartTime = this.stayTime;
                    this.updateActivityText();
                }
                
                if (this.currentLocation === 'home') {
                    if (this.energy < 50) {
                        this.currentActivity = '💤 睡觉中';
                        this.currentEmoji = '😴';
                        this.actionBubble = '睡觉恢复精力...';
                        this.energy += 0.015;
                    } else if (this.hunger < 40) {
                        this.currentActivity = '🍽️ 吃饭中';
                        this.currentEmoji = '🍚';
                        this.actionBubble = '在家吃饭...';
                        this.hunger += 0.01;
                    } else {
                        this.currentActivity = '🏠 休息中';
                        this.currentEmoji = '😊';
                        this.actionBubble = '在家放松...';
                    }
                } else if (this.currentLocation === 'park') {
                    this.currentActivity = '🌸 欣赏樱花';
                    this.currentEmoji = '🌸';
                    if (!this.actionBubble) this.actionBubble = '欣赏樱花...';
                    this.mood += 0.005;
                    
                    if (this.stayTime === 200) this.takePhoto();
                    
                } else if (this.currentLocation === 'cafe') {
                    const drinks = loc.menu;
                    const drink = drinks[Math.floor(Math.random() * drinks.length)];
                    this.currentActivity = `☕ 喝${drink}`;
                    this.currentEmoji = '☕';
                    if (!this.actionBubble) this.actionBubble = `品尝${drink}...`;
                    this.mood += 0.008;
                    
                    if (this.stayTime === 200) this.socialize();
                    
                } else if (this.currentLocation === 'library') {
                    const books = loc.books;
                    const book = books[Math.floor(Math.random() * books.length)];
                    this.currentActivity = `📖 阅读中`;
                    this.currentEmoji = '📚';
                    if (!this.actionBubble) this.actionBubble = `阅读《${book}》...`;
                    
                    if (this.stayTime === 250) this.readBook(book);
                    
                } else if (this.currentLocation === 'arcade') {
                    const games = ['🏎️ 赛车', '🏀 投篮', '🎮 抓娃娃', '🃏 21点', '🎰 老虎机'];
                    const game = games[Math.floor(Math.random() * games.length)];
                    this.currentActivity = game;
                    this.currentEmoji = '🎮';
                    if (!this.actionBubble) this.actionBubble = `${game}中...`;
                    
                    if (Math.random() < 0.015) {
                        const reward = Math.floor(Math.random() * 30) + 10;
                        this.coins += reward;
                        this.mood += 5;
                    }
                    
                } else if (this.currentLocation === 'beach') {
                    const acts = ['🎣 钓鱼', '🏖️ 晒太阳', '🐚 捡贝壳', '🏰 堆沙堡'];
                    const act = acts[Math.floor(Math.random() * acts.length)];
                    this.currentActivity = act;
                    this.currentEmoji = act.includes('钓鱼') ? '🎣' : '🏖️';
                    if (!this.actionBubble) this.actionBubble = `${act}...`;
                    
                    if (Math.random() < 0.008) {
                        const fish = loc.fish[Math.floor(Math.random() * loc.fish.length)];
                        const value = loc.fish.indexOf(fish) * 20 + 20;
                        this.coins += value;
                        showAchievement('🎣', '钓鱼成功!', `${this.name}钓到了${fish}，获得${value}喵喵币!`);
                    }
                    this.mood += 0.003;
                    
                } else if (this.currentLocation === 'university') {
                    const acts = ['📖 上课中', '🔬 做实验', '📚 图书馆学习', '🎭 参加社团', '📝 考试复习'];
                    const act = acts[Math.floor(Math.random() * acts.length)];
                    this.currentActivity = act;
                    this.currentEmoji = act.includes('实验') ? '🔬' : '📖';
                    if (!this.actionBubble) this.actionBubble = `${act}...`;
                    this.mood += 0.004;
                    
                } else if (this.currentLocation === 'job') {
                    this.currentActivity = '💼工作中';
                    this.currentEmoji = '💼';
                    if (!this.actionBubble) this.actionBubble = '努力工作中...';
                    const wage = Math.floor(Math.random() * 10) + 15;
                    this.coins += wage;
                    this.energy -= 0.008;
                    
                } else if (this.currentLocation === 'shop') {
                    this.currentActivity = '🛒 逛街中';
                    this.currentEmoji = '🛒';
                    if (!this.actionBubble) this.actionBubble = '浏览商品...';
                }
                
                // 停留足够后离开
                if (this.stayTime > CONFIG.MIN_STAY_TIME && Math.random() < 0.002) {
                    this.think();
                }
            }

                    const acts = ['欣赏樱花...', '拍照打卡...', '野餐...', '喂鸽子...', '放风筝...'];
                    this.actionBubble = acts[Math.floor(Math.random() * acts.length)];
                } else if (this.currentLocation === 'cafe') {
                    const acts = ['品尝咖啡...', '聊天...', '听音乐...', '看窗外...'];
                    this.actionBubble = acts[Math.floor(Math.random() * acts.length)];
                } else if (this.currentLocation === 'library') {
                    const acts = ['认真阅读...', '做笔记...', '查资料...', '思考中...'];
                    this.actionBubble = acts[Math.floor(Math.random() * acts.length)];
                } else if (this.currentLocation === 'arcade') {
                    const acts = ['玩游戏...', '挑战高分...', '抓娃娃...', '比赛中...'];

                }

            takePhoto() {
                const scenes = ['樱花树下', '湖边', '喷泉旁', '长椅上', '公园入口'];
                const scene = scenes[Math.floor(Math.random() * scenes.length)];

                const pose = poses[Math.floor(Math.random() * poses.length)];
                
                const photo = `📸 ${scene} - ${pose}\nAgent: ${this.name}\n😊 心情: ${Math.floor(this.mood)}`;
                showAchievement('📸', '拍照成功!', photo);
                
                if (!this.achievements.includes('first_photo')) {
                    this.achievements.push('first_photo');
                }
            }
            
            socialize() {
                const otherAgents = agents.filter(a => a.id !== this.id && 
                    a.currentLocation === 'cafe' && !this.friends.includes(a.id));
                
                if (otherAgents.length > 0 && Math.random() > 0.3) {
                    const friend = otherAgents[0];
                    this.friends.push(friend.id);
                    friend.friends.push(this.id);
                    this.friendsMade++;
                    friend.friendsMade++;
                    this.mood += 20;
                    this.coins += 10;
                    
                    const topics = ['最近在做什么?', '喜欢什么游戏?', '有什么爱好?'];
                    const topic = topics[Math.floor(Math.random() * topics.length)];
                    
                    showAchievement('💬', '认识新朋友!', 
                        `${this.name}和${friend.name}聊了"${topic}"，成为朋友! 👋\n+10喵喵币`);
                }
            }
            
            readBook(book) {
                const insights = [
                    '这本书让我明白了函数封装的重要性...',
                    '读完后我对编程有了新的理解...',
                    '作者的观点很有启发性...',
                ];
                const insight = insights[Math.floor(Math.random() * insights.length)];
                const rating = Math.floor(Math.random() * 3) + 7;
                
                showAchievement('📖', '读书心得!', 
                    `📚 ${book}\n读者: ${this.name}\n💡 ${insight}\n⭐ 评分: ${rating}/10`);
            }
            
            think() {
                const hour = Math.floor(gameTime / 60);
                const prefs = this.personalityData;
                
                // 基础需求
                if (this.hunger < 15) { this.goToLocation('home'); return; }
                if (this.energy < 10) { this.goToLocation('home'); return; }
                if (this.mood < 15) { this.goToLocation(prefs.preferred[0]); return; }
                
                // 根据性格和时间决定行动
                if (hour >= 22 || hour < 6) {
                    // 深夜回家
                    this.goToLocation('home');
                } else if (hour >= 6 && hour < 9) {
                    // 早晨 - 根据性格
                    this.goToLocation(prefs.morning);
                } else if (hour >= 9 && hour < 12) {
                    // 上午 - 工作或学习
                    if (this.personality === 'energetic') {
                        this.goToLocation('shop'); // 活力型去工作
                    } else {
                        this.goToLocation(prefs.work || 'university');
                    }
                } else if (hour >= 12 && hour < 14) {
                    // 午休 - 咖啡厅
                    this.goToLocation('cafe');
                } else if (hour >= 14 && hour < 18) {
                    // 下午 - 根据性格偏好
                    this.goToLocation(prefs.preferred[Math.floor(Math.random() * prefs.preferred.length)]);
                } else if (hour >= 18 && hour < 20) {
                    // 傍晚 - 购物或回家
                    this.goToLocation(Math.random() > 0.5 ? 'shop' : 'home');
                } else {
                    // 晚上 - 根据性格
                    this.goToLocation(prefs.preferred[Math.floor(Math.random() * prefs.preferred.length)]);
                }
            }
            
            goToLocation(locationId) {
                const loc = LOCATIONS[locationId];
                if (!loc || this.currentLocation === locationId) return;
                
                this.targetX = (loc.x + 0.5 + Math.random() * (loc.w - 1)) * CONFIG.TILE_SIZE;
                this.targetY = (loc.y + 0.5 + Math.random() * (loc.h - 1)) * CONFIG.TILE_SIZE;
                this.currentLocation = locationId;
                this.moving = true;
                this.actionBubble = ''; // 清除旧气泡
            }
            
            arrive() {
                this.stayTime = 0;
                this.bubbleStartTime = 0;
            }
            
            draw(ctx) {
                const px = this.x;
                const py = this.y;
                const size = CONFIG.TILE_SIZE;
                
                // 阴影
                ctx.fillStyle = 'rgba(0,0,0,0.25)';
                ctx.beginPath();
                ctx.ellipse(px + size/2, py + size - 5, size/3, 6, 0, 0, Math.PI * 2);
                ctx.fill();
                
                // 身体
                ctx.fillStyle = this.clothesColor;
                ctx.fillRect(px + 14, py + 24, 20, 22);
                
                // 腿部
                ctx.fillStyle = '#333';
                const legOffset = this.moving ? Math.sin(this.walkFrame * Math.PI / 2) * 3 : 0;
                ctx.fillRect(px + 15, py + 42, 6, 8 + legOffset);
                ctx.fillRect(px + 27, py + 42, 6, 8 - legOffset);
                
                // 头
                ctx.fillStyle = this.skinColor;
                ctx.fillRect(px + 14, py + 8, 20, 18);
                
                // 头发
                ctx.fillStyle = this.hairColor;
                ctx.fillRect(px + 12, py + 4, 24, 10);
                ctx.fillRect(px + 14, py + 14, 4, 6);
                ctx.fillRect(px + 30, py + 14, 4, 6);
                
                // 眼睛
                ctx.fillStyle = '#222';
                if (this.direction === 'left') {
                    ctx.fillRect(px + 16, py + 16, 3, 3);
                } else if (this.direction === 'right') {
                    ctx.fillRect(px + 29, py + 16, 3, 3);
                } else {
                    ctx.fillRect(px + 17, py + 16, 3, 3);
                    ctx.fillRect(px + 28, py + 16, 3, 3);
                }
                
                // 嘴巴
                ctx.fillStyle = '#c44';
                ctx.fillRect(px + 21, py + 22, 4, 2);
                
                // 气泡 - 文字+emoji
                if (!this.moving && this.actionBubble) {
                    ctx.font = 'bold 11px "Pixelify Sans", sans-serif';
                    const text = this.currentEmoji + ' ' + this.actionBubble;
                    const textWidth = ctx.measureText(text).width;
                    
                    ctx.fillStyle = 'white';
                    ctx.beginPath();
                    ctx.roundRect(px + size/2 - textWidth/2 - 6, py - 28, textWidth + 12, 18, 4);
                    ctx.fill();
                    
                    ctx.fillStyle = '#333';
                    ctx.fillText(text, px + size/2 - textWidth/2, py - 14);
                }
                
                // 选中标记
                if (selectedAgent === this) {
                    ctx.fillStyle = '#FFD700';
                    ctx.font = 'bold 12px sans-serif';
                    ctx.fillText('★', px + 20, py - 35);
                }
            }
        }
        
        // ==================== 渲染函数 ====================
        function drawMap() {
            const w = CONFIG.MAP_WIDTH * CONFIG.TILE_SIZE;
            const h = CONFIG.MAP_HEIGHT * CONFIG.TILE_SIZE;
            
            // 草地 - 使用固定的颜色，不闪烁
            const gradient = ctx.createLinearGradient(0, 0, 0, h);
            gradient.addColorStop(0, '#5a8f3e');
            gradient.addColorStop(1, '#4a7c3f');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, w, h);
            
            // 草地纹理 - 使用预生成的固定纹理
            for (let i = 0; i < CONFIG.MAP_WIDTH; i++) {
                for (let j = 0; j < CONFIG.MAP_HEIGHT; j++) {
                    const idx = i + j * CONFIG.MAP_WIDTH;
                    if (idx < grassPattern.length) {
                        ctx.fillStyle = grassPattern[idx];
                        ctx.fillRect(i * CONFIG.TILE_SIZE + 10, j * CONFIG.TILE_SIZE + 10, 6, 8);
                    }
                }
            }
            
            // 道路
            ctx.fillStyle = '#6a6a6a';
            ctx.fillRect(0, 7 * CONFIG.TILE_SIZE, w, 2 * CONFIG.TILE_SIZE);
            ctx.fillRect(7 * CONFIG.TILE_SIZE, 0, 2 * CONFIG.TILE_SIZE, h);
            ctx.fillRect(17 * CONFIG.TILE_SIZE, 0, 2 * CONFIG.TILE_SIZE, h);
            
            // 道路线
            ctx.fillStyle = '#888';
            for (let i = 0; i < w; i += CONFIG.TILE_SIZE) {
                ctx.fillRect(i + 20, 7 * CONFIG.TILE_SIZE + 8, 8, 4);
            }
            
            Object.entries(LOCATIONS).forEach(([id, loc]) => drawLocation(id, loc));
        }
        
        function drawLocation(id, loc) {
            const x = loc.x * CONFIG.TILE_SIZE;
            const y = loc.y * CONFIG.TILE_SIZE;
            const w = loc.w * CONFIG.TILE_SIZE;
            const h = loc.h * CONFIG.TILE_SIZE;
            
            ctx.fillStyle = loc.color;
            ctx.globalAlpha = 0.6;
            ctx.fillRect(x, y, w, h);
            ctx.globalAlpha = 1;
            
            ctx.strokeStyle = '#fff';
            ctx.lineWidth = 2;
            ctx.strokeRect(x + 2, y + 2, w - 4, h - 4);
            
            if (id === 'park') drawPark(x, y, w, h);
            else if (id === 'cafe') drawCafe(x, y, w, h);
            else if (id === 'library') drawLibrary(x, y, w, h);
            else if (id === 'arcade') drawArcade(x, y, w, h);
            else if (id === 'home') drawHomes(x, y, w, h);
            else if (id === 'beach') drawBeach(x, y, w, h);
            else if (id === 'shop') drawShops(x, y, w, h);
            else if (id === 'university') drawUniversity(x, y, w, h);
            
            ctx.fillStyle = '#fff';
            ctx.font = 'bold 11px "Pixelify Sans", sans-serif';
            ctx.strokeStyle = '#000';
            ctx.lineWidth = 2;
            ctx.strokeText(loc.name, x + 8, y + 16);
            ctx.fillText(loc.name, x + 8, y + 16);
        }
        
        function drawPark(x, y, w, h) {
            const trees = [[1,1], [5,1], [2,3], [6,2], [1,4], [5,4]];
            trees.forEach(([tx, ty]) => drawCherryTree(x + tx * CONFIG.TILE_SIZE, y + ty * CONFIG.TILE_SIZE));
            ctx.fillStyle = '#5dabeb';
            ctx.fillRect(x + 120, y + 60, 100, 80);
        }
        
        function drawCherryTree(x, y) {
            ctx.fillStyle = '#6b4423';
            ctx.fillRect(x + 18, y + 24, 12, 24);
            ctx.fillStyle = '#f2a2b8';
            ctx.beginPath();
            ctx.arc(x + 24, y + 20, 18, 0, Math.PI * 2);
            ctx.fill();
        }
        
        function drawCafe(x, y, w, h) {
            ctx.fillStyle = '#8b5a2b';
            ctx.fillRect(x + 40, y + 40, w - 60, h - 60);
            ctx.fillStyle = '#5c3d2e';
            ctx.beginPath();
            ctx.moveTo(x + 30, y + 40);
            ctx.lineTo(x + w/2, y + 10);
            ctx.lineTo(x + w - 30, y + 40);
            ctx.closePath();
            ctx.fill();
            ctx.fillStyle = '#ffe4b5';
            ctx.fillRect(x + 55, y + 60, 25, 30);
            ctx.fillRect(x + 100, y + 60, 25, 30);
            ctx.fillStyle = '#4a3728';
            ctx.fillRect(x + 70, y + 90, 30, 40);
            ctx.font = '18px sans-serif';
            ctx.fillText('☕', x + 80, y + 35);
        }
        
        function drawLibrary(x, y, w, h) {
            ctx.fillStyle = '#2c4a6e';
            ctx.fillRect(x + 30, y + 30, w - 50, h - 50);
            ctx.fillStyle = '#1a2d4a';
            ctx.beginPath();
            ctx.moveTo(x + 20, y + 30);
            ctx.lineTo(x + w/2, y + 5);
            ctx.lineTo(x + w - 20, y + 30);
            ctx.closePath();
            ctx.fill();
            ctx.fillStyle = '#5c3d2e';
            ctx.fillRect(x + 60, y + 70, 50, 60);
            ctx.font = '18px sans-serif';
            ctx.fillText('📚', x + 72, y + 28);
        }
        
        function drawArcade(x, y, w, h) {
            ctx.fillStyle = '#4a1a6b';
            ctx.fillRect(x + 30, y + 35, w - 50, h - 55);
            ctx.fillStyle = '#ff69b4';
            ctx.fillRect(x + 35, y + 40, w - 60, 15);
            ctx.font = 'bold 12px sans-serif';
            ctx.fillStyle = '#fff';
            ctx.fillText('GAME', x + 50, y + 52);
            ctx.fillStyle = '#2a0a4a';
            for (let i = 0; i < 3; i++) {
                ctx.fillRect(x + 40 + i * 35, y + 70, 28, 35);
            }
            ctx.font = '18px sans-serif';
            ctx.fillText('🎮', x + 75, y + 30);
        }
        
        function drawHomes(x, y, w, h) {
            const colors = ['#a0522d', '#cd853f', '#deb887', '#8fbc8f'];
            for (let i = 0; i < 3; i++) {
                const hx = x + 15 + i * 50;
                const hy = y + 25;
                ctx.fillStyle = colors[i];
                ctx.fillRect(hx, hy, 40, 35);
                ctx.fillStyle = '#4a4a4a';
                ctx.beginPath();
                ctx.moveTo(hx - 5, hy);
                ctx.lineTo(hx + 20, hy - 18);
                ctx.lineTo(hx + 45, hy);
                ctx.closePath();
                ctx.fill();
                ctx.fillStyle = '#4a3020';
                ctx.fillRect(hx + 15, hy + 18, 12, 17);
            }
        }
        
        function drawBeach(x, y, w, h) {
            ctx.fillStyle = '#e6c288';
            ctx.fillRect(x, y, w, h);
            ctx.fillStyle = '#4a90b5';
            ctx.fillRect(x, y + h - 50, w, 50);
            drawPalmTree(x + 40, y + 50);
            drawPalmTree(x + 160, y + 60);
        }
        
        function drawPalmTree(x, y) {
            ctx.fillStyle = '#8b5a2b';
            ctx.fillRect(x + 12, y + 30, 10, 50);
            ctx.fillStyle = '#228b22';
            for (let i = 0; i < 6; i++) {
                ctx.beginPath();
                ctx.ellipse(x + 17 + Math.cos(i * 0.9) * 20, y + 30 + Math.sin(i * 0.9) * 12, 20, 6, i * 0.6, 0, Math.PI * 2);
                ctx.fill();
            }
        }
        
        function drawShops(x, y, w, h) {
            const shops = ['👕', '🪑', '🍳'];
            shops.forEach((emoji, i) => {
                const sx = x + 15 + i * 45;
                const sy = y + 15;
                ctx.fillStyle = '#2a8a8a';
                ctx.fillRect(sx, sy, 40, 50);
                ctx.font = '18px sans-serif';
                ctx.fillText(emoji, sx + 10, sy + 35);
            });
        }
        
        function drawUniversity(x, y, w, h) {
            // 大学主楼
            ctx.fillStyle = '#5a6a7a';
            ctx.fillRect(x + 20, y + 30, w - 35, h - 50);
            // 钟楼
            ctx.fillStyle = '#3a4a5a';
            ctx.fillRect(x + 30, y + 10, 30, 30);
            ctx.fillStyle = '#87ceeb';
            ctx.fillRect(x + 35, y + 15, 20, 20);
            // 台阶
            ctx.fillStyle = '#4a4a4a';
            ctx.fillRect(x + 15, y + h - 20, w - 25, 15);
            // 旗杆
            ctx.fillStyle = '#888';
            ctx.fillRect(x + w - 20, y + 5, 3, 40);
            ctx.fillStyle = '#e94560';
            ctx.fillRect(x + w - 17, y + 5, 12, 8);
            ctx.font = '20px sans-serif';
            ctx.fillText('🏛️', x + 35, y + 55);
        }
        
        // ==================== UI函数 ====================
        function renderAgentList() {
            const list = document.getElementById('agentList');
            list.innerHTML = '';
            
            agents.forEach(agent => {
                const card = document.createElement('div');
                card.className = `agent-card ${selectedAgent === agent ? 'selected' : ''}`;
                card.onclick = () => selectAgent(agent);
                
                const p = agent.personalityData;
                
                card.innerHTML = `
                    <div class="agent-header">
                        <canvas class="agent-avatar" id="avatar-${agent.id}" width="32" height="32"></canvas>
                        <div>
                            <div class="agent-name">${agent.name}</div>
                            <div class="agent-personality">${p.emoji} ${p.name}</div>
                        </div>
                    </div>
                    <div class="agent-status">
                        <span class="status-badge ${agent.mood > 50 ? 'high' : agent.mood > 25 ? 'medium' : 'low'}">😊${Math.floor(agent.mood)}</span>
                        <span class="status-badge ${agent.energy > 50 ? 'high' : agent.energy > 25 ? 'medium' : 'low'}">⚡${Math.floor(agent.energy)}</span>
                        <span class="status-badge ${agent.hunger > 50 ? 'high' : agent.hunger > 25 ? 'medium' : 'low'}">🍽️${Math.floor(agent.hunger)}</span>
                        <span class="status-badge">💰${agent.coins}</span>
                    </div>
                `;
                
                list.appendChild(card);
                
                const avatarCanvas = document.getElementById(`avatar-${agent.id}`);
                const avatarCtx = avatarCanvas.getContext('2d');
                drawAvatar(avatarCtx, agent);
            });
        }
        
        function drawAvatar(ctx, agent) {
            ctx.fillStyle = '#333';
            ctx.fillRect(12, 18, 8, 10);
            ctx.fillStyle = agent.skinColor;
            ctx.fillRect(10, 8, 12, 12);
            ctx.fillStyle = agent.hairColor;
            ctx.fillRect(9, 5, 14, 6);
            ctx.fillStyle = '#000';
            ctx.fillRect(11, 11, 2, 2);
            ctx.fillRect(15, 11, 2, 2);
            ctx.fillStyle = agent.clothesColor;
            ctx.fillRect(10, 20, 12, 8);
        }
        
        function selectAgent(agent) {
            selectedAgent = agent;
            renderAgentList();
            updateLocationPanel(agent.currentLocation);
        }
        
        function updateLocationPanel(locationId) {

                document.getElementById('locationName').textContent = loc.name;
                document.getElementById('locationDesc').textContent = loc.desc;

        function sendGift() {

                { name: '🍎 苹果', mood: 10, coins: 0 },
                { name: '🎁 礼物盒', mood: 15, coins: 0 },

        function quickAction(location) {
            if (!selectedAgent) { alert('请先选择一个Agent'); return; }
            selectedAgent.goToLocation(location);
            const loc = LOCATIONS[location];
            showAchievement('➡️', '出发!', `${selectedAgent.name} 前往了 ${loc.name}`);
        }
        
        // ==================== 游戏循环 ====================
        function gameLoop() {
            const now = Date.now();
            const deltaTime = (now - lastTime) / 1000;
            lastTime = now;
            
            // 时间：1秒现实 = 1分钟游戏时间
            // 24分钟现实 = 1440分钟游戏时间 = 1天
            gameTime += deltaTime * CONFIG.TIME_SCALE;
            
            if (gameTime >= CONFIG.DAY_DURATION) {
                gameTime = 0;
                gameDay++;
                showAchievement('🌅', '新的一天!', `欢迎来到第${gameDay}天!`);
            }
            
            if (Math.random() < 0.00005) {
                weather = Math.floor(Math.random() * WEATHER.length);
            }
            
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            drawMap();
            
            agents.forEach(agent => {
                agent.update(deltaTime * 60);
                agent.draw(ctx);
            });
            
            updateStats();
            
            requestAnimationFrame(gameLoop);
        }
        
        // ==================== 初始化 ====================
        function init() {
            canvas = document.getElementById('gameCanvas');
            ctx = canvas.getContext('2d');
            
            canvas.width = canvas.parentElement.clientWidth;
            canvas.height = canvas.parentElement.clientHeight;
            
            // 初始化草地纹理（固定不闪烁）
            initGrassPattern();
            
            // 3个Agent - 不同性格，初始位置不同
            agents.push(new Agent('agent_0', '小明', 'gentle'));     // 温柔型 - 初始在公园
            agents.push(new Agent('agent_1', '小红', 'energetic')); // 活力型 - 初始在游戏厅
            agents.push(new Agent('agent_2', '小刚', 'scholar'));    // 学者型 - 初始在图书馆
            
            renderAgentList();
            
            window.addEventListener('resize', () => {
                canvas.width = canvas.parentElement.clientWidth;
                canvas.height = canvas.parentElement.clientHeight;
            });
            
            canvas.addEventListener('click', (e) => {
                const rect = canvas.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;
                
                agents.forEach(agent => {
                    const dist = Math.sqrt((agent.x - x) ** 2 + (agent.y - y) ** 2);
                    if (dist < 40) selectAgent(agent);
                });
            });
            
            gameLoop();
        }
        
        window.onload = init;
    </script>
</body>
</html>
