        function preloadTiles() {
            const promises = Object.entries(TILE_FILES).map(([key, filename]) => {
                return new Promise((resolve) => {
                    const img = new Image();
                    img.onload = () => { TILE_IMAGES[key] = img; resolve(); };
                    img.onerror = () => { console.warn(`Failed to load: ${filename}`); resolve(); };
                    img.src = TILE_BASE + filename;
                });
            });
            return Promise.all(promises);
        }

        // и°ғз”ЁиұҶеҢ…APIз”ҹжҲҗеҜ№иҜқ
        async function generateDialogue(agent1, agent2) {
            const cacheKey = `${agent1.id}_${agent2.id}_${Math.floor(gameTime / 60)}`;
            if (dialogCache.has(cacheKey)) {
                return dialogCache.get(cacheKey);
            }
            
            const prompt = `дҪ жҳҜдёҖдёӘAIеҹҺеёӮжЁЎжӢҹжёёжҲҸгҖӮдёӨдёӘAgentжӯЈеңЁе’–е•ЎеҺ…зӣёйҒҮе№¶иҒҠеӨ©гҖӮиҜ·з”ҹжҲҗдёҖеҸҘз®Җзҹӯзҡ„еҜ№иҜқпјҲдёҚи¶…иҝҮ20еӯ—пјүгҖӮ

Agent1: ${agent1.name}пјҢ${agent1.personalityData.name}еһӢдәәж ј
Agent2: ${agent2.name}пјҢ${agent2.personalityData.name}еһӢдәәж ј

иҜ·з”Ёдёӯж–ҮеӣһеӨҚпјҢж јејҸпјҡ
${agent1.name}: "xxx"
${agent2.name}: "xxx"

еҸӘеӣһеӨҚеҜ№иҜқеҶ…е®№пјҢдёҚиҰҒе…¶д»–и§ЈйҮҠгҖӮ`;
            
            try {
                const response = await fetch(`https://${DOUBAO_CONFIG.endpoint}/api/v3/responses`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${DOUBAO_CONFIG.api_key}`
                    },
                    body: JSON.stringify({
                        model: DOUBAO_CONFIG.model,
                        messages: [{ role: 'user', content: prompt }]
                    })
                });
                
                const data = await response.json();
                let dialogue = data.choices?.[0]?.message?.content || `${agent1.name}: дҪ еҘҪе‘ҖпјҒ\n${agent2.name}: дҪ еҘҪпјҒ`;
                
                // зј“еӯҳеҜ№иҜқ
                dialogCache.set(cacheKey, dialogue);
                if (dialogCache.size > 100) {
                    dialogCache.delete(dialogCache.keys().next().value);
                }
                
                return dialogue;
            } catch (e) {
                console.error('иұҶеҢ…APIи°ғз”ЁеӨұиҙҘ:', e);
                return `${agent1.name}: д»ҠеӨ©еӨ©ж°”зңҹеҘҪпјҒ\n${agent2.name}: жҳҜе•ҠпјҢдёҖиө·еҺ»зҺ©еҗ§пјҒ`;
            }
        }
        
        // ==================== Agentзұ» ====================
        class Agent {
            constructor(id, name, personality) {
                this.id = id;
                this.name = name;
                this.personality = personality;
                this.personalityData = PERSONALITIES[personality];
                
                this.mood = 70 + Math.random() * 20;
                this.energy = 70 + Math.random() * 20;
                this.hunger = 60 + Math.random() * 20;
                this.health = 80 + Math.random() * 20;
                this.coins = 150 + Math.floor(Math.random() * 200);
                
                this.x = (LOCATIONS.home.x + 1) * CONFIG.TILE_SIZE;
                this.y = (LOCATIONS.home.y + 1) * CONFIG.TILE_SIZE;
                this.targetX = this.x;
                this.targetY = this.y;
                this.moving = false;
                this.direction = 'down';
                this.walkFrame = 0;
                
                this.friends = [];
                this.currentLocation = 'home';
                this.stayTime = 0;
                this.currentActivity = 'дј‘жҒҜ';
                this.currentEmoji = 'рҹҳҠ';
                this.actionBubble = '';
                this.bubbleStartTime = 0;
                this.achievements = [];
                this.dialogueWith = null; // еҪ“еүҚе’Ңи°ҒеҜ№иҜқ
                this.dialogueBubble = ''; // еҜ№иҜқж°”жіЎ
                this.dialogueStartTime = 0;
                
                this.setInitialLocation();
                
                const colors = ['#FFDDBB', '#CCAA88', '#8D5524', '#E6C2A3'];
                this.skinColor = colors[Math.floor(Math.random() * colors.length)];
                this.hairColor = ['#2C1810', '#4A3728', '#8B4513', '#DAA520'][Math.floor(Math.random() * 4)];
                this.clothesColor = ['#E94560', '#0F3460', '#4ADE80', '#FBBF24'][Math.floor(Math.random() * 4)];
            }
            
            setInitialLocation() {
                if (this.personality === 'gentle') this.currentLocation = 'park';
                else if (this.personality === 'energetic') this.currentLocation = 'gym';
                else if (this.personality === 'scholar') this.currentLocation = 'library';
                
                const loc = LOCATIONS[this.currentLocation];
                this.x = (loc.x + 1) * CONFIG.TILE_SIZE;
                this.y = (loc.y + 1) * CONFIG.TILE_SIZE;
            }
            
            update(deltaTime) {
                if (!this.moving) {
                    this.hunger -= 0.0008 * deltaTime;
                    this.energy -= 0.0004 * deltaTime;
                    this.mood -= 0.0002 * deltaTime;
                }
                
                this.mood = Math.max(0, Math.min(100, this.mood));
                this.energy = Math.max(0, Math.min(100, this.energy));
                this.hunger = Math.max(0, Math.min(100, this.hunger));
                this.health = Math.max(0, Math.min(100, this.health));
                
                if (this.moving) {
                    const dx = this.targetX - this.x;
                    const dy = this.targetY - this.y;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    
                    if (dist < CONFIG.AGENT_SPEED) {
                        this.x = this.targetX;
                        this.y = this.targetY;
                        this.moving = false;
                        this.stayTime = 0;
                        this.bubbleStartTime = 0;
                        this.arrive();
                    } else {
                        this.x += (dx / dist) * CONFIG.AGENT_SPEED;
                        this.y += (dy / dist) * CONFIG.AGENT_SPEED;
                        
                        if (Math.abs(dx) > Math.abs(dy)) this.direction = dx > 0 ? 'right' : 'left';
                        else this.direction = dy > 0 ? 'down' : 'up';
                        
                        this.walkFrame = (this.walkFrame + 0.1) % 4;
                        this.currentActivity = 'рҹҡ¶ иЎҢиө°дёӯ';
                        this.currentEmoji = 'рҹҡ¶';
                        this.actionBubble = '';
                        this.dialogueBubble = '';
                        this.dialogueWith = null;
                    }
                } else {
                    this.stayTime++;
                    this.performActivity();
                }
            }
            
            performActivity() {
                const loc = LOCATIONS[this.currentLocation];
                
                // жЈҖжҹҘжҳҜеҗҰеңЁеҜ№иҜқ
                if (this.dialogueWith && this.stayTime - this.dialogueStartTime > CONFIG.DIALOG_DURATION) {
                    this.dialogueBubble = '';
                    this.dialogueWith = null;
                }
                
                if (this.stayTime - this.bubbleStartTime > CONFIG.BUBBLE_DURATION && !this.dialogueWith) {
                    this.bubbleStartTime = this.stayTime;
                    this.updateActivityText();
                }
                
                if (this.currentLocation === 'home') {
                    if (this.energy < 50) { this.currentActivity = 'рҹ’Ө зқЎи§ү'; this.currentEmoji = 'рҹҳҙ'; this.actionBubble = 'зқЎи§үжҒўеӨҚ...'; this.energy += 0.015; }
                    else if (this.hunger < 40) { this.currentActivity = 'рҹҚҪпёҸ еҗғйҘӯ'; this.currentEmoji = 'рҹҚҡ'; this.actionBubble = 'еңЁе®¶еҗғйҘӯ...'; this.hunger += 0.01; }
                    else { this.currentActivity = 'рҹҸ  дј‘жҒҜ'; this.currentEmoji = 'рҹҳҠ'; this.actionBubble = 'еңЁе®¶ж”ҫжқҫ...'; }
                }
                else if (this.currentLocation === 'park') { this.currentActivity = 'рҹҢё иөҸжЁұ'; this.currentEmoji = 'рҹҢё'; if (!this.actionBubble) this.actionBubble = 'ж¬ЈиөҸжЁұиҠұ...'; this.mood += 0.005; if (this.stayTime === 200) this.takePhoto(); }
                else if (this.currentLocation === 'cafe') { 
                    const d = loc.menu[Math.floor(Math.random()*loc.menu.length)]; 
                    this.currentActivity = `вҳ• ${d}`; this.currentEmoji = 'вҳ•'; 
                    if (!this.actionBubble) this.actionBubble = `е“Ғе°қ${d}...`; 
                    this.mood += 0.008; 
                    // е°қиҜ•дёҺе…¶д»–AgentеҜ№иҜқ
                    if (this.stayTime === 150 && !this.dialogueWith) this.tryDialogue();
                    if (this.stayTime === 200) this.socialize(); 
                }
                else if (this.currentLocation === 'library') { const b = loc.books[Math.floor(Math.random()*loc.books.length)]; this.currentActivity = 'рҹ“– йҳ…иҜ»'; this.currentEmoji = 'рҹ“ҡ'; if (!this.actionBubble) this.actionBubble = `йҳ…иҜ»гҖҠ${b}гҖӢ...`; if (this.stayTime === 250) this.readBook(b); }
                else if (this.currentLocation === 'arcade') { this.currentActivity = 'рҹҺ® жёёжҲҸ'; this.currentEmoji = 'рҹҺ®'; if (!this.actionBubble) this.actionBubble = 'зҺ©жёёжҲҸдёӯ...'; if (Math.random()<0.015){this.coins+=Math.floor(Math.random()*30)+10;this.mood+=5;} }
                else if (this.currentLocation === 'beach') { this.currentActivity = 'рҹҸ–пёҸ жө·ж»©'; this.currentEmoji = Math.random()>0.5?'рҹҺЈ':'рҹҸ–пёҸ'; if(!this.actionBubble) this.actionBubble='жө·иҫ№дј‘й—І...'; if(Math.random()<0.008){const f=loc.fish[Math.floor(Math.random()*loc.fish.length)];const v=loc.fish.indexOf(f)*20+20;this.coins+=v;showAchievement('рҹҺЈ','й’“йұјжҲҗеҠҹ!',`${this.name}й’“еҲ°${f}пјҢ+${v}йҮ‘еёҒ!`);} this.mood+=0.003; }
                else if (this.currentLocation === 'university') { this.currentActivity = 'рҹҸӣпёҸ еӯҰд№ '; this.currentEmoji = 'рҹ“–'; if(!this.actionBubble) this.actionBubble = 'еӨ§еӯҰдёҠиҜҫ...'; this.mood+=0.004; }
                else if (this.currentLocation === 'hospital') { this.currentActivity = 'рҹҸҘ дҪ“жЈҖ'; this.currentEmoji = 'рҹҸҘ'; if(!this.actionBubble) this.actionBubble = 'еҒҡдҪ“жЈҖ...'; this.health+=0.02; }
                else if (this.currentLocation === 'cinema') { this.currentActivity = 'рҹҺ¬ и§ӮеҪұ'; this.currentEmoji = 'рҹҺ¬'; if(!this.actionBubble) this.actionBubble = 'зңӢз”өеҪұ...'; this.mood+=0.01; this.coins-=20; }
                else if (this.currentLocation === 'gym') { this.currentActivity = 'рҹ’Ә й”»зӮј'; this.currentEmoji = 'рҹ’Ә'; if(!this.actionBubble) this.actionBubble = 'еҒҘиә«дёӯ...'; this.energy-=0.005; this.mood+=0.006; }
                else if (this.currentLocation === 'restaurant') { const f=loc.menu[Math.floor(Math.random()*loc.menu.length)]; this.currentActivity = `рҹҚң ${f}`; this.currentEmoji = 'рҹҚң'; if(!this.actionBubble) this.actionBubble = `еҗғ${f}...`; this.hunger+=0.02; this.mood+=0.008; this.coins-=30; }
                else if (this.currentLocation === 'hotel') { this.currentActivity = 'вҷЁпёҸ жё©жіү'; this.currentEmoji = 'вҷЁпёҸ'; if(!this.actionBubble) this.actionBubble = 'жіЎжё©жіүдёӯ...'; this.energy+=0.015; this.mood+=0.01; this.health+=0.005; }
                else if (this.currentLocation === 'school') { this.currentActivity = 'рҹҸ« дёҠиҜҫ'; this.currentEmoji = 'рҹҸ«'; if(!this.actionBubble) this.actionBubble = 'е°ҸеӯҰдёҠиҜҫ...'; this.mood+=0.003; }
                else if (this.currentLocation === 'shop') { this.currentActivity = 'рҹӣ’ иҙӯзү©'; this.currentEmoji = 'рҹӣ’'; if(!this.actionBubble) this.actionBubble = 'йҖӣиЎ—дёӯ...'; }
                
                if (this.stayTime > CONFIG.MIN_STAY_TIME && Math.random() < 0.002 && !this.dialogueWith) this.think();
            }
            
            async tryDialogue() {
                const others = agents.filter(a => a.id !== this.id && a.currentLocation === this.currentLocation && !a.dialogueWith);
                if (others.length > 0 && Math.random() > 0.4) {
                    const other = others[0];
                    this.dialogueWith = other;
                    other.dialogueWith = this;
                    this.dialogueStartTime = this.stayTime;
                    other.dialogueStartTime = this.stayTime;
                    
                    const dialogue = await generateDialogue(this, other);
                    this.dialogueBubble = dialogue;
                    other.dialogueBubble = dialogue;
                    
                    showAchievement('рҹ’¬', 'еҒ¶йҒҮеҜ№иҜқ!', dialogue.replace(/\n/g, '\n'));
                }
            }
            
            updateActivityText() {
                const acts = {
                    home: ['еңЁе®¶дј‘жҒҜ...', 'зңӢз”өи§Ҷ...', 'еҗ¬йҹід№җ...'],
                    park: ['ж¬ЈиөҸжЁұиҠұ...', 'жӢҚз…§жү“еҚЎ...', 'йҮҺйӨҗ...'],
                    cafe: ['е“Ғе°қе’–е•Ў...', 'иҒҠеӨ©...', 'зңӢзӘ—еӨ–...'],
                    library: ['и®Өзңҹйҳ…иҜ»...', 'еҒҡз¬”и®°...', 'жҹҘиө„ж–ҷ...'],
                    arcade: ['зҺ©жёёжҲҸ...', 'жҢ‘жҲҳй«ҳеҲҶ...', 'жҠ“еЁғеЁғ...'],
                    beach: ['й’“йұј...', 'жҷ’еӨӘйҳі...', 'жҚЎиҙқеЈі...'],
                    university: ['дёҠиҜҫ...', 'еҒҡе®һйӘҢ...', 'еӣҫд№ҰйҰҶ...'],
                    hospital: ['дҪ“жЈҖ...', 'зңӢз—…...', 'е’ЁиҜў...'],
                    cinema: ['зңӢз”өеҪұ...', 'д№°зҲҶзұіиҠұ...', 'зӯүејҖеңә...'],
                    gym: ['и·‘жӯҘ...', 'дёҫй“Ғ...', 'з‘ңдјҪ...'],
                    restaurant: ['еҗғжӢүйқў...', 'еҗғйҘӯ...', 'зәҰдјҡ...'],
                    hotel: ['жіЎжё©жіү...', 'жҢүж‘©...', 'spa...'],
                    school: ['дёҠиҜҫ...', 'дҪ“иӮІиҜҫ...', 'зҺ©иҖҚ...'],
                    shop: ['йҖӣиЎ—...', 'зңӢе•Ҷе“Ғ...'],
                };
                const list = acts[this.currentLocation] || ['жҙ»еҠЁдёӯ...'];
                this.actionBubble = list[Math.floor(Math.random() * list.length)];
            }
            
            takePhoto() {
                const scenes = ['жЁұиҠұж ‘дёӢ', 'ж№–иҫ№', 'е–·жіүж—Ғ', 'й•ҝжӨ…дёҠ'];
                const scene = scenes[Math.floor(Math.random()*scenes.length)];
                showAchievement('рҹ“ё','жӢҚз…§жҲҗеҠҹ!',`рҹ“ё ${scene}\nAgent: ${this.name}\nрҹҳҠ еҝғжғ…: ${Math.floor(this.mood)}`);
                if(!this.achievements.includes('first_photo')) this.achievements.push('first_photo');
            }
            
            socialize() {
                const other = agents.filter(a=>a.id!==this.id&&a.currentLocation==='cafe'&&!this.friends.includes(a.id));
                if(other.length>0&&Math.random()>0.3){const f=other[0];this.friends.push(f.id);f.friends.push(this.id);this.mood+=20;this.coins+=10;showAchievement('рҹ’¬','и®ӨиҜҶж–°жңӢеҸӢ!',`${this.name}е’Ң${f.name}жҲҗдёәжңӢеҸӢ! рҹ‘Ӣ\n+10йҮ‘еёҒ`);}
            }
            
            readBook(book) {
                const insights=['иҝҷжң¬д№ҰеҫҲжңүеҗҜеҸ‘...','еӯҰеҲ°дәҶж–°зҹҘиҜҶ...','еҖјеҫ—дёҖиҜ»...'];
                const insight=insights[Math.floor(Math.random()*insights.length)];
                const rating=Math.floor(Math.random()*3)+7;
                showAchievement('рҹ“–','иҜ»д№Ұеҝғеҫ—!',`рҹ“ҡ ${book}\nрҹ’Ў ${insight}\nвӯҗ ${rating}/10`);
            }
            
            think() {
                const hour = Math.floor(gameTime / 60);
                const prefs = this.personalityData;
                
                if (this.hunger < 15 || this.energy < 10 || this.health < 30) { this.goToLocation(this.health<30?'hospital':this.hunger<15?'restaurant':'home'); return; }
                if (this.mood < 15) { this.goToLocation('cinema'); return; }
                
                if (hour >= 22 || hour < 6) this.goToLocation('home');
                else if (hour >= 6 && hour < 9) this.goToLocation(prefs.morning);
                else if (hour >= 9 && hour < 12) this.goToLocation(this.personality==='energetic'?'shop':'university');
                else if (hour >= 12 && hour < 14) this.goToLocation('restaurant');
                else if (hour >= 14 && hour < 18) this.goToLocation(prefs.preferred[Math.floor(Math.random()*prefs.preferred.length)]);
                else if (hour >= 18 && hour < 20) this.goToLocation(Math.random()>0.5?'shop':'cinema');
                else this.goToLocation(prefs.preferred[Math.floor(Math.random()*prefs.preferred.length)]);
            }
            
            goToLocation(locationId) {
                const loc = LOCATIONS[locationId];
                if (!loc || this.currentLocation === locationId) return;
                this.dialogueWith = null;
                this.dialogueBubble = '';
                this.targetX = (loc.x + 0.5 + Math.random()*(loc.w-1))*CONFIG.TILE_SIZE;
                this.targetY = (loc.y + 0.5 + Math.random()*(loc.h-1))*CONFIG.TILE_SIZE;
                this.currentLocation = locationId;
                this.moving = true;
                this.actionBubble = '';
            }
            
            arrive() { this.stayTime = 0; this.bubbleStartTime = 0; }
            
            draw(ctx) {
                const px = this.x, py = this.y, size = CONFIG.TILE_SIZE;
                
                // йҳҙеҪұ
                ctx.fillStyle='rgba(0,0,0,0.25)';
                ctx.beginPath();ctx.ellipse(px+size/2,py+size-5,size/3,6,0,0,Math.PI*2);ctx.fill();
                
                // иә«дҪ“
                ctx.fillStyle=this.clothesColor;
                ctx.fillRect(px+16,py+26,20,22);
                
                // и…ҝйғЁ
                ctx.fillStyle='#333';
                const lo=this.moving?Math.sin(this.walkFrame*Math.PI/2)*3:0;
                ctx.fillRect(px+16,py+44,6,8+lo);ctx.fillRect(px+30,py+44,6,8-lo);
                
                // еӨҙ
                ctx.fillStyle=this.skinColor;
                ctx.fillRect(px+16,py+8,20,18);
                
                // еӨҙеҸ‘
                ctx.fillStyle=this.hairColor;
                ctx.fillRect(px+14,py+4,24,10);ctx.fillRect(px+16,py+14,4,6);ctx.fillRect(px+34,py+14,4,6);
                
                // зңјзқӣ
                ctx.fillStyle='#222';
                if(this.direction==='left')ctx.fillRect(px+18,py+16,3,3);
                else if(this.direction==='right')ctx.fillRect(px+33,py+16,3,3);
                else{ctx.fillRect(px+19,py+16,3,3);ctx.fillRect(px+30,py+16,3,3);}
                
                // еҳҙе·ҙ
                ctx.fillStyle='#c44';ctx.fillRect(px+24,py+22,4,2);
                
                // дјҳе…ҲжҳҫзӨәеҜ№иҜқж°”жіЎ
                if(!this.moving && this.dialogueBubble) {
                    ctx.font='bold 12px "Pixelify Sans",sans-serif';
                    const lines = this.dialogueBubble.split('\n');
                    let maxWidth = 0;
                    lines.forEach(line => { maxWidth = Math.max(maxWidth, ctx.measureText(line).width); });
                    
                    const bubbleH = lines.length * 16 + 12;
                    const bubbleW = maxWidth + 16;
                    
                    ctx.fillStyle='white';
                    ctx.beginPath();
                    ctx.roundRect(px+size/2-bubbleW/2-4, py-30-bubbleH, bubbleW+8, bubbleH+8, 6);
                    ctx.fill();
                    
                    ctx.fillStyle='#333';
                    lines.forEach((line, i) => {
                        ctx.fillText(line, px+size/2-maxWidth/2, py-24-bubbleH + i*16);
                    });
                }
                // жҷ®йҖҡж°”жіЎ
                else if (!this.moving && this.actionBubble) {
                    ctx.font='bold 12px "Pixelify Sans",sans-serif';
                    const text = this.currentEmoji + ' ' + this.actionBubble;
                    const textWidth = ctx.measureText(text).width;
                    
                    ctx.fillStyle='white';
                    ctx.beginPath();
                    ctx.roundRect(px+size/2-textWidth/2-6, py-28, textWidth+12, 20, 4);
                    ctx.fill();
                    
                    ctx.fillStyle='#333';
                    ctx.fillText(text, px+size/2-textWidth/2, py-13);
                }
                
                // йҖүдёӯж Үи®°
                if(selectedAgent===this){ctx.fillStyle='#FFD700';ctx.font='bold 14px sans-serif';ctx.fillText('вҳ…',px+20,py-40);}
            }
        }
        
        // ==================== жёІжҹ“еҮҪж•° ====================
        function drawMap() {
            const w = CONFIG.MAP_WIDTH*CONFIG.TILE_SIZE;
            const h = CONFIG.MAP_HEIGHT*CONFIG.TILE_SIZE;
            
            // иҚүең°иғҢжҷҜ
            const grad=ctx.createLinearGradient(0,0,0,h);
            grad.addColorStop(0,'#5a8f3e');grad.addColorStop(1,'#4a7c3f');
            ctx.fillStyle=grad;ctx.fillRect(0,0,w,h);
            
            // иҚүең°зә№зҗҶ
            for(let i=0;i<CONFIG.MAP_WIDTH;i++){
                for(let j=0;j<CONFIG.MAP_HEIGHT;j++){
                    const idx=i+j*CONFIG.MAP_WIDTH;
                    if(idx<grassPattern.length){
                        ctx.fillStyle=grassPattern[idx];
                        ctx.fillRect(i*CONFIG.TILE_SIZE+12,j*CONFIG.TILE_SIZE+12,6,8);
                    }
                }
            }
            
            // йҒ“и·Ҝ
            ctx.fillStyle='#6a6a6a';
            ctx.fillRect(7*CONFIG.TILE_SIZE, 0, 2*CONFIG.TILE_SIZE, h);
            ctx.fillRect(0, 6*CONFIG.TILE_SIZE, w, 2*CONFIG.TILE_SIZE);
            ctx.fillRect(21*CONFIG.TILE_SIZE, 0, 2*CONFIG.TILE_SIZE, h);
            ctx.fillRect(0, 20*CONFIG.TILE_SIZE, w, 2*CONFIG.TILE_SIZE);
            
            // йҒ“и·Ҝзәҝ
            ctx.fillStyle='#888';
            for(let i=0;i<w;i+=CONFIG.TILE_SIZE*2){ctx.fillRect(i+24,6*CONFIG.TILE_SIZE+8,8,4);}
            
            Object.entries(LOCATIONS).forEach(([id,loc])=>drawLocation(id,loc));
        }
        
        function drawLocation(id,loc){
            const x=loc.x*CONFIG.TILE_SIZE,y=loc.y*CONFIG.TILE_SIZE,w=loc.w*CONFIG.TILE_SIZE,h=loc.h*CONFIG.TILE_SIZE;
            
            // з»ҳеҲ¶иғҢжҷҜ
            ctx.fillStyle=loc.color;ctx.globalAlpha=0.5;ctx.fillRect(x,y,w,h);ctx.globalAlpha=1;
            ctx.strokeStyle='#fff';ctx.lineWidth=2;ctx.strokeRect(x+2,y+2,w-4,h-4);
            
            // е°қиҜ•дҪҝз”ЁеғҸзҙ зҙ жқҗз»ҳеҲ¶пјҢеҗҰеҲҷдҪҝз”ЁзЁӢеәҸеҢ–з»ҳеҲ¶
            const tileKey = {'park':'park','home':'house1','cafe':'cafe','library':'library',
                           'arcade':'arcade','beach':'beach','university':'university',
                           'hospital':'hospital','cinema':'cinema','gym':'gym',
                           'restaurant':'restaurant','hotel':'hotel','school':'school','shop':'shop'}[id];
            
            if(tileKey && TILE_IMAGES[tileKey]) {
                // дҪҝз”ЁеғҸзҙ зҙ жқҗз»ҳеҲ¶ (еұ…дёӯзј©ж”ҫ)
                const img = TILE_IMAGES[tileKey];
                const scale = Math.min(w / img.width, h / img.height) * 0.9;
                const dw = img.width * scale, dh = img.height * scale;
                ctx.drawImage(img, x + (w - dw) / 2, y + (h - dh) / 2, dw, dh);
            } else {
                // еӣһйҖҖеҲ°зЁӢеәҸеҢ–з»ҳеҲ¶
                if(id==='park')drawPark(x,y,w,h);
                else if(id==='home')drawHomes(x,y,w,h);
                else if(id==='cafe')drawCafe(x,y,w,h);
                else if(id==='library')drawLibrary(x,y,w,h);
                else if(id==='arcade')drawArcade(x,y,w,h);
                else if(id==='beach')drawBeach(x,y,w,h);
                else if(id==='university')drawUniversity(x,y,w,h);
                else if(id==='hospital')drawHospital(x,y,w,h);
                else if(id==='cinema')drawCinema(x,y,w,h);
                else if(id==='gym')drawGym(x,y,w,h);
                else if(id==='restaurant')drawRestaurant(x,y,w,h);
                else if(id==='hotel')drawHotel(x,y,w,h);
                else if(id==='school')drawSchool(x,y,w,h);
                else drawShop(x,y,w,h);
            }
            
            ctx.fillStyle='#fff';ctx.font='bold 12px "Pixelify Sans",sans-serif';
            ctx.strokeStyle='#000';ctx.lineWidth=3;ctx.strokeText(loc.name,x+8,y+18);ctx.fillText(loc.name,x+8,y+18);
        }
        
        function drawPark(x,y,w,h){[[0.5,0.5],[2,0.5],[4,0.5],[1,2],[3,2],[5,2],[0.5,3.5],[4.5,3.5]].forEach(([tx,ty])=>drawTree(x+tx*CONFIG.TILE_SIZE,y+ty*CONFIG.TILE_SIZE,'#f2a2b8'));ctx.fillStyle='#5dabeb';ctx.fillRect(x+w*0.5,y+h*0.4,w*0.4,h*0.4);}
        function drawTree(x,y,color){ctx.fillStyle='#6b4423';ctx.fillRect(x+18,y+22,14,26);ctx.fillStyle=color;ctx.beginPath();ctx.arc(x+25,y+18,18,0,Math.PI*2);ctx.fill();}
        function drawHomes(x,y,w,h){['#a0522d','#cd853f','#deb887','#8fbc8f'].forEach((c,i)=>{ctx.fillStyle=c;ctx.fillRect(x+14+i*40,y+28,36,32);ctx.fillStyle='#4a4a4a';ctx.beginPath();ctx.moveTo(x+6+i*40,y+28);ctx.lineTo(x+32+i*40,y+4);ctx.lineTo(x+58+i*40,y+28);ctx.fill();});}
        function drawCafe(x,y,w,h){ctx.fillStyle='#8b5a2b';ctx.fillRect(x+40,y+50,w-60,h-70);ctx.fillStyle='#5c3d2e';ctx.beginPath();ctx.moveTo(x+30,y+50);ctx.lineTo(x+w/2,y+15);ctx.lineTo(x+w-30,y+50);ctx.fill();ctx.fillStyle='#ffe4b5';ctx.fillRect(x+55,y+70,24,30);ctx.fillRect(x+100,y+70,24,30);ctx.font='24px sans-serif';ctx.fillText('вҳ•',x+85,y+42);}
        function drawLibrary(x,y,w,h){ctx.fillStyle='#2c4a6e';ctx.fillRect(x+28,y+38,w-45,h-55);ctx.fillStyle='#1a2d4a';ctx.beginPath();ctx.moveTo(x+18,y+38);ctx.lineTo(x+w/2,y+8);ctx.lineTo(x+w-18,y+38);ctx.fill();ctx.fillStyle='#5c3d2e';ctx.fillRect(x+52,y+68,48,58);ctx.font='24px sans-serif';ctx.fillText('рҹ“ҡ',x+65,y+32);}
        function drawArcade(x,y,w,h){ctx.fillStyle='#4a1a6b';ctx.fillRect(x+28,y+45,w-45,h-60);ctx.fillStyle='#ff69b4';ctx.fillRect(x+33,y+50,w-55,15);for(let i=0;i<3;i++){ctx.fillStyle='#2a0a4a';ctx.fillRect(x+35+i*32,y+75,26,32);}}
        function drawBeach(x,y,w,h){ctx.fillStyle='#e6c288';ctx.fillRect(x,y,w,h);ctx.fillStyle='#4a90b5';ctx.fillRect(x,y+h-48,w,48);drawTree(x+40,y+45,'#228b22');drawTree(x+160,y+60,'#228b22');}
        function drawUniversity(x,y,w,h){ctx.fillStyle='#5a6a7a';ctx.fillRect(x+22,y+35,w-35,h-50);ctx.fillStyle='#3a4a5a';ctx.fillRect(x+14,y+20,w-20,22);ctx.fillStyle='#87ceeb';ctx.fillRect(x+20,y+24,20,20);ctx.fillStyle='#4a4a4a';ctx.fillRect(x+12,y+h-20,w-18,16);ctx.font='26px sans-serif';ctx.fillText('рҹҸӣпёҸ',x+45,y+60);}
        function drawHospital(x,y,w,h){ctx.fillStyle='#f5f5f5';ctx.fillRect(x+20,y+28,w-32,h-42);ctx.fillStyle='#e8e8e8';ctx.fillRect(x+14,y+18,w-20,20);ctx.fillStyle='#e94560';ctx.fillRect(x+38,y+22,20,14);ctx.font='24px sans-serif';ctx.fillText('рҹҸҘ',x+62,y+55);}
        function drawCinema(x,y,w,h){ctx.fillStyle='#2f2f2f';ctx.fillRect(x+20,y+28,w-32,h-42);ctx.fillStyle='#ffd700';ctx.fillRect(x+25,y+35,w-42,30);ctx.fillStyle='#4a4a4a';ctx.fillRect(x+12,y+h-16,w-18,14);}
        function drawGym(x,y,w,h){ctx.fillStyle='#ff6347';ctx.fillRect(x+14,y+22,w-22,h-32);ctx.fillStyle='#8b0000';ctx.fillRect(x+20,y+28,w-32,24);ctx.fillStyle='#fff';ctx.fillRect(x+24,y+32,12,16);ctx.fillRect(x+48,y+32,12,16);ctx.font='20px sans-serif';ctx.fillText('рҹ’Ә',x+48,y+h-8);}
        function drawRestaurant(x,y,w,h){ctx.fillStyle='#cd5c5c';ctx.fillRect(x+28,y+35,w-45,h-50);ctx.fillStyle='#8b0000';ctx.beginPath();ctx.moveTo(x+18,y+35);ctx.lineTo(x+w/2,y+8);ctx.lineTo(x+w-18,y+35);ctx.fill();ctx.font='24px sans-serif';ctx.fillText('рҹҚң',x+75,y+70);}
        function drawHotel(x,y,w,h){ctx.fillStyle='#dda0dd';ctx.fillRect(x+20,y+22,w-32,h-32);ctx.fillStyle='#ba55d3';ctx.fillRect(x+14,y+14,w-20,18);ctx.fillStyle='#4a4a4a';ctx.fillRect(x+24,y+34,16,30);ctx.fillRect(x+52,y+34,16,30);ctx.fillStyle='#ffe4b5';ctx.fillRect(x+27,y+38,10,12);ctx.fillRect(x+55,y+38,10,12);ctx.font='20px sans-serif';ctx.fillText('вҷЁпёҸ',x+58,y+h-6);}
        function drawSchool(x,y,w,h){ctx.fillStyle='#87ceeb';ctx.fillRect(x+20,y+28,w-32,h-42);ctx.fillStyle='#4682b4';ctx.fillRect(x+14,y+18,w-20,20);ctx.fillStyle='#deb887';ctx.fillRect(x+24,y+h-18,w-40,14);for(let i=0;i<3;i++){ctx.fillStyle='#87ceeb';ctx.fillRect(x+30+i*30,y+40,22,20);}}
        function drawShop(x,y,w,h){['рҹ‘•','рҹӘ‘','рҹҚі'].forEach((e,i)=>{ctx.fillStyle='#2a8a8a';ctx.fillRect(x+14+i*45,y+20,40,55);ctx.font='22px';ctx.fillText(e,x+22+i*45,y+48);});}
        
        // ==================== UIеҮҪж•° ====================
        function renderAgentList(){
            const list=document.getElementById('agentList');
            list.innerHTML='';
            agents.forEach(agent=>{
                const card=document.createElement('div');
                card.className=`agent-card ${selectedAgent===agent?'selected':''}`;
                card.onclick=()=>selectAgent(agent);
                const p=agent.personalityData;
                card.innerHTML=`<div class="agent-header"><canvas class="agent-avatar" id="avatar-${agent.id}" width="44" height="44"></canvas><div><div class="agent-name">${agent.name}</div><div class="agent-personality">${p.emoji} ${p.name}</div></div></div><div class="agent-status"><span class="status-badge ${agent.mood>50?'high':agent.mood>25?'medium':'low'}">рҹҳҠ${Math.floor(agent.mood)}</span><span class="status-badge ${agent.energy>50?'high':agent.energy>25?'medium':'low'}">вҡЎ${Math.floor(agent.energy)}</span><span class="status-badge">рҹ’°${agent.coins}</span></div>`;
                list.appendChild(card);
                const ac=document.getElementById(`avatar-${agent.id}`).getContext('2d');
                drawAvatar(ac,agent);
            });
        }
        function drawAvatar(ctx,a){ctx.fillStyle='#333';ctx.fillRect(16,24,12,16);ctx.fillStyle=a.skinColor;ctx.fillRect(12,10,20,16);ctx.fillStyle=a.hairColor;ctx.fillRect(10,6,24,8);ctx.fillStyle='#000';ctx.fillRect(14,16,3,3);ctx.fillRect(22,16,3,3);ctx.fillStyle=a.clothesColor;ctx.fillRect(12,28,20,12);}
        function selectAgent(a){selectedAgent=a;renderAgentList();updateLocationPanel(a.currentLocation);}
        function updateLocationPanel(id){const loc=LOCATIONS[id];if(loc){document.getElementById('locationName').textContent=loc.name;document.getElementById('locationDesc').textContent=loc.desc;}}
        function updateStats(){
            const h=Math.floor(gameTime/60),m=Math.floor(gameTime%60);
            document.getElementById('timeDisplay').textContent=`${h.toString().padStart(2,'0')}:${m.toString().padStart(2,'0')}`;
            document.getElementById('dayDisplay').textContent=`з¬¬${gameDay}еӨ©`;
            const avg=Math.floor(agents.reduce((s,a)=>s+(a.mood+a.energy+a.health)/3,0)/agents.length);
            document.getElementById('happiness').textContent=avg+'%';
            document.getElementById('coinsDisplay').textContent='рҹ’° '+agents.reduce((s,a)=>s+a.coins,0);
            document.getElementById('weatherDisplay').textContent=WEATHER[weather];
            if(selectedAgent){document.getElementById('activityText').textContent=selectedAgent.currentActivity;updateLocationPanel(selectedAgent.currentLocation);}
        }
        function showAchievement(e,t,d){document.getElementById('AchievementEmoji').textContent=e;document.getElementById('AchievementTitle').textContent=t;document.getElementById('AchievementDesc').textContent=d;document.getElementById('achievementPopup').classList.add('show');document.getElementById('overlay').classList.add('show');setTimeout(()=>closeAchievement(),6000);}
        function closeAchievement(){document.getElementById('achievementPopup').classList.remove('show');document.getElementById('overlay').classList.remove('show');}
        
        function claimAgent(){if(!selectedAgent){alert('иҜ·е…ҲйҖүжӢ©дёҖдёӘAgent');return;}showAchievement('вқӨпёҸ','и®ӨйўҶжҲҗеҠҹ!',`дҪ и®ӨйўҶдәҶ ${selectedAgent.name}пјҒ`);}
        function setGoal(){if(!selectedAgent){alert('иҜ·е…ҲйҖүжӢ©дёҖдёӘAgent');return;}document.getElementById('goalInput').value='';document.getElementById('goalPopup').style.display='block';document.getElementById('overlay').style.display='block';document.getElementById('goalInput').focus();}
        function closeGoalInput(){document.getElementById('goalPopup').style.display='none';document.getElementById('overlay').style.display='none';}
        function submitGoal(){const input=document.getElementById('goalInput').value.trim();if(!input){alert('иҜ·иҫ“е…Ҙзӣ®ж Ү');return;}const locId=parseNaturalLanguageGoal(input);if(locId){selectedAgent.goToLocation(locId);showAchievement('рҹҺҜ','зӣ®ж Үи®ҫе®ҡ!',`${selectedAgent.name} е°ҶеүҚеҫҖ ${LOCATIONS[locId].name}`);closeGoalInput();}else{alert('ж— жі•зҗҶи§ЈиҝҷдёӘзӣ®ж ҮпјҢиҜ·е°қиҜ•жӣҙз®ҖеҚ•зҡ„иЎЁиҫҫеҰӮпјҡеҺ»е…¬еӣӯгҖҒд№°е’–е•ЎгҖҒзңӢз—…зӯү');}}
        function parseNaturalLanguageGoal(text){text=text.toLowerCase();for(const[key,locId]of Object.entries(GOAL_MAPPING)){if(text.includes(key))return locId;}return null;}
        function sendGift(){if(!selectedAgent){alert('иҜ·е…ҲйҖүжӢ©дёҖдёӘAgent');return;}const gifts=[['рҹҚҺ',10,0],['рҹҺҒ',15,0],['рҹ“ҡ',12,0],['рҹ’°',5,100]];const g=gifts[Math.floor(Math.random()*gifts.length)];selectedAgent.coins+=g[2];selectedAgent.mood+=g[1];showAchievement('рҹҺҒ','ж”¶еҲ°зӨјзү©!',`дҪ йҖҒз»ҷдәҶ ${selectedAgent.name} ${g[0]}!`);}
        function quickAction(loc){if(!selectedAgent){alert('иҜ·е…ҲйҖүжӢ©дёҖдёӘAgent');return;}selectedAgent.goToLocation(loc);showAchievement('вһЎпёҸ','еҮәеҸ‘!',`${selectedAgent.name} еүҚеҫҖ${LOCATIONS[loc].name}`);}
        
        function gameLoop(){
            const now=Date.now(),dt=(now-lastTime)/1000;lastTime=now;
            gameTime+=dt*CONFIG.TIME_SCALE;
            if(gameTime>=CONFIG.DAY_DURATION){gameTime=0;gameDay++;showAchievement('рҹҢ…','ж–°зҡ„дёҖеӨ©!',`ж¬ўиҝҺз¬¬${gameDay}еӨ©!`);}
            if(Math.random()<0.00005)weather=Math.floor(Math.random()*WEATHER.length);
            
            ctx.clearRect(0,0,canvas.width,canvas.height);
            drawMap();
            agents.forEach(a=>{a.update(dt*60);a.draw(ctx);});
            updateStats();
            requestAnimationFrame(gameLoop);
        }
        
        function init(){
            canvas=document.getElementById('gameCanvas');ctx=canvas.getContext('2d');
            canvas.width=canvas.parentElement.clientWidth;canvas.height=canvas.parentElement.clientHeight;
            initGrassPattern();
            preloadTiles().then(() => {
                console.log('вң… еғҸзҙ зҙ жқҗеҠ иҪҪе®ҢжҲҗ');
            });
            agents.push(new Agent('a0','е°ҸжҳҺ','gentle'));
            agents.push(new Agent('a1','е°Ҹзәў','energetic'));
            agents.push(new Agent('a2','е°ҸеҲҡ','scholar'));
            renderAgentList();
            window.addEventListener('resize',()=>{canvas.width=canvas.parentElement.clientWidth;canvas.height=canvas.parentElement.clientHeight;});
            canvas.addEventListener('click',e=>{const r=canvas.getBoundingClientRect(),x=e.clientX-r.left,y=e.clientY-r.top;agents.forEach(a=>{if(Math.sqrt((a.x-x)**2+(a.y-y)**2<45))selectAgent(a);});});
            document.getElementById('goalInput').addEventListener('keypress',e=>{if(e.key==='Enter')submitGoal();});
            gameLoop();
        }
        window.onload=init;
    </script>
</body>
</html>
