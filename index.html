<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🏙️ AgentCity - 像素都市</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pixelify+Sans:wght@400;600;700&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        :root {
            --bg-dark: #1a1a2e;
            --bg-card: #16213e;
            --accent-pink: #e94560;
            --accent-cyan: #0f3460;
            --text-light: #eaeaea;
            --text-dim: #a0a0a0;
        }
        
        body {
            font-family: 'Pixelify Sans', 'Noto Sans SC', sans-serif;
            background: var(--bg-dark);
            color: var(--text-light);
            min-height: 100vh;
            overflow: hidden;
        }
        
        .app-container {
            display: flex;
            height: 100vh;
            gap: 0;
        }
        
        /* 左侧面板 */
        .sidebar {
            width: 320px;
            background: var(--bg-card);
            display: flex;
            flex-direction: column;
            border-right: 3px solid var(--accent-cyan);
            box-shadow: 4px 0 20px rgba(0,0,0,0.5);
        }
        
        .sidebar-header {
            padding: 20px;
            background: linear-gradient(135deg, var(--accent-cyan), var(--accent-pink));
            text-align: center;
        }
        
        .sidebar-header h1 {
            font-size: 28px;
            text-shadow: 2px 2px 0 #000;
            margin-bottom: 5px;
        }
        
        .city-stats {
            display: flex;
            justify-content: space-around;
            padding: 15px;
            background: rgba(0,0,0,0.3);
            font-size: 14px;
        }
        
        .stat-item {
            text-align: center;
        }
        
        .stat-value {
            font-size: 20px;
            font-weight: bold;
            color: #ffd700;
        }
        
        /* Agent列表 */
        .agent-list {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
        }
        
        .agent-card {
            background: linear-gradient(135deg, #2a2a4a, #1a1a3a);
            border-radius: 12px;
            padding: 12px;
            margin-bottom: 10px;
            cursor: pointer;
            transition: all 0.3s;
            border: 2px solid transparent;
        }
        
        .agent-card:hover {
            border-color: var(--accent-pink);
            transform: translateX(5px);
        }
        
        .agent-card.selected {
            border-color: #ffd700;
            box-shadow: 0 0 15px rgba(255,215,0,0.3);
        }
        
        .agent-header {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .agent-avatar {
            width: 40px;
            height: 40px;
            border-radius: 8px;
            image-rendering: pixelated;
        }
        
        .agent-name {
            font-weight: bold;
            font-size: 16px;
        }
        
        .agent-personality {
            font-size: 12px;
            color: var(--text-dim);
        }
        
        .agent-status {
            display: flex;
            gap: 8px;
            margin-top: 8px;
            flex-wrap: wrap;
        }
        
        .status-badge {
            font-size: 11px;
            padding: 3px 8px;
            border-radius: 10px;
            background: rgba(255,255,255,0.1);
        }
        
        .status-badge.high { background: #4ade80; color: #000; }
        .status-badge.medium { background: #fbbf24; color: #000; }
        .status-badge.low { background: #f87171; color: #000; }
        
        /* 控制面板 */
        .control-panel {
            padding: 15px;
            background: rgba(0,0,0,0.4);
            border-top: 2px solid var(--accent-cyan);
        }
        
        .btn {
            width: 100%;
            padding: 12px;
            margin-bottom: 8px;
            border: none;
            border-radius: 8px;
            font-family: inherit;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s;
            font-weight: 600;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, var(--accent-pink), #c73659);
            color: white;
        }
        
        .btn-primary:hover {
            transform: scale(1.02);
            box-shadow: 0 4px 15px rgba(233,69,96,0.4);
        }
        
        .btn-secondary {
            background: linear-gradient(135deg, var(--accent-cyan), #0a2540);
            color: white;
        }
        
        .btn-gift {
            background: linear-gradient(135deg, #ffd700, #ffaa00);
            color: #000;
        }
        
        /* 主游戏区域 */
        .game-area {
            flex: 1;
            position: relative;
            display: flex;
            flex-direction: column;
        }
        
        .game-header {
            padding: 10px 20px;
            background: rgba(0,0,0,0.6);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .time-display {
            font-size: 18px;
        }
        
        .weather-display {
            font-size: 14px;
            padding: 5px 15px;
            background: rgba(255,255,255,0.1);
            border-radius: 20px;
        }
        
        #gameCanvas {
            flex: 1;
            image-rendering: pixelated;
            image-rendering: crisp-edges;
        }
        
        /* 地点信息面板 */
        .location-panel {
            position: absolute;
            bottom: 20px;
            left: 20px;
            background: rgba(22, 33, 62, 0.95);
            border-radius: 15px;
            padding: 15px 20px;
            border: 2px solid var(--accent-cyan);
            max-width: 300px;
        }
        
        .location-name {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 8px;
            color: var(--accent-pink);
        }
        
        .location-desc {
            font-size: 13px;
            color: var(--text-dim);
            line-height: 1.5;
        }
        
        /* Agent信息弹窗 */
        .agent-detail-popup {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: var(--bg-card);
            border-radius: 20px;
            padding: 25px;
            width: 400px;
            max-height: 80vh;
            overflow-y: auto;
            border: 3px solid var(--accent-pink);
            z-index: 1000;
            display: none;
        }
        
        .agent-detail-popup.show {
            display: block;
            animation: popIn 0.3s ease;
        }
        
        @keyframes popIn {
            from { transform: translate(-50%, -50%) scale(0.8); opacity: 0; }
            to { transform: translate(-50%, -50%) scale(1); opacity: 1; }
        }
        
        .popup-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        
        .popup-close {
            background: none;
            border: none;
            color: var(--text-dim);
            font-size: 24px;
            cursor: pointer;
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            margin-bottom: 15px;
        }
        
        .stat-box {
            background: rgba(0,0,0,0.3);
            padding: 10px;
            border-radius: 8px;
            text-align: center;
        }
        
        .stat-box-label {
            font-size: 11px;
            color: var(--text-dim);
        }
        
        .stat-box-value {
            font-size: 18px;
            font-weight: bold;
        }
        
        .friends-list {
            margin-top: 15px;
        }
        
        .friend-item {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px;
            background: rgba(255,255,255,0.05);
            border-radius: 8px;
            margin-bottom: 5px;
        }
        
        /* 遮罩 */
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
            z-index: 999;
            display: none;
        }
        
        .overlay.show {
            display: block;
        }
        
        /* 底部快捷操作 */
        .quick-actions {
            display: flex;
            gap: 5px;
            flex-wrap: wrap;
        }
        
        .quick-btn {
            flex: 1;
            min-width: 80px;
            padding: 8px;
            font-size: 11px;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 6px;
            color: var(--text-light);
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .quick-btn:hover {
            background: var(--accent-pink);
        }
        
        /* 滚动条 */
        ::-webkit-scrollbar {
            width: 8px;
        }
        
        ::-webkit-scrollbar-track {
            background: var(--bg-dark);
        }
        
        ::-webkit-scrollbar-thumb {
            background: var(--accent-cyan);
            border-radius: 4px;
        }
        
        /* 成就提示 */
        .achievement-toast {
            position: fixed;
            top: 20px;
            right: 20px;
            background: linear-gradient(135deg, #ffd700, #ffaa00);
            color: #000;
            padding: 15px 25px;
            border-radius: 10px;
            font-weight: bold;
            z-index: 2000;
            animation: slideIn 0.5s ease, fadeOut 0.5s ease 2.5s forwards;
        }
        
        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        
        @keyframes fadeOut {
            to { opacity: 0; transform: translateY(-20px); }
        }
    </style>
</head>
<body>
    <div class="app-container">
        <!-- 左侧面板 -->
        <div class="sidebar">
            <div class="sidebar-header">
                <h1>🏙️ AgentCity</h1>
                <div style="font-size: 14px; opacity: 0.9;">像素乌托邦</div>
            </div>
            
            <div class="city-stats">
                <div class="stat-item">
                    <div class="stat-value" id="agentCount">8</div>
                    <div>居民</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value" id="happiness">75%</div>
                    <div>幸福度</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value" id="totalCoins">1280</div>
                    <div>喵喵币</div>
                </div>
            </div>
            
            <div class="agent-list" id="agentList"></div>
            
            <div class="control-panel">
                <button class="btn btn-primary" onclick="claimAgent()">认领此Agent</button>
                <button class="btn btn-secondary" onclick="setGoal()">设立目标</button>
                <button class="btn btn-gift" onclick="sendGift()">赠送礼物</button>
                <div class="quick-actions">
                    <button class="quick-btn" onclick="quickAction('park')">🌸去公园</button>
                    <button class="quick-btn" onclick="quickAction('cafe')">☕去咖啡厅</button>
                    <button class="quick-btn" onclick="quickAction('library')">📚去图书馆</button>
                    <button class="quick-btn" onclick="quickAction('arcade')">🎮去游戏厅</button>
                </div>
            </div>
        </div>
        
        <!-- 游戏区域 -->
        <div class="game-area">
            <div class="game-header">
                <div class="time-display" id="timeDisplay">⏰ 08:00</div>
                <div class="weather-display" id="weatherDisplay">☀️ 晴天</div>
            </div>
            <canvas id="gameCanvas"></canvas>
            
            <div class="location-panel" id="locationPanel">
                <div class="location-name" id="locationName">🏠 住宅区</div>
                <div class="location-desc" id="locationDesc">Agent的温馨家园</div>
            </div>
        </div>
    </div>
    
    <!-- Agent详情弹窗 -->
    <div class="overlay" id="overlay"></div>
    <div class="agent-detail-popup" id="agentPopup">
        <div class="popup-header">
            <h2 id="popupName">Agent详情</h2>
            <button class="popup-close" onclick="closePopup()">×</button>
        </div>
        <div class="stats-grid">
            <div class="stat-box">
                <div class="stat-box-label">心情</div>
                <div class="stat-box-value" id="popupMood" style="color: #4ade80;">85</div>
            </div>
            <div class="stat-box">
                <div class="stat-box-label">精力</div>
                <div class="stat-box-value" id="popupEnergy" style="color: #60a5fa;">70</div>
            </div>
            <div class="stat-box">
                <div class="stat-box-label">饱食度</div>
                <div class="stat-box-value" id="popupHunger" style="color: #fb923c;">60</div>
            </div>
            <div class="stat-box">
                <div class="stat-box-label">金币</div>
                <div class="stat-box-value" id="popupCoins" style="color: #ffd700;">500</div>
            </div>
        </div>
        <div class="friends-list">
            <h4 style="margin-bottom: 10px;">👥 好友列表</h4>
            <div id="friendsContainer"></div>
        </div>
    </div>

    <script>
        // ==================== 游戏配置 ====================
        const CONFIG = {
            TILE_SIZE: 32,
            MAP_WIDTH: 40,
            MAP_HEIGHT: 25,
            GAME_SPEED: 1,
            AGENT_SPEED: 2,
            THINK_INTERVAL: 3000,
        };
        
        // 地点定义
        const LOCATIONS = {
            // 地图位置 (x, y, width, height in tiles)
            home: { x: 2, y: 2, w: 4, h: 3, name: '🏠 住宅区', desc: 'Agent的温馨家园', color: '#8B4513' },
            park: { x: 28, y: 2, w: 8, h: 6, name: '🌸 樱花公园', desc: '休闲放松、偶遇新朋友', color: '#FFB7C5' },
            cafe: { x: 2, y: 10, w: 4, h: 4, name: '☕ 咖啡厅', desc: '社交聊天、交朋友', color: '#D2691E' },
            library: { x: 10, y: 2, w: 4, h: 4, name: '📚 图书馆', desc: '阅读学习、获取知识', color: '#4169E1' },
            arcade: { x: 10, y: 10, w: 4, h: 4, name: '🎮 游戏机厅', desc: '娱乐竞技、放松身心', color: '#9400D3' },
            beach: { x: 28, y: 14, w: 10, h: 8, name: '🏖️ 海滩', desc: '钓鱼休闲、享受阳光', color: '#F4A460' },
            shop: { x: 2, y: 18, w: 6, h: 5, name: '🛒 商业街', desc: '购物消费、工作赚钱', color: '#20B2AA' },
            job: { x: 18, y: 10, w: 4, h: 4, name: '💼 职业中心', desc: '打工赚钱、职业发展', color: '#708090' },
        };
        
        // 性格类型
        const PERSONALITIES = {
            gentle: { name: '温柔', emoji: '🌸', color: '#FFB7C5', preferred: ['park', 'cafe'] },
            energetic: { name: '活力', emoji: '⚡', color: '#FFD700', preferred: ['arcade', 'park'] },
            scholar: { name: '学者', emoji: '📚', color: '#4169E1', preferred: ['library', 'home'] },
            artistic: { name: '艺术', emoji: '🎨', color: '#9370DB', preferred: ['park', 'cafe'] },
            cool: { name: '酷酷', emoji: '😎', color: '#2F4F4F', preferred: ['arcade', 'shop'] },
            shy: { name: '害羞', emoji: '🐱', color: '#DDA0DD', preferred: ['library', 'park'] },
            mischief: { name: '调皮', emoji: '🦊', color: '#FF6347', preferred: ['arcade', 'park'] },
            leader: { name: '领袖', emoji: '🌟', color: '#FF4500', preferred: ['job', 'cafe'] },
        };
        
        // 天气类型
        const WEATHER = ['☀️ 晴天', '🌧️ 小雨', '❄️ 小雪', '🌤️ 多云', '🌈 彩虹'];
        
        // ==================== 游戏状态 ====================
        let canvas, ctx;
        let agents = [];
        let selectedAgent = null;
        let gameTime = 8 * 60; // 分钟
        let weather = 0;
        let camera = { x: 0, y: 0 };
        let isDragging = false;
        let lastMouse = { x: 0, y: 0 };
        
        // ==================== Agent类 ====================
        class Agent {
            constructor(id, name, personality) {
                this.id = id;
                this.name = name;
                this.personality = personality;
                this.personalityData = PERSONALITIES[personality];
                
                // 状态
                this.mood = 60 + Math.random() * 30;
                this.energy = 60 + Math.random() * 30;
                this.hunger = 50 + Math.random() * 30;
                this.coins = 100 + Math.floor(Math.random() * 400);
                
                // 位置和移动
                this.x = (LOCATIONS.home.x + 1) * CONFIG.TILE_SIZE;
                this.y = (LOCATIONS.home.y + 1) * CONFIG.TILE_SIZE;
                this.targetX = this.x;
                this.targetY = this.y;
                this.moving = false;
                this.direction = 'down';
                this.walkFrame = 0;
                
                // 社交
                this.friends = [];
                this.currentLocation = 'home';
                this.atLocation = null;
                
                // 统计
                this.daysInCity = 0;
                this.friendsMade = 0;
                this.happiness = 70;
                
                // 外观 - 像素风格
                this.colors = {
                    skin: ['#FFDDBB', '#CCAA88', '#8D5524', '#C68642'],
                    hair: ['#2C1810', '#4A3728', '#8B4513', '#DAA520', '#FF6347', '#4169E1'],
                    clothes: ['#E94560', '#0F3460', '#4ADE80', '#FBBF24', '#60A5FA', '#A78BFA'],
                };
                this.skinColor = this.colors.skin[Math.floor(Math.random() * this.colors.skin.length)];
                this.hairColor = this.colors.hair[Math.floor(Math.random() * this.colors.hair.length)];
                this.clothesColor = this.colors.clothes[Math.floor(Math.random() * this.colors.clothes.length)];
            }
            
            update() {
                // 状态自然变化
                this.hunger -= 0.01;
                this.energy -= 0.005;
                this.mood -= 0.002;
                
                // 限制范围
                this.mood = Math.max(0, Math.min(100, this.mood));
                this.energy = Math.max(0, Math.min(100, this.energy));
                this.hunger = Math.max(0, Math.min(100, this.hunger));
                
                // 计算幸福度
                this.happiness = (this.mood + this.energy + this.hunger + this.friends.length * 5) / 4;
                this.happiness = Math.min(100, this.happiness);
                
                // 移动逻辑
                if (this.moving) {
                    const dx = this.targetX - this.x;
                    const dy = this.targetY - this.y;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    
                    if (dist < CONFIG.AGENT_SPEED) {
                        this.x = this.targetX;
                        this.y = this.targetY;
                        this.moving = false;
                        this.arrive();
                    } else {
                        this.x += (dx / dist) * CONFIG.AGENT_SPEED;
                        this.y += (dy / dist) * CONFIG.AGENT_SPEED;
                        
                        // 更新方向
                        if (Math.abs(dx) > Math.abs(dy)) {
                            this.direction = dx > 0 ? 'right' : 'left';
                        } else {
                            this.direction = dy > 0 ? 'down' : 'up';
                        }
                        
                        // 动画帧
                        this.walkFrame = (this.walkFrame + 0.2) % 4;
                    }
                } else {
                    this.think();
                }
            }
            
            think() {
                // 根据时间和状态决策
                const hour = Math.floor(gameTime / 60);
                const minute = gameTime % 60;
                
                // 基础需求检查
                if (this.hunger < 20) {
                    this.goToLocation('home');
                    return;
                }
                if (this.energy < 15) {
                    this.goToLocation('home');
                    return;
                }
                if (this.mood < 20) {
                    this.goToLocation('arcade');
                    return;
                }
                
                // 时间段行为
                if (hour >= 22 || hour < 6) {
                    // 睡觉时间
                    this.goToLocation('home');
                } else if (hour >= 6 && hour < 8) {
                    // 早晨
                    this.goToLocation('park');
                } else if (hour >= 8 && hour < 12) {
                    // 上午工作时间
                    if (Math.random() > 0.5) {
                        this.goToLocation('job');
                    } else {
                        this.goToLocation('library');
                    }
                } else if (hour >= 12 && hour < 14) {
                    // 午休
                    this.goToLocation('cafe');
                } else if (hour >= 14 && hour < 18) {
                    // 下午
                    const prefs = this.personalityData.preferred;
                    const loc = prefs[Math.floor(Math.random() * prefs.length)];
                    this.goToLocation(loc);
                } else if (hour >= 18 && hour < 20) {
                    // 傍晚
                    this.goToLocation('shop');
                } else {
                    // 晚间
                    if (Math.random() > 0.5) {
                        this.goToLocation('arcade');
                    } else {
                        this.goToLocation('cafe');
                    }
                }
            }
            
            goToLocation(locationId) {
                const loc = LOCATIONS[locationId];
                if (!loc || this.currentLocation === locationId) return;
                
                // 随机目标位置
                this.targetX = (loc.x + Math.random() * loc.w) * CONFIG.TILE_SIZE;
                this.targetY = (loc.y + Math.random() * loc.h) * CONFIG.TILE_SIZE;
                this.currentLocation = locationId;
                this.moving = true;
                this.atLocation = locationId;
            }
            
            arrive() {
                // 到达地点后的行为
                if (this.currentLocation === 'cafe' && Math.random() > 0.5) {
                    this.chat();
                }
                if (this.currentLocation === 'arcade' && Math.random() > 0.6) {
                    this.play();
                }
                if (this.currentLocation === 'library' && Math.random() > 0.5) {
                    this.read();
                }
            }
            
            chat() {
                // 随机找一个其他Agent聊天
                const otherAgents = agents.filter(a => a.id !== this.id && a.currentLocation === this.currentLocation);
                if (otherAgents.length > 0) {
                    const friend = otherAgents[Math.floor(Math.random() * otherAgents.length)];
                    if (!this.friends.includes(friend.id) && Math.random() > 0.5) {
                        this.friends.push(friend.id);
                        friend.friends.push(this.id);
                        this.friendsMade++;
                        friend.friendsMade++;
                        this.mood += 10;
                        showAchievement(`${this.name} 认识了新朋友 ${friend.name}!`);
                    }
                }
            }
            
            play() {
                const reward = Math.floor(Math.random() * 20) + 5;
                this.coins += reward;
                this.mood += 5;
            }
            
            read() {
                this.mood += 3;
            }
            
            draw(ctx) {
                const px = Math.floor(this.x / CONFIG.TILE_SIZE) * CONFIG.TILE_SIZE;
                const py = Math.floor(this.y / CONFIG.TILE_SIZE) * CONFIG.TILE_SIZE;
                
                // 绘制阴影
                ctx.fillStyle = 'rgba(0,0,0,0.3)';
                ctx.beginPath();
                ctx.ellipse(this.x + 16, this.y + 28, 10, 4, 0, 0, Math.PI * 2);
                ctx.fill();
                
                // 身体
                ctx.fillStyle = this.clothesColor;
                ctx.fillRect(this.x + 10, this.y + 16, 12, 14);
                
                // 头
                ctx.fillStyle = this.skinColor;
                ctx.fillRect(this.x + 10, this.y + 4, 12, 12);
                
                // 头发
                ctx.fillStyle = this.hairColor;
                ctx.fillRect(this.x + 9, this.y + 2, 14, 6);
                
                // 眼睛
                ctx.fillStyle = '#000';
                if (this.direction === 'left') {
                    ctx.fillRect(this.x + 11, this.y + 9, 2, 2);
                } else if (this.direction === 'right') {
                    ctx.fillRect(this.x + 19, this.y + 9, 2, 2);
                } else {
                    ctx.fillRect(this.x + 12, this.y + 9, 2, 2);
                    ctx.fillRect(this.x + 18, this.y + 9, 2, 2);
                }
                
                // 行走动画
                if (this.moving) {
                    const legOffset = Math.sin(this.walkFrame * Math.PI / 2) * 2;
                    ctx.fillStyle = '#333';
                    ctx.fillRect(this.x + 11, this.y + 28, 3, 4 + legOffset);
                    ctx.fillRect(this.x + 18, this.y + 28, 3, 4 - legOffset);
                } else {
                    ctx.fillStyle = '#333';
                    ctx.fillRect(this.x + 11, this.y + 28, 3, 4);
                    ctx.fillRect(this.x + 18, this.y + 28, 3, 4);
                }
                
                // 选中标记
                if (selectedAgent === this) {
                    ctx.fillStyle = '#FFD700';
                    ctx.font = '16px sans-serif';
                    ctx.fillText('★', this.x + 12, this.y - 5);
                }
            }
        }
        
        // ==================== 渲染函数 ====================
        function drawMap() {
            const w = CONFIG.MAP_WIDTH * CONFIG.TILE_SIZE;
            const h = CONFIG.MAP_HEIGHT * CONFIG.TILE_SIZE;
            
            // 草地背景
            ctx.fillStyle = '#4a7c3f';
            ctx.fillRect(0, 0, w, h);
            
            // 草地纹理
            for (let i = 0; i < w; i += CONFIG.TILE_SIZE) {
                for (let j = 0; j < h; j += CONFIG.TILE_SIZE) {
                    if ((i + j) % 64 === 0) {
                        ctx.fillStyle = '#3d6b32';
                        ctx.fillRect(i + 4, j + 4, 4, 4);
                    }
                }
            }
            
            // 道路网格
            ctx.fillStyle = '#4a4a4a';
            // 横向道路
            ctx.fillRect(0, 7 * CONFIG.TILE_SIZE, w, 2 * CONFIG.TILE_SIZE);
            // 纵向道路
            ctx.fillRect(8 * CONFIG.TILE_SIZE, 0, 2 * CONFIG.TILE_SIZE, h);
            ctx.fillRect(24 * CONFIG.TILE_SIZE, 0, 2 * CONFIG.TILE_SIZE, h);
            
            // 道路标记
            ctx.fillStyle = '#6a6a6a';
            for (let i = 0; i < w; i += CONFIG.TILE_SIZE * 2) {
                ctx.fillRect(i + 14, 7 * CONFIG.TILE_SIZE + 6, 4, 4);
                ctx.fillRect(8 * CONFIG.TILE_SIZE + 6, i + 14, 4, 4);
            }
            
            // 绘制各地点
            Object.entries(LOCATIONS).forEach(([id, loc]) => {
                drawLocation(id, loc);
            });
        }
        
        function drawLocation(id, loc) {
            const x = loc.x * CONFIG.TILE_SIZE;
            const y = loc.y * CONFIG.TILE_SIZE;
            const w = loc.w * CONFIG.TILE_SIZE;
            const h = loc.h * CONFIG.TILE_SIZE;
            
            // 地点背景
            ctx.fillStyle = loc.color;
            ctx.globalAlpha = 0.7;
            ctx.fillRect(x, y, w, h);
            ctx.globalAlpha = 1;
            
            // 边框
            ctx.strokeStyle = '#fff';
            ctx.lineWidth = 2;
            ctx.strokeRect(x + 2, y + 2, w - 4, h - 4);
            
            // 绘制建筑物
            if (id === 'park') {
                drawPark(x, y, w, h);
            } else if (id === 'cafe') {
                drawBuilding(x, y, w, h, '☕', '#8B4513');
            } else if (id === 'library') {
                drawBuilding(x, y, w, h, '📚', '#2F4F4F');
            } else if (id === 'arcade') {
                drawBuilding(x, y, w, h, '🎮', '#4B0082');
            } else if (id === 'home') {
                drawHouses(x, y, w, h);
            } else if (id === 'beach') {
                drawBeach(x, y, w, h);
            } else if (id === 'shop') {
                drawShops(x, y, w, h);
            } else if (id === 'job') {
                drawBuilding(x, y, w, h, '💼', '#2F4F4F');
            }
            
            // 地点名称
            ctx.fillStyle = '#fff';
            ctx.font = 'bold 14px "Pixelify Sans", sans-serif';
            ctx.strokeStyle = '#000';
            ctx.lineWidth = 3;
            ctx.strokeText(loc.name, x + 10, y + 20);
            ctx.fillText(loc.name, x + 10, y + 20);
        }
        
        function drawPark(x, y, w, h) {
            // 樱花树
            const treePositions = [
                [2, 1], [6, 2], [3, 4], [7, 3], [1, 5]
            ];
            treePositions.forEach(([tx, ty]) => {
                drawCherryTree(x + tx * CONFIG.TILE_SIZE, y + ty * CONFIG.TILE_SIZE);
            });
            
            // 湖泊
            ctx.fillStyle = '#4da6ff';
            ctx.fillRect(x + 50, y + 80, 80, 50);
            ctx.fillStyle = '#80bfff';
            ctx.fillRect(x + 55, y + 85, 70, 40);
            
            // 小路
            ctx.fillStyle = '#c4a574';
            ctx.fillRect(x + 20, y + 60, 120, 15);
        }
        
        function drawCherryTree(x, y) {
            // 树干
            ctx.fillStyle = '#8B4513';
            ctx.fillRect(x + 12, y + 16, 8, 16);
            // 树冠
            ctx.fillStyle = '#FFB7C5';
            ctx.beginPath();
            ctx.arc(x + 16, y + 12, 12, 0, Math.PI * 2);
            ctx.fill();
            // 花朵细节
            ctx.fillStyle = '#FF69B4';
            for (let i = 0; i < 5; i++) {
                const angle = (i / 5) * Math.PI * 2;
                ctx.beginPath();
                ctx.arc(x + 16 + Math.cos(angle) * 8, y + 12 + Math.sin(angle) * 8, 3, 0, Math.PI * 2);
                ctx.fill();
            }
        }
        
        function drawBuilding(x, y, w, h, emoji, color) {
            // 建筑主体
            ctx.fillStyle = color;
            ctx.fillRect(x + 20, y + 30, w - 40, h - 50);
            
            // 屋顶
            ctx.fillStyle = '#333';
            ctx.beginPath();
            ctx.moveTo(x + 10, y + 30);
            ctx.lineTo(x + w / 2, y + 5);
            ctx.lineTo(x + w - 10, y + 30);
            ctx.closePath();
            ctx.fill();
            
            // 窗户
            ctx.fillStyle = '#FFE4B5';
            for (let i = 0; i < 3; i++) {
                for (let j = 0; j < 2; j++) {
                    ctx.fillRect(x + 35 + i * 25, y + 45 + j * 30, 15, 20);
                }
            }
            
            // Emoji
            ctx.font = '24px sans-serif';
            ctx.fillText(emoji, x + w / 2 - 12, y + h - 10);
        }
        
        function drawHouses(x, y, w, h) {
            const colors = ['#CD5C5C', '#8B4513', '#DAA520', '#2E8B57'];
            for (let i = 0; i < 3; i++) {
                const hx = x + 10 + i * 35;
                const hy = y + 20;
                ctx.fillStyle = colors[i];
                ctx.fillRect(hx, hy, 30, 30);
                // 屋顶
                ctx.fillStyle = '#4a4a4a';
                ctx.beginPath();
                ctx.moveTo(hx - 5, hy);
                ctx.lineTo(hx + 15, hy - 15);
                ctx.lineTo(hx + 35, hy);
                ctx.closePath();
                ctx.fill();
                // 门
                ctx.fillStyle = '#8B4513';
                ctx.fillRect(hx + 10, hy + 15, 10, 15);
            }
        }
        
        function drawBeach(x, y, w, h) {
            // 沙滩
            ctx.fillStyle = '#F4A460';
            ctx.fillRect(x, y, w, h);
            // 海水
            ctx.fillStyle = '#4da6ff';
            ctx.fillRect(x, y + h - 30, w, 30);
            // 波浪
            ctx.fillStyle = '#80bfff';
            for (let i = 0; i < w; i += 20) {
                ctx.beginPath();
                ctx.arc(x + i + 10, y + h - 30, 10, 0, Math.PI);
                ctx.fill();
            }
            // 棕榈树
            drawPalmTree(x + 30, y + 40);
            drawPalmTree(x + 150, y + 60);
        }
        
        function drawPalmTree(x, y) {
            // 树干
            ctx.fillStyle = '#8B4513';
            ctx.fillRect(x + 10, y + 20, 8, 40);
            // 叶子
            ctx.fillStyle = '#228B22';
            for (let i = 0; i < 5; i++) {
                ctx.beginPath();
                ctx.ellipse(x + 14 + Math.cos(i * 0.8) * 15, y + 20 + Math.sin(i * 0.8) * 10, 15, 5, i * 0.5, 0, Math.PI * 2);
                ctx.fill();
            }
        }
        
        function drawShops(x, y, w, h) {
            const shops = ['👕', '🪑', '🍳', '📦'];
            shops.forEach((emoji, i) => {
                const sx = x + 10 + (i % 2) * 60;
                const sy = y + 20 + Math.floor(i / 2) * 40;
                ctx.fillStyle = '#20B2AA';
                ctx.fillRect(sx, sy, 50, 35);
                ctx.font = '20px sans-serif';
                ctx.fillText(emoji, sx + 15, sy + 25);
            });
        }
        
        // ==================== UI函数 ====================
        function renderAgentList() {
            const list = document.getElementById('agentList');
            list.innerHTML = '';
            
            agents.forEach(agent => {
                const card = document.createElement('div');
                card.className = `agent-card ${selectedAgent === agent ? 'selected' : ''}`;
                card.onclick = () => selectAgent(agent);
                
                const personalityData = agent.personalityData;
                
                card.innerHTML = `
                    <div class="agent-header">
                        <canvas class="agent-avatar" id="avatar-${agent.id}" width="40" height="40"></canvas>
                        <div>
                            <div class="agent-name">${agent.name}</div>
                            <div class="agent-personality">${personalityData.emoji} ${personalityData.name}</div>
                        </div>
                    </div>
                    <div class="agent-status">
                        <span class="status-badge ${agent.mood > 50 ? 'high' : agent.mood > 25 ? 'medium' : 'low'}">😊 ${Math.floor(agent.mood)}</span>
                        <span class="status-badge ${agent.energy > 50 ? 'high' : agent.energy > 25 ? 'medium' : 'low'}">⚡ ${Math.floor(agent.energy)}</span>
                        <span class="status-badge ${agent.hunger > 50 ? 'high' : agent.hunger > 25 ? 'medium' : 'low'}">🍽️ ${Math.floor(agent.hunger)}</span>
                        <span class="status-badge">💰 ${agent.coins}</span>
                    </div>
                `;
                
                list.appendChild(card);
                
                // 绘制小头像
                const avatarCanvas = document.getElementById(`avatar-${agent.id}`);
                const avatarCtx = avatarCanvas.getContext('2d');
                drawAvatar(avatarCtx, agent);
            });
        }
        
        function drawAvatar(ctx, agent) {
            ctx.fillStyle = '#333';
            ctx.fillRect(10, 16, 20, 20);
            ctx.fillStyle = agent.skinColor;
            ctx.fillRect(12, 6, 16, 12);
            ctx.fillStyle = agent.hairColor;
            ctx.fillRect(11, 4, 18, 8);
            ctx.fillStyle = '#000';
            ctx.fillRect(15, 10, 2, 2);
            ctx.fillRect(23, 10, 2, 2);
            ctx.fillStyle = agent.clothesColor;
            ctx.fillRect(12, 18, 16, 10);
        }
        
        function selectAgent(agent) {
            selectedAgent = agent;
            renderAgentList();
            updateLocationPanel(agent.currentLocation);
            showAgentPopup(agent);
        }
        
        function showAgentPopup(agent) {
            const popup = document.getElementById('agentPopup');
            const overlay = document.getElementById('overlay');
            
            document.getElementById('popupName').textContent = `${agent.personalityData.emoji} ${agent.name}`;
            document.getElementById('popupMood').textContent = Math.floor(agent.mood);
            document.getElementById('popupEnergy').textContent = Math.floor(agent.energy);
            document.getElementById('popupHunger').textContent = Math.floor(agent.hunger);
            document.getElementById('popupCoins').textContent = agent.coins;
            
            // 好友列表
            const friendsContainer = document.getElementById('friendsContainer');
            const friends = agents.filter(a => agent.friends.includes(a.id));
            
            if (friends.length === 0) {
                friendsContainer.innerHTML = '<div style="color: #a0a0a0; font-size: 12px;">还没有好友</div>';
            } else {
                friendsContainer.innerHTML = friends.map(f => `
                    <div class="friend-item">
                        <span>${f.personalityData.emoji}</span>
                        <span>${f.name}</span>
                    </div>
                `).join('');
            }
            
            popup.classList.add('show');
            overlay.classList.add('show');
        }
        
        function closePopup() {
            document.getElementById('agentPopup').classList.remove('show');
            document.getElementById('overlay').classList.remove('show');
        }
        
        function updateLocationPanel(locationId) {
            const loc = LOCATIONS[locationId];
            if (loc) {
                document.getElementById('locationName').textContent = loc.name;
                document.getElementById('locationDesc').textContent = loc.desc;
            }
        }
        
        function updateStats() {
            document.getElementById('agentCount').textContent = agents.length;
            const avgHappiness = Math.floor(agents.reduce((sum, a) => sum + a.happiness, 0) / agents.length);
            document.getElementById('happiness').textContent = avgHappiness + '%';
            const totalCoins = agents.reduce((sum, a) => sum + a.coins, 0);
            document.getElementById('totalCoins').textContent = totalCoins;
            
            // 时间
            const hour = Math.floor(gameTime / 60);
            const minute = gameTime % 60;
            document.getElementById('timeDisplay').textContent = `⏰ ${hour.toString().padStart(2, '0')}:${minute.toString().padStart(2, '0')}`;
            
            // 天气
            document.getElementById('weatherDisplay').textContent = WEATHER[weather];
        }
        
        function showAchievement(text) {
            const toast = document.createElement('div');
            toast.className = 'achievement-toast';
            toast.textContent = '🎉 ' + text;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }
        
        // ==================== 交互函数 ====================
        function claimAgent() {
            if (!selectedAgent) {
                alert('请先选择一个Agent');
                return;
            }
            showAchievement(`你认领了 ${selectedAgent.name}！`);
        }
        
        function setGoal() {
            if (!selectedAgent) {
                alert('请先选择一个Agent');
                return;
            }
            const goals = ['去交一个新朋友', '去图书馆学习', '去工作赚钱', '去公园散步', '回家休息'];
            const goal = goals[Math.floor(Math.random() * goals.length)];
            
            if (goal.includes('朋友')) {
                selectedAgent.goToLocation('cafe');
            } else if (goal.includes('图书馆')) {
                selectedAgent.goToLocation('library');
            } else if (goal.includes('工作')) {
                selectedAgent.goToLocation('job');
            } else if (goal.includes('公园')) {
                selectedAgent.goToLocation('park');
            } else {
                selectedAgent.goToLocation('home');
            }
            
            showAchievement(`你给 ${selectedAgent.name} 设立了目标: ${goal}`);
        }
        
        function sendGift() {
            if (!selectedAgent) {
                alert('请先选择一个Agent');
                return;
            }
            const gifts = ['🍎 苹果', '🎁 礼物盒', '📚 书', '🎮 游戏', '💰 100金币'];
            const gift = gifts[Math.floor(Math.random() * gifts.length)];
            
            if (gift.includes('金币')) {
                selectedAgent.coins += 100;
            }
            selectedAgent.mood += 15;
            
            showAchievement(`你送给了 ${selectedAgent.name} ${gift}！`);
        }
        
        function quickAction(location) {
            if (!selectedAgent) {
                alert('请先选择一个Agent');
                return;
            }
            selectedAgent.goToLocation(location);
            const loc = LOCATIONS[location];
            showAchievement(`${selectedAgent.name} 前往了 ${loc.name}`);
        }
        
        // ==================== 游戏循环 ====================
        function gameLoop() {
            // 清空画布
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // 绘制地图
            drawMap();
            
            // 绘制Agent
            agents.forEach(agent => {
                agent.update();
                agent.draw(ctx);
            });
            
            // 更新时间
            gameTime += 0.5;
            if (gameTime >= 24 * 60) {
                gameTime = 6 * 60;
                // 新的一天
                agents.forEach(a => a.daysInCity++);
            }
            
            // 随机天气变化
            if (Math.random() < 0.001) {
                weather = Math.floor(Math.random() * WEATHER.length);
            }
            
            // 更新UI
            if (selectedAgent) {
                updateLocationPanel(selectedAgent.currentLocation);
            }
            updateStats();
            
            requestAnimationFrame(gameLoop);
        }
        
        // ==================== 初始化 ====================
        function init() {
            canvas = document.getElementById('gameCanvas');
            ctx = canvas.getContext('2d');
            
            // 设置画布大小
            canvas.width = window.innerWidth - 320;
            canvas.height = window.innerHeight;
            
            // 初始化Agent
            const names = ['小明', '小红', '小刚', '小美', '小强', '小丽', '小杰', '小芳'];
            const personalities = Object.keys(PERSONALITIES);
            
            names.forEach((name, i) => {
                const personality = personalities[i % personalities.length];
                agents.push(new Agent(`agent_${i}`, name, personality));
            });
            
            // 随机初始位置
            agents.forEach(agent => {
                const locations = Object.keys(LOCATIONS);
                const loc = locations[Math.floor(Math.random() * locations.length)];
                agent.goToLocation(loc);
            });
            
            // 渲染初始UI
            renderAgentList();
            updateStats();
            
            // 窗口大小变化
            window.addEventListener('resize', () => {
                canvas.width = window.innerWidth - 320;
                canvas.height = window.innerHeight;
            });
            
            // 点击事件
            canvas.addEventListener('mousedown', (e) => {
                isDragging = true;
                lastMouse = { x: e.clientX, y: e.clientY };
            });
            
            canvas.addEventListener('mousemove', (e) => {
                if (isDragging) {
                    const dx = e.clientX - lastMouse.x;
                    const dy = e.clientY - lastMouse.y;
                    camera.x = Math.max(0, Math.min(camera.x + dx, CONFIG.MAP_WIDTH * CONFIG.TILE_SIZE - canvas.width));
                    camera.y = Math.max(0, Math.min(camera.y + dy, CONFIG.MAP_HEIGHT * CONFIG.TILE_SIZE - canvas.height));
                    lastMouse = { x: e.clientX, y: e.clientY };
                }
            });
            
            canvas.addEventListener('mouseup', () => isDragging = false);
            canvas.addEventListener('click', (e) => {
                if (!isDragging) {
                    // 点击选择Agent
                    const rect = canvas.getBoundingClientRect();
                    const x = e.clientX - rect.left + camera.x;
                    const y = e.clientY - rect.top + camera.y;
                    
                    agents.forEach(agent => {
                        const dist = Math.sqrt((agent.x - x) ** 2 + (agent.y - y) ** 2);
                        if (dist < 30) {
                            selectAgent(agent);
                        }
                    });
                }
            });
            
            // 遮罩点击关闭弹窗
            document.getElementById('overlay').addEventListener('click', closePopup);
            
            // 启动游戏循环
            gameLoop();
        }
        
        // 启动
        window.onload = init;
    </script>
</body>
</html>
